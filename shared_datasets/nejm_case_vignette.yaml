  A 36-year-old man was admitted to this hospital because of abdominal pain, fever, hypoxemia, and thrombocytopenia. The patient had been in his usual state of health, which included alcohol use disorder characterized by binge drinking, until 2 weeks before the current presentation, when mild, dull pain developed in the right lower abdomen and right lower back. Five days before the current presentation, the patient had body aches and subjective fever. The next day, he was evaluated in the urgent care center affiliated with his primary care physician’s office. The examination was normal. Urinalysis was normal, and screening tests for influenza virus types A and B and severe acute respiratory syndrome coronavirus 2 were negative. Treatment with intravenous fluids and intravenous ketorolac was administered. The abdominal pain resolved, and the patient was discharged home. Three days before the current presentation, abdominal pain recurred, and diarrhea developed. The patient took over-the-counter acetaminophen and ibuprofen, but the pain did not abate. One day before the current presentation, nausea with vomiting developed, and the patient was again evaluated in the same urgent care center. He reported no intake of alcohol since the previous evaluation. In addition, he reported new dyspnea and cough. The temporal temperature was 36.9°C, the pulse 115 beats per minute, the blood pressure 89/64 mm Hg, and the respiratory rate 20 breaths per minute. The oxygen saturation was 85% while the patient was breathing ambient air and increased to 98% while supplemental oxygen was delivered through a nasal cannula at a rate of 4 liters per minute. The patient was ill-appearing, with increased work of breathing and crackles over the posterior lung fields on auscultation. Scleral icterus was present. He had tenderness and guarding on palpation in the right upper abdomen. After the administration of 2 liters of intravenous fluids, the blood pressure was 78/60 mm Hg. The patient was transferred to the emergency department of this hospital for further evaluation. In the emergency department, the patient reported that intermittent subjective fevers had continued after discharge from the urgent care clinic 4 days earlier. No exacerbating or relieving factors were associated with the abdominal pain. The cough was productive of tan sputum. He typically drank 4 or 5 beers nightly during the week and up to 12 beers nightly on most weekends; previous treatment for alcohol use disorder included naltrexone, which he had stopped taking 3 months before the current presentation. Additional medical history included gastroesophageal reflux disease (GERD), which was thought to have been exacerbated by his intake of alcohol and highly caffeinated beverages; a 1-month course of pantoprazole had been prescribed 8 months before the current presentation, and symptoms of GERD had resolved and not recurred. He did not take any medications, and he had no known adverse reactions to medications. The patient was born in Central America and had lived in the United States for 16 years. He worked in construction and lived in a suburb of Boston with his partner and two children. He was a lifelong nonsmoker and did not use illicit drugs. There was no known personal or family history of blood clots. On examination, the temporal temperature was 38.6°C, the blood pressure 92/50 mm Hg, the pulse 110 beats per minute, the respiratory rate 28 breaths per minute, and the oxygen saturation 94% while supplemental oxygen was delivered through a nasal cannula at a rate of 4 liters per minute. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 28.3. The patient was alert and oriented with no asterixis. The sclerae were icteric. Crackles were noted in both posterior lung fields. The patient had tenderness on palpation in the right upper abdomen; he was able to take full deep breaths without pause while the right upper abdomen was palpated, and the pain did not increase during inspiration. The mucous membranes were moist, and he had no petechiae, oral ulcers, or signs of dental infection. There was no leg edema, rash, or skin breakdown. Laboratory testing revealed thrombocytopenia and elevated levels of alkaline phosphatase, total bilirubin, and direct bilirubin. Urinalysis showed 2+ bilirubin (reference value, negative), 2+ urobilinogen (reference value, negative), and 1+ ketones (reference value, negative) but was otherwise normal. The peripheral-blood smear showed normochromic red cells that were normal in size and had normal morphologic features; occasional burr cells, schistocytes, and spherocytes were observed. Platelets were low in number with normal morphologic features and granularity; occasional giant platelets were seen. Chest radiography revealed engorged, indistinct pulmonary vasculature with reticular opacities in both lungs and patchy airspace opacities with predominance in the lower lobes. Two additional liters of intravenous fluids were administered, and the blood pressure increased to 116/59 mm Hg. Additional imaging studies were performed. Computed tomography (CT) of the chest, abdomen, and pelvis was performed after the administration of intravenous contrast material with pulmonary angiography timing in the chest and with portal venous timing in the abdomen and pelvis. No evidence of pulmonary embolism was found. Multifocal patchy airspace opacities were present throughout the lungs, most of which were concentrated dependently in the posterior right upper lobe and both lower lobes; more opacities were noted in the right lower lobe than in the left lower lobe. Interlobular septal thickening was present in both lungs, along with associated centrilobular ground-glass opacities and trace pleural fluid. Multiple mediastinal lymph nodes were enlarged, including the right hilar, perivascular, and subcarinal nodes. The liver was enlarged with diffuse periportal edema; bile duct walls appeared to be thickened, and periportal lymphadenopathy was noted. The gallbladder was contracted, and trace pericholecystic edema was seen. A partially occlusive thrombus of the superior right renal vein extending into the inferior vena cava was present. After the initial report, a secondary in-person review with the admitting team revealed additional findings, including subtle proximal thickening of the duodenal wall and mucosal hyperemia, along with a possible soft-tissue connection between the duodenum and right kidney. Magnetic resonance imaging (MRI) of the abdomen was recommended. Blood was obtained for culture, and empirical treatment with intravenous piperacillin–tazobactam, vancomycin, and acyclovir was started. Ultrasonography of the legs showed no evidence of deep or superficial venous thrombosis. Two units of platelets were transfused, and the patient was admitted to the hospital. Fifteen hours after presentation to the emergency department, the temporal temperature increased to 39.2°C. Repeat laboratory testing showed new leukocytosis and an increase in the platelet count. Three of four blood cultures obtained on presentation to the hospital grew gram-positive cocci in pairs and chains. MRI of the abdomen was performed after the administration of intravenous contrast material; however, the image quality was substantially degraded by patient motion. No mass lesions were identified in the liver, biliary tract, or pancreas. A nonocclusive thrombus was confirmed within the superior right renal vein that extended into the inferior vena cava and did not enhance. The proximal duodenum was circumferentially thickened, with associated T2-weighted images showing hyperintensity consistent with edema. The suspected soft tissue in the anterior pararenal space between the duodenum and right renal hilum was confirmed but poorly evaluated owing to motion. On hospital day 1, the gram-positive cocci isolated in three of four blood cultures were identified as Streptococcus anginosus. Screening tests for human immunodeficiency virus types 1 and 2 were negative; antinuclear antibodies were not detected. Treatment with piperacillin–tazobactam, vancomycin, and acyclovir was stopped, and treatment with intravenous ceftriaxone and oral doxycycline was started. Hypotension resolved, but fever persisted with a maximum temporal temperature of 38.7°C. The platelet count had increased after platelet transfusion. Treatment with intravenous heparin was initiated for thrombosis in the renal vein and inferior vena cava. Testing for lupus anticoagulant was positive, without evidence of IgG or IgM antibodies to β2-glycoprotein or cardiolipin. On hospital day 2, fever persisted. The maximum temporal temperature was 39.0°C.
  
