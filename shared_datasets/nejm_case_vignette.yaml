  A 70-year-old man presented to the emergency department of this hospital because of a 6-week history of anorexia, weakness, and weight loss. Six weeks before this presentation, the patient’s psychiatrist, who had been treating him for depression, increased his dose of bupropion because of progressive fatigue. The fatigue continued to worsen, and the patient had a loss of appetite; the dose of bupropion was decreased and then discontinued 2 weeks later. The patient first presented to the emergency department of this hospital 8 days before the current presentation because of muscle weakness, headache, and ongoing anorexia. Imaging studies were obtained. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of intravenous contrast material, revealed a left adrenal nodule that measured 1.9 cm in diameter. This lesion was indeterminate for adenoma on the basis of the attenuation level, which was greater than 10 Hounsfield units. No splenomegaly, lymphadenopathy, or evidence of other inflammatory or infectious process was present in the abdomen. CT angiography of the head and neck, performed before and after the administration of intravenous contrast material, was unremarkable. The patient received treatment with metoclopramide, acetaminophen, and intravenous fluids. The headache abated, and he was discharged home. Owing to progressive fatigue and anorexia, the patient returned to the emergency department of this hospital 7 days after his initial presentation. On evaluation, he noted marked anorexia, dysgeusia, and severe fatigue, despite discontinuation of bupropion. Progressive generalized muscle weakness persisted, and the patient reported a weight loss of 13.6 kg that had occurred during the previous 6 weeks. A review of systems was notable for intermittent headache without photophobia, phonophobia, or neck stiffness; skin thinning, worsening mood, and anhedonia were also noted. There was no abnormal bleeding, proximal muscle weakness, fever, rigors, night sweats, cough, diarrhea, abdominal pain, rash, or dyspnea. The patient’s medical history was notable for hairy-cell leukemia, which had been treated and was in remission for 7 years; major depressive disorder, for which he had had multiple psychiatric admissions and had been treated with electroconvulsive therapy and implantation of a vagus-nerve stimulator; obesity, for which he had undergone Roux-en-Y gastric bypass; primary hypertension; and benign prostatic hyperplasia. Medications included bupropion, escitalopram, gabapentin, risperidone, tamsulosin, and lisinopril. His family history included bipolar disorder in his mother. He lived alone in an urban area of New England and was homebound most of the time owing to debility; a caretaker was needed to perform many household activities. He did not smoke, drink alcohol, or use recreational drugs. He had no known adverse reactions to medications. There had been no recent travel or exposure to sick contacts. On examination, the oral temperature was 36.3°C, the blood pressure 136/81 mm Hg, the pulse 100 beats per minute, the respiratory rate 24 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. Tachypnea was noted, without increased work of breathing. The jugular venous pulsation was seen under the clavicle with the patient lying flat. Cardiac examination was normal. Scattered bruises and thinning of the skin were present, but he had no rash or petechiae. No proximal muscle weakness was observed on strength testing. The patient was alert and able to recite the days of the week backward without difficulty. Laboratory test results were notable for hypokalemia, with a potassium level of 3.1 mmol per liter (reference range, 3.4 to 5.0), and a blood glucose level of 225 mg per deciliter (12.5 mmol per liter; reference range, 70 to 110 mg per deciliter [3.9 to 6.1 mmol per liter]). A complete blood count showed thrombocytopenia (platelet count, 91,000 per microliter; reference range, 150,000 to 400,000), a chronic condition that the patient had had since undergoing cancer treatment, as well as lymphopenia (absolute lymphocyte count, 570 per microliter; reference range, 1000 to 4800). Testing was negative for human immunodeficiency virus (HIV) types 1 and 2, syphilis, hepatitis C virus, and hepatitis B virus. Blood levels of vitamin B12, copper, and thyrotropin were normal. The glycated hemoglobin level was 7.2%; 1 year earlier, the level had been 6.2%. Measurement of venous blood gases revealed respiratory alkalosis, with a pH of 7.48 (reference range, 7.35 to 7.45) and a partial pressure of carbon dioxide of 22 mm Hg (reference range, 38 to 50). CT of the chest, performed after the administration of intravenous contrast material in accordance with a pulmonary embolism protocol, did not show a pulmonary embolism or any other radiologically significant findings. The adrenal adenoma that had been observed on previous abdominopelvic imaging was stable in appearance. Blood cultures were obtained, and treatment with high-dose intravenous thiamine and high-dose oral ascorbic acid was initiated. The patient was admitted to this hospital. Over the course of the next 2 days, progressive confusion developed in the patient. Physical examination revealed intermittent episodes of unresponsiveness that later became sustained; there were no motor deficits or cranial nerve asymmetry. Continuous electroencephalography showed diffuse delta and theta slowing, without overt seizure activity. The patient had episodes of narrow-complex tachycardia with retrograde P waves and blood pressure that remained stable; these episodes did not reliably correlate with periods of obtundation. Treatment with metoprolol resulted in suppression of the tachycardia. The patient underwent endotracheal intubation for airway protection on hospital day 5 because of progressive encephalopathy. He was subsequently transferred to the intensive care unit. Magnetic resonance imaging of the head was not pursued because of the presence of the vagus-nerve stimulator. CT of the head was performed without the administration of intravenous contrast material on hospital day 5 and revealed small areas of hypoattenuation involving the right caudate and anterior limb of the internal capsule and the left lateral thalamus. Although incompletely characterized by CT, these lesions were most likely recent lacunar infarcts. Given the presence of systemic illness, the differential diagnosis for these findings also includes parenchymal edema and changes seen with infections of the central nervous system. Owing to the persistent encephalopathy in this patient, a lumbar puncture was performed; findings were notable for an opening pressure of at least 58 cm of water (the meniscus surpassed the manometer). Cerebrospinal fluid (CSF) analysis revealed 67 total nucleated cells per microliter (reference range, 0 to 5), of which 48% were neutrophils and 32% were lymphocytes, with 500 red cells per microliter (reference value, <5), as well as a CSF total protein level of 92 mg per deciliter (reference range, 5 to 55) and a CSF glucose level of 2 mg per deciliter (0.1 mmol per liter; reference range, 50 to 75 mg per deciliter [2.8 to 4.2 mmol per liter]).

