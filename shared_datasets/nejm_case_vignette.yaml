  A 53-year-old man was evaluated in the cardiology clinic of this hospital because of severe left ventricular dysfunction with an apical aneurysm. Five and a half months before this evaluation, the patient was admitted to the neurology unit of this hospital with multifocal left middle cerebral artery stroke, which had manifested as weakness in the right arm and leg, along with expressive aphasia. These symptoms occurred after diffuse abdominal discomfort that had persisted for 3 days and was associated with heavy consumption of beer; an episode of coffee-ground emesis occurred on the day of admission. Laboratory test results obtained on the day of admission indicated that blood levels of calcium, magnesium, phosphorus, albumin, globulin, and bilirubin were normal, as were the results of urinalysis. Transthoracic echocardiography, performed after the administration of an ultrasound-enhancing agent, revealed a dilated left ventricle with an end-diastolic diameter of 64 mm (reference range, 42 to 58) and an ejection fraction of 20% with severe global systolic dysfunction that was most pronounced at the apex. The left ventricular wall thickness was normal. There was evidence of spontaneous echo contrast that was suggestive of a low-flow state at the left ventricular apex, but no discrete thrombus was seen. The left atrium was dilated, and moderate mitral regurgitation was noted, along with aortic sclerosis. There was no evidence of a patent foramen ovale after the administration of agitated saline. Treatment with aspirin, atorvastatin, and apixaban was started. Inpatient evaluation of cardiac dysfunction included computed tomographic (CT) angiography of the coronary arteries, which revealed thinning of the apical myocardium. No evidence of obstructive coronary disease was seen. The results of urine toxicology screening, serum protein electrophoresis, and serum free light-chain testing were normal, as was the thyrotropin level. In addition, the blood ethanol level was undetectable, and screening tests for severe acute respiratory syndrome coronavirus 2, human immunodeficiency virus (HIV) types 1 and 2, hepatitis B virus, and hepatitis C virus were negative. Given a concern about gastrointestinal bleeding, esophagogastroduodenoscopy was performed, which revealed a clean-based duodenal ulcer with mild erosive gastropathy. Helicobacter pylori was detected on examination of the gastric-biopsy specimen and on antigen testing of stool; treatment with omeprazole, bismuth subsalicylate, tetracycline, and metronidazole was initiated. In addition, metoprolol succinate, losartan, spironolactone, and empagliflozin were started for the management of cardiomyopathy. The patient was discharged to an inpatient rehabilitation facility, and he also enrolled in physical therapy and speech therapy for poststroke rehabilitation. At a follow-up visit in the cardiology clinic 6 weeks after stroke had occurred, the patient reported complete abstinence from alcohol. The dose of beta-blocker was increased, partly owing to short runs of nonsustained ventricular tachycardia noted on an outpatient rhythm monitor. The dose of spironolactone was also increased. During the next 3.5 months, the patient participated in an outpatient guideline-directed medical therapy (GDMT) program at this hospital. This resulted in adjustments of the doses of metoprolol succinate, spironolactone, and empagliflozin and a change in treatment from losartan to sacubitril–valsartan. At the current follow-up evaluation in the cardiology clinic, 5.5 months after the initial admission for stroke, the patient reported intermittent lower back pain, the use of two pillows to sleep, and feeling dyspneic if he ate until he felt satiated. He was walking 0.2 km daily. He reported no chest pain, dyspnea at rest, lightheadedness, palpitations, syncope, edema, bleeding symptoms, dysphagia, abdominal pain, focal weakness, or new neurologic symptoms. Before the admission for stroke, the patient had had no known medical conditions and had had no visits for health care in the preceding 10 years. Medications at the current evaluation included apixaban, atorvastatin, metoprolol succinate, spironolactone, sacubitril–valsartan, and empagliflozin. He had no known adverse reactions to medications. The patient’s mother had had hypertension, and his father had had brain cancer. The patient had emigrated from Central America approximately 15 years before this evaluation, and he had worked as a manual laborer before the stroke. He lived with his family in an urban area of New England. For many years before the stroke, he had consumed up to 24 beers per day on weekends, but he had been abstinent from alcohol since the stroke 5.5 months earlier. He had smoked one pack of cigarettes per day for the past 20 years. He had no history of other substance use. On physical examination, the heart rate was 58 beats per minute, and the blood pressure was 115/75 mm Hg. The weight was 62.6 kg, the height 166.5 cm, and the body-mass index (the weight in kilograms divided by the square of the height in meters) 22.6. Mild facial weakness on the right side and dysarthria were noted. The remainder of the examination was normal. An electrocardiogram (ECG) showed sinus bradycardia; baseline artifact; borderline-low QRS voltage; T-wave inversions in the inferior, apical, and lateral leads; intraventricular conduction delay; and a single premature ventricular depolarization. These findings were unchanged from those observed on previous tracings. Transthoracic echocardiography, performed after the administration of an ultrasound-enhancing agent, showed a left ventricular ejection fraction of 28% with dysfunction that was most pronounced at the apex, a left ventricular end-diastolic diameter of 52 mm, and mild mitral regurgitation. The left ventricular end-diastolic diameter was smaller than that measured during the patient’s initial admission and was now within the normal range. However, other findings were similar to those of the previous echocardiogram. Given the persistently reduced ejection fraction despite the use of GDMT, a referral for primary prevention with an implantable cardioverter–defibrillator (ICD) was made. Six weeks after the current evaluation, cardiac magnetic resonance imaging (MRI) was performed before and after the administration of intravenous contrast material. There was mildly increased left ventricular volume, severely depressed global left ventricular function (ejection fraction, 29%), hypokinesis of the lateral wall with thinning, and dyskinesis of the apex. No hyperintensity was noted on T2-weighted imaging. Extensive late gadolinium enhancement showed circumferential midwall fibrosis; transmural late gadolinium enhancement was noted in the apex, and there was subendocardial late gadolinium enhancement in the lateral territory.

