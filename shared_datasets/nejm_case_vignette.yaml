  A 32-year-old woman was evaluated at this hospital because of fatigue and myalgias. Two and a half years before the current presentation, the patient had fatigue, headache, myalgias, and “brain fog” after infection with severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2). Evaluation of these symptoms included consultations with neurology, immunology, and rheumatology specialists at another hospital. The blood levels of electrolytes, thyrotropin, alanine aminotransferase, aspartate aminotransferase, bilirubin, alkaline phosphatase, C-reactive protein, and ferritin were normal, as were the complete blood count and differential count and the results of tests of kidney function. Serologic tests for cytomegalovirus, Epstein–Barr virus, ehrlichia species, anaplasma species, and Borrelia burgdorferi were reportedly negative. The results of magnetic resonance imaging of the head were reportedly normal. During the next 2 years, the patient received acupuncture therapy and used herbal supplements, which helped to alleviate her symptoms. Five weeks before the current presentation, the patient was reinfected with SARS-CoV-2. After 5 days, symptoms associated with acute SARS-CoV-2 infection abated and she returned to her usual state of health. Nine days before the current presentation, the patient began to have neck tightness and pain after lifting heavy objects. The pain radiated to the head and scapulae. Six days before the current presentation, she was evaluated by her primary care physician, who was affiliated with the other hospital. Examination was reportedly normal. Treatment with ibuprofen, magnesium, acupuncture, and massage were recommended. The neck pain did not abate. Three days before the current presentation, the pain began to radiate down the right arm, and severe fatigue developed. The patient presented to the emergency department of a second hospital for evaluation. On examination, the temporal temperature was 36.8°C, the heart rate 50 beats per minute, and the blood pressure 109/55 mm Hg. She had full range of motion in the neck and tenderness on palpation of the right side of the upper neck and the right side of the upper back. A radiograph of the cervical spine was reportedly normal. Treatment with intravenous ketorolac, oral methocarbamol, and transdermal lidocaine was administered, and a tapering dose of oral methylprednisolone was prescribed. During the next 2 days, the back and neck pain resolved. However, the fatigue worsened and myalgias developed. The patient had palpitations and an irregular pulse, as well as waxing and waning lower chest pain that she described as tightness. The chest pain was both pleuritic and positional in nature, and she rated the pain at 5 on a scale of 0 to 10 (with 10 indicating the most severe pain). She presented to the emergency department of a third hospital for evaluation. On examination, the temporal temperature was 36.3°C, the heart rate 58 beats per minute, the blood pressure 124/79 mm Hg, and the oxygen saturation 100% while the patient was breathing ambient air. The blood levels of electrolytes and troponin I were normal, as were the complete blood count and the results of tests of kidney function. A urine test for human chorionic gonadotropin was negative. The blood level of alanine aminotransferase was 170 U per liter (reference range, 7 to 40), the aspartate aminotransferase level 104 U per liter (reference range, 8 to 30), and the d-dimer level 1760 ng per milliliter (reference value, <520). Electrocardiography (ECG) showed first-degree atrioventricular block and a heart rate of 55 beats per minute. The results of chest radiography and an ultrasound examination of the liver were reportedly normal. Additional imaging studies were obtained. Computed tomographic (CT) angiography of the chest, performed after the administration of intravenous contrast material that was timed for evaluation of the pulmonary arteries, showed no evidence of filling defects that would suggest pulmonary embolism. The heart and lungs appeared normal. There was no evidence of mediastinal or hilar lymphadenopathy. The bones had a normal appearance. The patient was discharged with a plan for the use of mobile cardiac telemetry. The next day, the chest pain worsened and dyspnea on exertion developed. The patient also had dizziness, bifrontal headache, and chills. Her primary care physician recommended that she seek evaluation in the emergency department of this hospital. In the emergency department, the patient reported ongoing fatigue, myalgias, and chest tightness. She had no fever, rhinorrhea, pharyngitis, paresthesia, weakness, or diplopia. A review of systems was notable for intermittent abdominal discomfort, nausea, and diarrhea that had been present for several months. Other medical history included umbilical hernia repair, hyperemesis gravidarum, anxiety, and mild chronic gastritis. Medications included magnesium supplementation, probiotics, and a supplement containing turmeric, animal liver extract, and milk thistle. The patient had not been vaccinated against SARS-CoV-2. There were no known adverse reactions to medications. The patient was married and lived with her husband and two children in a forested town in a neighboring state. Rabbits and sheep were raised on her property. She was physically active, participating regularly in hiking, camping, and yoga. She rarely consumed alcohol. She vaped and had a history of tobacco and marijuana use. She did not use other substances. The patient’s family history was notable for hypertension, a patent foramen ovale, and stroke in her maternal grandmother; hypertension in her maternal grandfather; colorectal cancer in her paternal grandmother; and Kawasaki’s disease in one of her children. On examination, the temporal temperature was 36.3°C, the heart rate 52 beats per minute, the blood pressure 140/76 mm Hg, and the oxygen saturation 100% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 19.6. The cardiac rhythm was irregularly irregular. The remainder of the examination was normal. The blood levels of electrolytes, calcium, magnesium, thyrotropin, albumin, bilirubin, alkaline phosphatase, C-reactive protein, creatine kinase, and high-sensitivity troponin T were normal, as were the complete blood count and differential count, the erythrocyte sedimentation rate, and the results of tests of kidney function. The blood level of alanine aminotransferase was 89 U per liter (reference range, 7 to 33), the aspartate aminotransferase level 22 U per liter (reference range, 9 to 32), the d-dimer level 436 ng per milliliter (reference value, <500), and the N-terminal pro–B-type natriuretic peptide (NT-proBNP) level 604 pg per milliliter (reference value, <450). Imaging studies were obtained. A single-view frontal chest radiograph obtained with a portable device showed normal lungs without evidence of pneumonia, pulmonary edema, or pleural effusion. The heart size was normal, and there was no radiographic evidence of mediastinal lymphadenopathy. The bones had a normal appearance. An ECG showed sinus rhythm; Mobitz type I second-degree atrioventricular block, along with first-degree atrioventricular block with a PR interval of 240 msec (reference range, 120 to 200); and Q waves in the inferior leads.

