  A 62-year-old man was admitted to this hospital because of abdominal pain. Two years before the current presentation, postprandial abdominal pain developed. One year before the current presentation, while living in Costa Rica, the patient received a diagnosis of cirrhosis. Eight months later, he immigrated to the United States. The medical teams caring for him in the United States did not have access to records from his medical care in Costa Rica, and the details of how the diagnosis of cirrhosis had been made were not available to them. Three months before the current presentation, the patient noted a reducible umbilical hernia. Six weeks later, postprandial abdominal pain worsened in severity and frequency and was associated with nausea. One month before the current presentation, the patient was unable to reduce the umbilical hernia; he presented to another hospital for evaluation. The blood levels of electrolytes, glucose, lipase, and lactic acid were normal, as were the results of tests of kidney function and coagulation. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of intravenous contrast material, showed a paraumbilical hernia with a 3.6-cm neck that contained a nonobstructed loop of small bowel. The liver had diffuse hypoattenuation with a lobulated contour and shrunken appearance. Extensive paraesophageal and mesenteric varices were present; the portal vein and superior mesenteric vein were not identified, a finding that suggested cavernous transformation of the portal vein. The spleen measured 18.2 cm in the craniocaudal dimension (reference value, <13.0 cm). Doppler ultrasonography of the abdomen showed no flow in the main portal vein and normal flow through the patent hepatic veins, hepatic artery, and inferior vena cava. On examination by the general surgery consultant, the hernia was easily reducible, and no surgical intervention was planned for this patient. However, he was admitted to the hospital for further evaluation of abdominal pain. The blood levels of ferritin and iron were normal; the transferrin saturation was 62% (reference range, 14 to 50) and the iron-binding capacity 165 μg per deciliter (29.5 μmol per liter; reference range, 250 to 400 [44.8 to 71.6]). Screening tests for hepatitis B and C virus antibodies were negative, and nucleic acid testing did not detect hepatitis C RNA. Additional tests for possible causes of cirrhosis were negative, including serum protein electrophoresis, measurement of ceruloplasmin and alpha1-antitrypsin, and screening for human immunodeficiency virus infection. Antinuclear antibodies, anti–smooth muscle antibodies, antimitochondrial antibodies, and antineutrophil cytoplasmic antibodies were not detected. The blood level of alpha-fetoprotein was normal. Treatment with pantoprazole was started. There was no hematemesis or melena, and the blood level of hemoglobin remained stable. Abdominal pain persisted, but the patient was able to eat a regular diet, and he was discharged on hospital day 3 with plans for outpatient esophagogastroduodenoscopy (EGD) and colonoscopy. Ten days before the current presentation, EGD revealed grade 3 (large) nonbleeding esophageal varices, as well as portal hypertensive gastropathy; colonoscopy revealed nonbleeding internal hemorrhoids and rectal varices. Treatment with nadolol was started, and evaluation in the gastroenterology clinic of the other hospital was planned for further evaluation and management of a presumed diagnosis of cirrhosis. On the day of the current presentation, postprandial abdominal pain increased in severity and did not abate; the patient presented to the emergency department of this hospital for evaluation. He reported pain after eating, with less pain after eating bland, low-fat foods. Nausea and vomiting occurred during these periods of postprandial abdominal pain. He estimated a weight loss of 20 kg over the previous 2 months. No swelling was observed in the legs or abdomen, and there were no episodes of confusion. He had had hepatitis as a child, which had resolved without treatment. Other medical history included a motor vehicle crash 5 years before the current presentation in which the patient had been an unrestrained driver and sustained abdominal trauma from the steering wheel of the car. He had no surgical history. Medications included pantoprazole and nadolol; he had no known allergies to medications. The patient had worked in cattle farming while living in Costa Rica and had not traveled outside of Costa Rica before immigrating to the United States. He did not drink alcohol, smoke tobacco, or use illicit drugs. There was no family history of liver disease or thrombosis. On examination, the temporal temperature was 36.7°C, the pulse 49 beats per minute, the blood pressure 90/61 mm Hg, and the oxygen saturation 97% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 26.7. He was alert and oriented; there was no asterixis. The sclerae were anicteric. The abdomen was diffusely tender on palpation, with pain that was worse in the upper abdomen, without rebound or guarding. No spider angiomas were observed. The remainder of the examination was normal.

