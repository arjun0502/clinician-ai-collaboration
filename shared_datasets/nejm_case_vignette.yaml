  A 43-year-old woman was admitted to the psychiatry service of this hospital because of depressed mood and suicidal ideation. The patient had been in her usual state of health until 2 months before the current admission, when she began to have worsening anhedonia, anxiety, and suicidal ideation, including plans to intentionally ingest an overdose of medication. On the day of the current admission, the patient presented to the emergency department of this hospital for evaluation. She reported 2 months of nonproductive cough without night sweats or weight loss. Multiple psychosocial stressors were present, including intimate partner violence, limited financial resources, and unstable housing. The patient was admitted to the psychiatry service of this hospital for management of anhedonia and suicidality. On evaluation, the temporal temperature was 37.3°C, the blood pressure 90/56 mm Hg, the pulse 70 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. She was mildly somnolent and diaphoretic. No conjunctival hemorrhages, oropharyngeal plaques, or lesions on the mucous membranes were noted. The cardiopulmonary examination was normal, with clear lung fields and no murmur. No palpable cervical, supraclavicular, axillary, or inguinal lymphadenopathy was present. No hepatosplenomegaly was detected on palpation of the abdomen, and the arms and legs had no rash, edema, or signs of embolic disease. The patient’s medical history was notable for human immunodeficiency virus (HIV) infection with associated neuropathy, which she had acquired 17 years earlier; adherence to antiretroviral medications had been limited in the 2 years preceding this evaluation. The patient had a history of bipolar disorder, as well as seizure disorder that was secondary to traumatic brain injury. She did not take any medications but had previously received a prescription for combination antiretroviral therapy (ART) with bictegravir, tenofovir alafenamide, and emtricitabine. Her surgical history was notable for Roux-en-Y gastric bypass that had been performed 10 years earlier. The patient had unstable housing; she had stayed with friends in Boston but had not sought temporary housing in shelters. She smoked cocaine as well as one pack of cigarettes per day, and she drank alcohol recreationally. She had not traveled outside New England for several years. The CD4+ T-cell count was 25 per microliter, and the HIV RNA viral load was 144,000 copies per milliliter. The lactate dehydrogenase level was 227 U per liter. Urinalysis showed no evidence of pyuria, hematuria, or proteinuria. On the evening of the first hospital day, the oral temperature was 39.5°C, the blood pressure 83/54 mm Hg, the pulse 101 beats per minute, the respiratory rate 40 breaths per minute, and the oxygen saturation 94% while the patient was breathing ambient air. She had an ashen appearance, and increased work of breathing was noted. An anteroposterior chest radiograph revealed innumerable micronodules that were evenly distributed throughout both lungs. Lactated Ringer’s solution was administered intravenously, along with ceftriaxone, doxycycline, and trimethoprim–sulfamethoxazole. The patient was transferred to the medical service for further treatment.

