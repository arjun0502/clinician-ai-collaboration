  An 82-year-old woman presented to the emergency department of this hospital because of worsening abdominal distention and pedal edema. Three weeks before the current presentation, the patient traveled to South America to visit friends and family. At this time, she was in her usual state of health and able to independently tend to her daily needs. During her time in South America, abdominal bloating and a sensation of heaviness in the legs developed. She had reported no substantial changes to her diet while she was in South America, and she had no known sick contacts. The patient stayed in urban areas and had had no exposure to insects or animals. She returned to the United States 1 day before the current presentation. The next day, worsening edema of the lower legs limited the patient’s ability to dress herself, and the patient’s daughter brought her to the emergency department of this hospital for evaluation. Physical examination was notable for diminished breath sounds and pitting edema of the legs that extended to the thighs. Imaging studies were obtained. An upright posteroanterior radiograph of the chest showed cephalization of the pulmonary vasculature, mild central peribronchovascular cuffing, and peripheral septal lines, without overt enlargement of the cardiac silhouette. Blunting of the costophrenic angles was observed that was more pronounced on the left side than on the right, which may indicate a small left pleural effusion and a trace right pleural effusion, findings consistent with pulmonary edema. Subsequently, computed tomography of the abdomen and pelvis was performed before and after the administration of intravenous contrast material. The liver had a nodular contour, a feature commonly associated with cirrhosis; however, this finding is not diagnostic in isolation. In addition, small-volume ascites was present. The portal veins were patent, and no evidence of additional signs of portal hypertension, such as splenomegaly or portosystemic shunting, was seen. Diffuse anasarca was noted throughout the visualized subcutaneous tissues. Electrocardiography was performed and showed sinus rhythm. Treatment with intravenous furosemide was administered. The patient was discharged from the emergency department and was enrolled in the home hospital service for management of decompensated heart failure. The home hospital service is an acute care delivery system in which inpatient-level care is administered in the home of qualifying patients. On evaluation in the patient’s home, she reported adherence to her medications during the trip to South America but had noticed less urine production than usual after taking her daily dose of furosemide. In addition, she reported a nonproductive cough that was worse at night, as well as orthopnea. A review of systems was negative for palpitations, chest discomfort, anorexia, syncope, easy bruising, night sweats, weight loss, rash, numbness and tingling, hemoptysis, and dizziness upon standing but was notable for frothy urine and hand and periorbital edema. The patient’s medical history included atrial fibrillation with cardioembolic stroke, for which she had undergone direct-current cardioversion and cardiac ablation through pulmonary-vein isolation 1 year before the current presentation, as well as heart failure with preserved ejection fraction. Medications included metoprolol, apixaban, and furosemide. She was born and raised in South America and had moved to suburban Massachusetts to live with her daughter and son-in-law 14 years earlier. She did not smoke, drink alcohol, or use recreational drugs. She had no known adverse reactions to medications and no family history of liver or kidney disease. On examination, the oral temperature was 36.7°C, the blood pressure 114/77 mm Hg, the pulse 80 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 95% while the patient was breathing ambient air. The weight was 67 kg, and the body-mass index (the weight in kilograms divided by the square of the height in meters) was 30. The jugular venous pressure was 12 cm of water, and a low-pitched holosystolic murmur was heard at the left lower sternal border. The breath sounds were diminished at both lung bases without crackles or wheezing. Pitting edema was present throughout both legs and extended up to the lateral abdominal wall. The abdomen was distended with dullness on percussion. She had no bruising, Terry’s nails (characterized by a white or pale nail bed with a narrow pink or brown band at the tip), spider angiomas, or palmar erythema. Urinalysis showed 2+ proteinuria with a specific gravity of 1.006, without hematuria or pyuria. Treatment with intravenous furosemide was continued, but decongestive therapy was limited by low blood pressure, and the dose of metoprolol was reduced. Testing was negative for human immunodeficiency virus, hepatitis B and C viruses, and syphilis. The glycated hemoglobin level was 5.0% (reference range, 4.3 to 5.7). A test for antinuclear antibodies was positive at a titer of 1:40 (reference value, <1:40), and serum complement levels were within normal limits. An interferon-γ release assay for Mycobacterium tuberculosis was negative. Serum protein electrophoresis and immunofixation showed an elevated IgA level of 829 mg per deciliter (reference range, 69 to 309), a low IgG level of 544 mg per deciliter (reference range, 614 to 1295), and a normal IgM level. Levels of serum free light chains were elevated, with a kappa light-chain level of 48.5 mg per liter (reference range, 3.3 to 19.4) and a lambda light-chain level of 101.6 mg per liter (reference range, 5.7 to 26.3). The serum free light-chain ratio (ratio of kappa to lambda free light chains) was normal at 0.48 (reference range, 0.30 to 1.70). Two IgA lambda M components (0.31 g per liter and 0.44 g per liter) were noted.

