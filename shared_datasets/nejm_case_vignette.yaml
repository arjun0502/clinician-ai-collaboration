  A 93-year-old woman was evaluated by her primary care physician because of dyspnea. The patient had been in her usual state of health, which included being independent with respect to activities of daily living and participating in light exercise daily, until 1 month before the current presentation, when dyspnea developed. Seven years before the current presentation, echocardiography was performed to assess a systolic murmur that radiated to the carotid arteries, and aortic stenosis was diagnosed. Five years before the current presentation, osteoarthritis that had been refractory to treatment resulted in total knee replacement; while the patient was hospitalized, arrhythmia was detected on telemetry and atrial fibrillation was diagnosed. During that hospitalization, repeat transthoracic echocardiography showed stable aortic stenosis, with a mean aortic-valve gradient of 18 mm Hg (<20 is mild), a peak aortic velocity of 2.8 m per second (<3.0 is mild), and an aortic-valve area of 1.5 cm2 (>1.5 is mild). Anticoagulant therapy was not started at that time. However, 15 months before the current presentation, atrial flutter developed and treatment with apixaban and metoprolol was started. Transthoracic echocardiography performed at that time showed progression of aortic stenosis, with a mean gradient of 23 mm Hg, a peak velocity of 3.0 m per second, and an aortic-valve area of 0.9 cm2. At the current presentation, the patient reported that the onset of dyspnea had been gradual and had progressed steadily during the past month. She stated that she had previously maintained a regular schedule of physical activity that had included dancing and daily walks but that the shortness of breath now prevented her from participating in these activities. She had no chest pain, palpitations, weight gain, leg swelling, or orthopnea, and she did not awaken at night with shortness of breath. She reported no melena or blood in the stool. Additional medical history included stage 3a chronic kidney disease, type 2 diabetes mellitus, sensorineural hearing loss in both ears (for which she used hearing aids), Hashimoto’s thyroiditis, vitamin B12 deficiency, obstructive sleep apnea, and depression. Granulomatosis with polyangiitis was diagnosed 17 years before the current presentation and had been treated with cyclophosphamide, followed by azathioprine and low-dose prednisone, which had led to remission; treatment with azathioprine was stopped 9 years before the current presentation, and low-dose prednisone therapy was continued. The most recent screening colonoscopy was performed when the patient was 78 years of age (15 years before the current presentation), and no polyps were seen. Other surgical history included hysterectomy and total replacement of one knee at 85 years of age and the other at 88 years of age. Other medications included aspirin, calcium carbonate, vitamin D, vitamin B12, citalopram, glipizide, and levothyroxine. The patient had no known adverse reactions to medications. Approximately 2.5 years before the current presentation, she had moved to an assisted-living facility after the death of her husband. She was a lifelong nonsmoker and did not drink alcohol or use illicit drugs. On examination, the temporal temperature was 36.2°C, the blood pressure 123/62 mm Hg, the pulse 61 beats per minute, the respiratory rate 12 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 23.2. She appeared mildly fatigued but was in good spirits. The jugular venous pressure was estimated at 5 cm of water. The heart rhythm was regular, with normal heart sounds, and S2 was normal. A grade 4/6 systolic murmur that did not obscure the second heart sound was noted. The lungs were clear on auscultation. The skin was not pale. She had no leg edema. An electrocardiogram (ECG) showed sinus rhythm. Imaging studies were obtained. Chest radiography showed a normal cardiomediastinal silhouette and no pulmonary edema, along with pleuroparenchymal scarring in the lung apexes with upper-lung volume loss—a finding that was unchanged from that seen on computed tomography (CT) that had been performed in the remote past. In addition, the radiograph showed coronary and aortic-valve calcifications.

case_26_2025: |
  An 11-year-old girl was transferred to the pediatric service because of chest pain, arm pain, and multiple bone and liver lesions seen on imaging. The patient had been in her usual state of health until 7 days before this presentation, when nausea, vomiting, and colicky abdominal pain developed, along with atraumatic pain in the right forearm, elbow, upper arm, and shoulder and in the sternal chest. Swelling of the right elbow was present; she had no fever or rigors. During the next few days, the nausea, vomiting, and abdominal pain abated, but the pain in the right arm and chest progressed, and she had discomfort when she took deep breaths. The patient’s mother took her to the emergency department of another hospital for evaluation. On presentation to the other hospital, the oral temperature was 37°C, the blood pressure 109/53 mm Hg, the heart rate 97 beats per minute, the respiratory rate 26 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. No axillary, inguinal, or cervical lymphadenopathy was noted on palpation. Cardiopulmonary auscultation was unremarkable. The abdomen was nontender, and there was no hepatosplenomegaly. The right arm and shoulder were tender on palpation but otherwise unremarkable, without visible joint effusions. No rash was present. Neurologic examination showed no motor or sensory deficits. The blood levels of electrolytes, total bilirubin, aspartate aminotransferase, and alanine aminotransferase were normal, as were the results of kidney-function tests. An electrocardiogram showed sinus rhythm without ST-segment or T-wave abnormalities. Radiographs of the chest and the right forearm, elbow, and shoulder were normal. Venous ultrasonography of the right upper arm showed no evidence of deep-vein thrombosis but was notable for two prominent lymph nodes in the posterior elbow. There was no effusion in the right elbow joint or right axillary lymphadenopathy. Ultrasonography of the right upper abdomen showed a nonspecific, well-circumscribed, hypoechoic lesion (measuring 9 mm in diameter) in the peripheral inferior right hepatic lobe. Magnetic resonance imaging (MRI) of the right upper arm, elbow, and shoulder was performed with the administration of gadolinium-based contrast material. There was a lesion in the right humeral head that was hyperintense on T2-weighted imaging and was associated with contrast enhancement. No subperiosteal or intraosseous collections were present. MRI of the chest revealed a T2-hyperintense bone marrow–replacing lesion in the sternum. Whole-body MRI revealed two small T2-hyperintense lesions in the right hepatic lobe. Treatment with naproxen was initiated, and the patient’s pain abated. Owing to the multifocal bone and liver lesions seen on imaging, she was transferred to this hospital for further evaluation. On arrival, the patient reported no further pain. She had normal vital signs with no fever; the remainder of the physical examination was normal. She did not report easy bruising or bleeding, night sweats, weight loss, anorexia, or rash. Her medical history was notable for eczema, as well as recurrent skin and soft-tissue infections due to methicillin-resistant Staphylococcus aureus (MRSA), for which she had most recently been treated with trimethoprim–sulfamethoxazole 2 months before this presentation. She took no medications and was up to date with all routine childhood immunizations. There were no known adverse reactions to medications. She lived in a suburb in Massachusetts with her mother and grandmother. She reported no recent travel or recent changes in dietary habits. She had not consumed raw, undercooked, or unpasteurized foods. The family had recently gotten a kitten; there were no other pets in the home. Subsequent MRI of the upper abdomen confirmed the presence of two T2-hyperintense lesions in the liver and revealed an additional T2-hyperintense lesion in the spleen. The hepatic lesion that had been seen on ultrasonography had peripheral (rim) enhancement during the portal venous phase. Diffusion-weighted imaging revealed numerous punctate hyperintense lesions throughout the liver, which had not been detected on any of the routine sequences. The literature supports that diffusion-weighted imaging is more sensitive for the detection of liver lesions than conventional T2-weighted imaging, with or without the administration of contrast material. Only the largest of these lesions had been visible on ultrasonography. Serologic testing was negative for human immunodeficiency virus (HIV) infection and Toxoplasma gondii infection.

