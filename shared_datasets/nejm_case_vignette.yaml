  A 28-year-old woman was transferred to the intensive care unit (ICU) of this hospital because of progressive respiratory failure. The patient had been in her usual state of health until approximately 3.5 years before the current admission, when she was evaluated in the emergency department of a hospital affiliated with this hospital because of the acute onset of dyspnea after 4 weeks of productive cough. She had a history of exercise-induced asthma, for which she had briefly used inhaled albuterol as a teenager. The evaluation in the emergency department was notable for wheezing; chest radiography reportedly showed peribronchial cuffing. The patient was treated with oral prednisone and inhaled fluticasone and albuterol. Nine days later, she had a consultation with a pulmonologist at the other hospital. On pulmonary-function testing performed 1 month later, the spirometry results and lung volumes were normal, but the diffusing capacity of the lungs for carbon monoxide was severely reduced. Two months later, at a follow-up visit with the pulmonologist, the patient reported exertional dyspnea that was worse than expected during strenuous physical activity. The white-cell count was 9150 per microliter (reference range, 4000 to 10,800), and the eosinophil count was 897 per microliter (reference value, <680). The IgE level was 501 IU per milliliter (reference value, <114). Testing for antibodies to aspergillus and strongyloides was negative, as was a stool analysis for parasites. Allergen testing was reportedly reactive to oak, dust mites, and dog and cat dander. Computed tomography (CT) of the chest, performed without the administration of contrast material, showed diffuse, centrilobular, nodular ground-glass opacities in both lungs with mild enlargement of several mediastinal lymph nodes. The findings were thought to be indicative of hypersensitivity pneumonitis. Biopsy of the lung and a trial of prednisone were recommended, but the patient chose not to pursue additional diagnostic testing or treatment. Two years later, and 1 year before the current admission, the patient had a consultation with a cardiologist because of worsening exertional dyspnea and lightheadedness. The heart rate was 94 beats per minute. Echocardiography showed normal left ventricular size and function, mild right ventricular dilatation, and no evidence of clinically significant valvular disease. The right ventricular systolic pressure was 37 mm Hg (reference value, <29), and there was evidence of trace right-to-left interatrial shunting after the administration of agitated saline. Transesophageal echocardiography showed right-to-left interatrial shunting that was described as trivial. Eleven months later, and 3 weeks before the current admission, the patient returned to the pulmonologist because of progressive exertional dyspnea and lightheadedness. The heart rate was 115 beats per minute, and the blood pressure was 88/61 mm Hg. The oxygen saturation, obtained while she was breathing ambient air, was 91% at rest and decreased to 86% after she had walked 30 m. She was referred to the emergency department of the other hospital. The d-dimer level was 455 mg per deciliter (reference value, <230). The white-cell count was 8180 per microliter, and the eosinophil count was 210 per microliter. Blood levels of alanine aminotransferase, aspartate aminotransferase, troponin, C-reactive protein, and thyrotropin were normal, as were the erythrocyte sedimentation rate and the results of kidney-function tests. The urine human chorionic gonadotropin level was undetectable. Testing for human immunodeficiency virus (HIV) types 1 and 2 was negative, as was testing for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2). CT of the chest, performed after the administration of intravenous contrast material that was timed for evaluation of the pulmonary arteries, showed no pulmonary emboli. Numerous ground-glass opacities were present in both lungs. Confluent hilar and mediastinal lymphadenopathy was noted, and there was a small pericardial effusion but no pleural effusions. Supplemental oxygen was prescribed for ongoing outpatient use, and a lung biopsy was planned. Two weeks later, and 6 days before the current admission, the patient returned to the emergency department of the other hospital because of progressive leg edema and dyspnea with minimal exertion. The heart rate was 110 beats per minute, the blood pressure 96/73 mm Hg, and the oxygen saturation 94% while she was receiving supplemental oxygen through a nasal cannula at a rate of 3 liters per minute. The weight was 73.4 kg. Edema was present in both legs, extending from the ankle to the mid-thigh. The N-terminal pro–B-type natriuretic peptide level was 3640 pg per milliliter (reference value, <125). Chest radiography showed persistent reticulonodular opacities and a small right pleural effusion. Electrocardiography showed sinus tachycardia, a rightward axis, right ventricular hypertrophy, and anterior T-wave inversions. The patient was transferred to the medical unit of a second hospital affiliated with this hospital. On the patient’s arrival at the second hospital, the oxygen saturation was 94% while she was receiving supplemental oxygen through a nasal cannula at a rate of 3 liters per minute. The heart rate was 105 beats per minute, with an augmented pulmonary component of S2 (known as P2), a right ventricular S3, and right ventricular heave. Jugular venous distention was present, along with 2+ edema in both legs, extending to the thigh. Breath sounds were diminished at the lung bases. The white-cell count, differential count, and platelet count were normal; the alanine aminotransferase level was 210 U per liter (reference range, 0 to 40), and the aspartate aminotransferase level was 56 U per liter (reference range, 0 to 40). Blood levels of electrolytes, lactate, troponin T, alkaline phosphatase, bilirubin, and hemoglobin were normal, as were the results of kidney-function tests. Urinalysis was normal. Testing for common respiratory pathogens, including SARS-CoV-2, was negative. Transthoracic echocardiography reportedly showed a small left ventricle with normal function, a markedly dilated and hypokinetic right ventricle, and interventricular septal compression. The right ventricular systolic pressure was estimated to be 91 mm Hg. A ventilation–perfusion scan showed no perfusion defect in the lung. Ultrasonography of the liver reportedly showed normal hepatic parenchyma and patent vasculature; a right pleural effusion was present, and the inferior vena cava and hepatic veins were dilated. Intravenous furosemide was administered, and the net fluid balance was −1000 ml during the first 24 hours. The next day, right heart catheterization was performed. The right atrial pressure was 14 mm Hg (reference value, <7), the pulmonary arterial pressure 99/56 mm Hg (reference ranges, 15 to 28 [systolic] and 6 to 16 [diastolic]), the mean pulmonary arterial pressure 71 mm Hg (reference value, <20), the pulmonary capillary wedge pressure 12 mm Hg (reference value, <15), and the cardiac index on thermodilution 1.1 liters per minute (reference range, 2.8 to 4.2). The pulmonary arterial pressure and pulmonary capillary wedge pressure did not change substantially after the administration of inhaled nitric oxide. Antinuclear antibodies, antineutrophil cytoplasmic antibodies, anti–double-stranded DNA antibodies, anti–topoisomerase I antibodies, anti-Ro antibodies, anti-La antibodies, anti–U1 ribonucleoprotein antibodies, and anti–cyclic citrullinated peptide antibodies were not detected. Testing for antibodies to strongyloides, schistosoma, and aspergillus was negative, as was testing for rheumatoid factor, galactomannan, and 1,3-β-d-glucan. The IgE level was 405 IU per milliliter, and the aldolase level was 10.5 U per liter (reference value, <8.1). The patient was transferred to the ICU of the second hospital for a trial of intravenous epoprostenol. Additional intravenous furosemide was administered, and the net fluid balance was −700 ml during the second hospital day. During the next 48 hours, as the dose of epoprostenol was slowly increased to 8 ng per kilogram of body weight per minute, the patient had increased dyspnea with any activity, including talking. The oxygen saturation was maintained at 90% with supplemental oxygen delivered through a nonrebreather mask at a rate of 15 liters per minute. The patient also reported jaw pain and headache. Additional intravenous furosemide was administered, and the net fluid balance was −1200 ml during the third and fourth hospital days. The pulmonary arterial pressure was 100/46 mm Hg, the pulmonary capillary wedge pressure 9 mm Hg, and the central venous pressure 12 mm Hg. CT of the chest, performed without the administration of contrast material, showed diffuse, centrilobular, nodular ground-glass opacities in both lungs, increased dilatation of the main pulmonary artery as compared with the previous CT study, new pleural effusions, a stable small pericardial effusion, and new interlobular septal thickening. The dose of epoprostenol was decreased to 6 ng per kilogram per minute. The patient was transferred to the ICU of this hospital for additional evaluation and treatment. On the patient’s arrival at this hospital, the system review was also notable for intermittent blue discoloration of the fingertips and lips with exertion. Other medical history included gastroesophageal reflux disease and seasonal allergies. Surgical history included knee arthroplasty. The patient took a multivitamin daily. Hydrocodone and oxycodone had caused nausea. The patient worked as an educator while attending school and lived with roommates. She drank wine rarely, had never smoked tobacco but had vaped electronic cigarettes, and had smoked marijuana. Her travel history included trips to West Africa and the Caribbean. There were no exposures to animals, mold, or insects and no occupational exposures. The patient’s biologic family history was unavailable. On examination, the temperature was 37.4°C, the heart rate 116 beats per minute, the blood pressure 104/70 mm Hg, the respiratory rate 22 breaths per minute, and the oxygen saturation 97% while the patient was receiving supplemental oxygen through a high-flow nasal cannula at a rate of 60 liters per minute (fraction of inspired oxygen, 0.80). The pulmonary arterial pressure was 101/65 mm Hg, and the central venous pressure was 15 mm Hg. The weight was 68.5 kg. The patient appeared uncomfortable and tachypneic but was able to speak in short sentences. Auscultation of the chest revealed tachycardia, an augmented P2, a grade 2/6 systolic ejection murmur, and rales in both lower lungs. There was 2+ edema in both legs. The white-cell count, differential count, and hemoglobin level were normal; the alanine aminotransferase level was 80 U per liter (reference range, 7 to 33), the aspartate aminotransferase level 58 U per liter (reference range, 9 to 32), and the platelet count 83,000 per microliter (reference range, 150,000 to 400,000). The bilirubin level was normal, as were the results of kidney-function tests. High-resolution CT of the chest, performed after the administration of contrast material and according to the interstitial lung disease protocol, confirmed the findings from the previous CT study. In addition, bowing of the interventricular septum was present, a finding compatible with right ventricular pressure overload. Intravenous furosemide and vasopressin were administered, along with oral prednisone.

