  A 79-year-old man was admitted to the Third Affiliated Hospital of Sun Yat-sen University in Guangzhou, China, because of dyspnea and edema in the arms and legs. The patient had been in his usual state of health until 17 months before the current admission, when he was admitted to another hospital because of an acute inferolateral ST-elevation myocardial infarction for which he received a drug-eluting stent in the left circumflex artery. During that admission, computed tomography (CT) of the chest, performed without the administration of intravenous contrast material, reportedly showed coronary-artery calcification but was otherwise normal. Treatment with aspirin, clopidogrel, atorvastatin, perindopril, and metoprolol was started, and the patient was discharged home. Three months later, he underwent planned staged percutaneous coronary intervention for a chronic occlusion of the right coronary artery. Two months before the current admission, the patient presented to the Third Affiliated Hospital of Sun Yat-sen University because of exertional chest discomfort. An electrocardiogram showed sinus arrest with junctional bradycardia and retrograde P waves. The blood level of thyrotropin was normal. Treatment with metoprolol was stopped. The results of transthoracic echocardiography were reportedly normal. Coronary angiography showed patent stents in the left circumflex and right coronary arteries. A permanent dual-chamber pacemaker was implanted, but there was procedural difficulty during implantation of the atrial lead, with low sensing and high pacing thresholds obtained at multiple sites in the right atrium where implantation attempts were made, including the right atrial appendage. Ultimately, an unconventional implantation site (the ostium of the right atrial appendage) was chosen, which resulted in a pacing threshold of 0.5 V (reference value, <1.0), a sensing threshold of 1.5 mV (reference value, ≥1.5), and a pacing impedance of 722 ohms (reference range, 400 to 1000) in the right atrial lead. After pacemaker implantation, the patient’s exertional symptoms resolved. Treatment with metoprolol was restarted, and he was discharged home. One month after discharge, dyspnea on exertion developed, and the patient had swelling of the face, arms, and legs. Over the course of the next 4 weeks, dyspnea persisted and edema worsened. The patient was evaluated in his outpatient cardiologist’s office and, from there, was admitted to the Third Affiliated Hospital of Sun Yat-sen University. At the hospital, the patient reported no weight change, anorexia, dysphagia, odynophagia, voice change, ocular symptoms, chest pain or pressure, orthopnea, paroxysmal nocturnal dyspnea, hemoptysis, cough, palpitations, dizziness, lightheadedness, syncope, new rashes, gastrointestinal symptoms, or neurologic symptoms. Medical history included infection with severe acute respiratory syndrome coronavirus 2 approximately 6 months earlier. Medications included aspirin, clopidogrel, atorvastatin, metoprolol, and perindopril. He had no known adverse reactions to medications. There was no known family history of cardiovascular disease or cancer. The patient was a retired physician and lived in an urban area of southern China with his spouse. He had smoked a half pack of cigarettes daily for 40 years but had quit approximately 10 years before the current admission. He did not drink alcohol or use illicit drugs. On examination, the axillary temperature was 36.1°C, the heart rate 60 beats per minute, the blood pressure 122/70 mm Hg, the respiratory rate 16 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The face appeared edematous without discoloration. The jugular venous pressure was 15 cm of water. Auscultation of the chest revealed bibasilar rales. There was 3+ symmetric edema in the arms and legs. The remainder of the examination was normal. The white-cell count and differential count and the levels of bilirubin, alkaline phosphatase, glycated hemoglobin, thyrotropin, and fibrinogen were all normal, as were the prothrombin time and partial-thromboplastin time. A test for human immunodeficiency virus (HIV) types 1 and 2 was negative. In accordance with the standard protocol used at the Third Affiliated Hospital of Sun Yat-sen University, the patient underwent laboratory testing that is routinely performed in older patients on admission, including testing for blood levels of alpha-fetoprotein, CA 125, CA 19-9, and carcinoembryonic antigen; all test results were reported to be normal. A blood sample was obtained for culture. An electrocardiogram showed ventricular pacing and evidence of atrioventricular dissociation. Pacemaker interrogation showed that the pacing and sensing thresholds of the right ventricular lead were normal, but the pacing threshold of the right atrial lead was greater than 8.0 V, the sensing threshold was undetectable, and the pacing impedance was 1197 ohms. Fluoroscopy showed that the position of the atrial lead had changed from that seen at the time of lead placement 2 months earlier. Transthoracic echocardiography revealed an echodensity in the right atrium that measured 5 cm by 4 cm with heterogeneous and hypoechoic internal areas; the mass had not been present on transthoracic echocardiography that had been performed 2 months earlier. The mass obliterated the right atrium and encompassed the pacemaker lead. There was evidence of inferolateral regional hypokinesis with global normal ventricular function. Mild tricuspid regurgitation, a mildly elevated estimated right ventricular systolic pressure, and moderate pericardial effusion were noted. Neither the transtricuspid pressure gradient nor the degree of respirophasic variation in intracardiac velocity could be measured. The inferior vena cava and superior vena cava were difficult to see. The next day, CT angiography of the chest was performed after the administration of intravenous contrast material. An irregular mass in the right atrium that measured 9.1 cm by 7.6 cm by 10.4 cm was identified. The floating-vessel sign was present, which indicated that a coronary artery was encased by the mass; however, there was no vascular involvement, invasion, or compression associated with the mass. Additional findings included multiple enlarged lymph nodes in the mediastinum, coronary-artery calcification, segmental pulmonary emboli in the right upper lobe and right lower lobe, pulmonary nodules in both lungs, moderate pericardial effusion, a dilated inferior vena cava without a mass, and bilateral pleural effusions. Low-molecular-weight heparin was administered subcutaneously, and treatment with oral furosemide, spironolactone, and empagliflozin was started. The pacemaker setting was changed owing to malfunction of the atrial lead. Empirical treatment with cefoperazone in combination with sulbactam was administered intravenously. During the next several days, edema continued to increase and dyspnea persisted. On the sixth hospital day, transesophageal echocardiography was performed; the mass measured 8.4 cm by 7.1 cm by 6.0 cm and obliterated the right atrium. The mass abutted the aortic root and appeared to infiltrate adjacent tissues. It showed varied internal color Doppler signals, a finding that was possibly consistent with entrapped vessels. Blood cultures obtained at the time of the current admission showed no growth.

case_33_2025: |
  A 27-year-old man was admitted to the medical service of this hospital because of abnormal behaviors and confusion. The patient had been in his usual state of health until 2 months before the current presentation, when his family and outpatient mental health providers noticed abnormal behaviors and an increasing amount of paranoia and confusion after he had independently discontinued his medications prescribed to treat bipolar I disorder. The patient was noted to have repeatedly called his mother; he reported being persecuted, and his mother stated that he had been speaking in nonsensical, cryptic statements. The patient had no recollection of their conversation shortly after each phone call. On the day of admission, the patient became agitated upon trying to sleep, asking for the noise generated by the crickets outside to be silenced, and his partner brought him to the emergency department of this hospital for evaluation. On evaluation in the emergency department, the patient’s heart rate was 116 beats per minute, and all other vital signs were normal. A mental status examination showed no evidence of delusions or response to internal stimuli but was notable for a disorganized and tangential thought process with impaired orientation and attention, as well as limited short- and long-term recall. Lactated Ringer’s solution was administered intravenously, and treatment with oral lorazepam was started. He was transferred to the acute psychiatric service of this hospital, and treatment with risperidone was initiated. On the evening of the second hospital day, the patient had a tonic–clonic seizure that was witnessed by hospital staff members. Treatment with intravenous midazolam was administered, and the convulsions resolved. The patient was transferred to the medical service of this hospital. On arrival, the patient was somnolent and sedated but reported no headache or weakness. A review of systems was negative for weight loss, palpitations, changes in stool, changes in vision, tremors, nausea, or previous seizurelike activity. On examination, the oral temperature was 36.1°C, the blood pressure 144/70 mm Hg, the heart rate 129 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. He appeared restless but not diaphoretic. No mydriasis, ophthalmoparesis, or proptosis was present. The thyroid was palpable, without nodules or enlargement. Cardiac auscultation was notable only for tachycardia, without murmur. The neurologic examination showed an unsteady gait; however, no motor weakness, cranial nerve asymmetry, pronator drift, dysmetria, or tremor was present. The patient’s psychiatric history was notable for bipolar I disorder and attention deficit–hyperactivity disorder. He had had multiple previous hospital admissions for mania and self-injurious behavior. His medical history was notable for remote hyperthyroidism, which had been treated with nonselective beta-blockers and no antithyroid agents. He took no medications but had previously received prescriptions for lithium carbonate, propranolol, bupropion, clonazepam, buspirone, and gabapentin. He was unemployed and lived with his partner in a suburb in Massachusetts. The patient drank alcohol daily and used marijuana often but did not use stimulants or other recreational drugs. The patient’s father had bipolar I disorder. The blood levels of electrolytes, alanine aminotransferase (ALT), aspartate aminotransferase (AST), total bilirubin, and alkaline phosphatase were normal, as were results of tests of kidney function. The white-cell count was 12,600 per microliter (reference range, 4000 to 11,000), with a neutrophil predominance, and the hemoglobin level and platelet count were normal. Urinalysis revealed ketonuria and mild proteinuria. Serum levels of lithium were below the limit of detection. Blood and urine toxicology screenings were positive for benzodiazepines; the blood alcohol level was undetectable. Screening tests for human immunodeficiency virus infection and syphilis were negative. Levels of vitamin B12 and folic acid were normal. An electrocardiogram showed sinus tachycardia with no ST-segment or T-wave abnormalities. Subsequently, an electroencephalogram (EEG) showed no epileptiform discharges but showed generalized overriding beta frequencies. Computed tomography (CT) of the head was performed without the administration of intravenous contrast material. No evidence of acute hemorrhage, territorial infarction, mass effect, or midline shift was present. The cerebral ventricular system and cisternal spaces appeared normal for the patient’s age, with no evidence of hydrocephalus or abnormal extra-axial fluid collections. No calcifications, bone abnormalities, or parenchymal hyperdensities were identified. Magnetic resonance imaging (MRI) of the head was performed after the administration of intravenous contrast material to further investigate for subtle parenchymal abnormalities, vascular issues, and demyelinating disease. The overall diagnostic quality of the MRI was limited by motion artifacts, but there was no evidence of acute or chronic infarction, venous sinus thrombosis, intracranial mass, or abnormal enhancement consistent with neoplasm, infection, or inflammation. No restricted diffusion was observed on diffusion-weighted imaging, and susceptibility-weighted sequences showed no evidence of microhemorrhages or abnormal signals. No abnormal enhancement or white-matter signals suggestive of active demyelination were present. A lumbar puncture was performed as part of the evaluation of new seizure in this patient. The cerebrospinal fluid (CSF) was clear, and the opening pressure was normal. CSF analysis showed normal levels of protein and glucose, with 1 total nucleated cell per microliter (reference range, 0 to 5).

case_34_2025: |
  A 57-year-old woman was admitted to this hospital because of persistent visual disturbances involving the right visual field, episodes of shaking of the right arm and leg, and hyperintensities on T1-weighted magnetic resonance imaging (MRI) of the head. The patient had been in her usual state of health until 2 years before the current presentation, when frontotemporal and cervico-occipital headaches developed. The headaches occurred every 1 to 2 months, were associated with photophobia, and typically lasted for several hours to 1 day. Nineteen months before the current presentation, the patient was evaluated by her primary care physician. The physical examination was normal. A diagnosis of migraines was considered. MRI of the head was performed, and T2-weighted fluid-attenuated inversion recovery (FLAIR) sequences revealed signal abnormalities in the subcortical and periventricular white matter, which were considered to be nonspecific. The patient was evaluated by a neurology consultant, who agreed with the diagnosis of migraines and recommended the use of intranasal zolmitriptan. Six months before the current presentation, a severe headache developed suddenly while the patient was visiting a family member. She was evaluated at another hospital. Confusion was noted, along with generalized tonic–clonic seizure activity. Computed tomography (CT) of the head revealed hyperdensity concentrated in the sulci of the left parietal lobe, a finding that was thought to be indicative of small-volume convexal subarachnoid hemorrhage. CT angiography and venography of the head and neck showed asymmetric prominence of the left distal branches of the anterior cerebral artery that extended to the left posterior parietal region, where the presumed subarachnoid hemorrhage was located, as well as mild prominence of the cortical venous structures in that region — findings consistent with a pial arteriovenous fistula. MRI of the head was performed 10 hours after the initial presentation. T1-weighted sequences showed intrinsic hyperintensities that were most prominent along the left parietal lobe, a finding consistent with the presence of blood products related to subarachnoid hemorrhage. Cerebral angiography reportedly revealed a fistula in the left middle meningeal artery that was connected to the superior sagittal sinus. An embolic agent was injected into the fistula, and follow-up angiography showed successful complete occlusion of the fistula. After the procedure, the patient continued to have headaches, and visual disturbances developed, including visual hallucinations and double vision that predominantly occurred on the right side, as well as visual auras. Treatment with lacosamide was started for possible seizures, and visual symptoms abated. After discharge from the other hospital, the patient returned home and attended a follow-up visit in the neurology clinic affiliated with this hospital. Treatment with lacosamide was continued, and in consultation with the neurosurgery team, plans were made for repeat cerebral angiography to be performed in 6 months. One month later, and 5 months before the current presentation, generalized tonic–clonic seizure activity recurred. The patient was admitted to this hospital. CT of the head showed hyperattenuating embolic material with a linear branching pattern along the falx cerebri and cortical vessels surrounding the posterior superior sagittal sinus in the left cerebral hemisphere, findings suggestive of previous embolization of a vascular malformation. The area where the presumed subarachnoid hemorrhage had been noted previously was stable on both CT and MRI. Cerebral angiography identified evidence of previous embolization but showed no evidence of a persistent shunt or venous thrombosis. The patient reported persistent visual disturbances, which did not have a correlate on electroencephalography (EEG) and were suspected to be due to the presence of blood in the visual cortex. MRI of the head was also performed and revealed several foci of diffusion restriction in the right parietal lobe on diffusion-weighted sequences that corresponded to hyperintensity on FLAIR sequences — findings compatible with acute or early subacute ischemic infarcts, which were thought to be embolic. Additional, nonspecific hyperintensities in the periventricular white matter were unchanged from the findings seen on MRI 18 months earlier. The dose of lacosamide was increased, and the patient was discharged from the hospital. One month later, and 4 months before the current presentation, the patient sustained a fall during an episode of dizziness and lightheadedness, and she was again admitted to this hospital. She had persistent visual disturbances involving the right visual field that she described as “flashing lights.” CT of the head again showed hyperdensity in the sulci of the posterior paracentral lobule in the left parietal lobe and, to a lesser degree, along the precentral sulcus of the right frontal lobe. No radiologically significant change from the previous study was noted. Long-term EEG monitoring showed no evidence of seizure activity or an EEG correlate that would explain the visual disturbances. Examination by an ophthalmology consultant was normal. The patient’s presenting symptoms were thought to be due to presyncope, and no changes were made to the antiepileptic regimen. One month later, and 3 months before the current presentation, blurry vision in both eyes and hoarseness developed. The patient had another generalized tonic–clonic seizure, and she was again admitted to this hospital. CT of the head showed a stable appearance of the hyperattenuation involving the sulci of the left parietal lobe, as well as a few scattered foci along the sulci of the right frontal lobe. These findings were thought to be consistent with previous embolization of the fistula. MRI of the head was also performed, and T1-weighted sequences showed nodular intrinsic hyperintensities in the sulci and leptomeninges of the left parietal and occipital lobes, with associated susceptibility signals that were suggestive of mineralization. These findings were similar to the MRI findings seen 2 months earlier. New nodular intrinsic hyperintensities were noted along the dorsal midbrain and in the posterior right sylvian fissure, the operculum in the right frontal lobe, the convexity of the right anterior temporal lobe, and the convexity of the left and right medial frontal lobes. Lumbar puncture was performed, and cerebrospinal fluid (CSF) analysis showed 1 red cell per microliter, 1 nucleated cell per microliter, and normal levels of glucose and protein. Positron-emission tomography of the head showed low fluorodeoxyglucose uptake in the region where the left parieto-occipital sulcal abnormalities had been seen on recent MRI, which indicated hypometabolism in that area. Treatment with levetiracetam was added, and the patient was discharged from the hospital. Cytologic evaluation of the CSF showed no malignant cells, and flow cytometry of the CSF showed no evidence of a monoclonal B-cell population. One month later, and 2 months before the current presentation, the patient was evaluated in the otolaryngology clinic affiliated with this hospital because of hoarseness. Flexible laryngoscopy revealed immobility of the right vocal cord. The patient was also evaluated in the neurology clinic affiliated with this hospital because of increased sleepiness and episodes of tremulousness in the right arm and leg. Given the possibility of medication side effects, the course of levetiracetam was tapered off, and treatment with clobazam was started. The episodes of tremulousness became less frequent but did not abate, and the visual disturbances involving the right visual field persisted. On the day of the current presentation, the episodes of tremulousness in the right arm and leg increased in frequency and length, lasting up to 10 minutes at a time. No loss of consciousness occurred. The patient presented to the emergency department of this hospital for evaluation. The patient reported increasingly frequent visual disturbances involving the right visual field, which she described as “seeing rainbows, circles, and flashes.” Additional medical history included allergic rhinitis, vitamin D deficiency, and migraines. Medications included clobazam and lacosamide. She had no known allergies to medications. Before this illness, the patient had worked in real estate. She lived with her husband and two children in Massachusetts. She was a lifelong nonsmoker, consumed alcohol only occasionally, and did not use illicit drugs. Her family history included migraines in her father and brother, stroke in her mother, and melanoma in her father. On examination, the temporal temperature was 36.5°C, the blood pressure 104/62 mm Hg, the heart rate 57 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 96% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 18.5. The patient was alert and oriented. Language was fluent, and comprehension, repetition, and naming were intact. On examination of the cranial nerves, saccadic breakdown was noted, along with slight vertical diplopia on left lateral gaze. Strength, tone, and muscle bulk were normal. Finger-to-nose testing showed a slight intention tremor and mild dysmetria that was greater on the left side than on the right side. The remainder of the neurologic examination was normal. The blood levels of electrolytes, glucose, aspartate aminotransferase, alanine aminotransferase, alkaline phosphatase, bilirubin, albumin, and total protein were normal, as were the results of kidney-function tests. The complete blood count with differential count was normal.

case_35_2025: |
  A 5-year-old boy was admitted to this hospital because of fever and rash. The patient had been well until 3 days before the current presentation, when his mother noticed that he was not eating and drinking as much as usual. Later that day, the oral temperature measured at home was 39.2°C. The patient’s mother gave him acetaminophen, and his fever abated. Two days before the current presentation, an itchy rash appeared on the dorsal surface of both feet and spread toward the shins. The patient’s mother took him to the emergency department of another hospital. On evaluation, the temporal temperature was 36.7°C. The patient appeared well. Diffuse blanching macules and papules were present on the legs, and a few scattered papules were seen on the buttocks and lower back. The rash was considered to be consistent with exposure to poison ivy. Treatment with ibuprofen was administered, a course of oral prednisone was prescribed, and the patient was discharged home. The patient’s mother was instructed to give him antihistamines as needed for itching. One day before the current presentation, the patient’s mother gave him diphenhydramine and applied calamine lotion to his body; she had not filled the prescription for prednisone. The patient seemed to scratch the rash less often; however, it spread to his arms. The patient’s mother took him to the pediatric primary care clinic affiliated with the other hospital. On examination, the temporal temperature was 37.0°C, and the patient appeared well. The conjunctivae were injected, and there was a palpable posterior cervical lymph node on the right side that was soft and mobile. Small, circular, dark red-purple, nonblanching papules were present on the legs, buttocks, and lower back, and papules had begun forming on the forearms. The blood levels of electrolytes, alanine aminotransferase, aspartate aminotransferase, and total bilirubin were normal, as were the results of tests of kidney function. The patient’s mother was instructed to monitor the rash at home, and a follow-up appointment was scheduled. When the patient awoke on the day of the current presentation, he was scratching his skin continuously and refused to walk. The oral temperature measured at home was 40.2°C and did not decrease after acetaminophen and ibuprofen were given. The patient’s mother brought him to the emergency department of this hospital. On presentation, the patient had no sore throat, abdominal pain, nausea, vomiting, or diarrhea. His medical history included iron deficiency, constipation, reactive airway disease, and benign sleep myoclonus. He had met normal growth and developmental milestones and had received all routine childhood vaccinations. Medications included albuterol as needed for wheezing, diphenhydramine and calamine lotion as needed for itching, and acetaminophen and ibuprofen as needed for fever. He had no known adverse reactions to medications. The patient lived with his parents in a suburban area of New England, and until 5 days before this admission, he had been attending a local summer camp, where he participated in various outdoor activities. He had no history of travel outside the region. His mother had anemia, and his father had hypertension. The temporal temperature was 38.1°C, the blood pressure 98/69 mm Hg, the heart rate 102 beats per minute, the respiratory rate 26 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The patient appeared uncomfortable and was tearful. The conjunctivae were injected, and the right tympanic membrane was erythematous. Erythematous macules were seen on the palate and buccal mucosa, with no ulceration or fissuring of the lips. Palpable posterior cervical lymphadenopathy was present on the right side. The lungs were clear on auscultation, and the abdomen was nontender. He had nonblanching papules on the legs, buttocks, lower back, arms, and ears, with overlying excoriations. The hands and feet were swollen. He had mild erythema but no rash on the palms and soles.

case_36_2025: |
  A 55-year-old woman was admitted to this hospital because of recurrent rectal bleeding and shortness of breath. The patient had been in her usual state of health until 6 months before the current presentation, when hematochezia developed. She was evaluated at the emergency department of another hospital. The hemoglobin level was 8.0 g per deciliter (reference range, 12.0 to 16.0), with a normal mean corpuscular volume; the white-cell count and platelet count were normal. The patient was admitted to the hospital, and colonoscopy was performed; internal hemorrhoids were detected, but no masses, ulcers, or polyps were noted. Treatment with oral iron was initiated, and she was discharged home. Three months before the current presentation, hematochezia developed again, and the patient presented to the emergency department of a second hospital. The hemoglobin level was 6.4 g per deciliter, with a mean corpuscular volume of 73 fl (reference range, 80 to 100). The white-cell count was 3700 per microliter (reference range, 4000 to 11,000), and the platelet count was normal. The ferritin level was 5 μg per liter (reference range, 10 to 200), and the transferrin saturation was 3% (reference range, 14 to 50). The patient was admitted to the second hospital. Two units of packed red cells were transfused, and an intravenous infusion of iron was administered. Esophagogastroduodenoscopy (EGD) with additional enteroscopy reportedly showed a normal-appearing esophagus, stomach, and duodenum. Owing to the patient’s anatomy, only the proximal jejunum could be seen and its appearance was normal; no blood was noted in the gastrointestinal tract. The rectal bleeding abated spontaneously, and the patient was discharged home. Two weeks later, the patient was evaluated in the outpatient gastroenterology clinic of the second hospital. Video-capsule endoscopy was reportedly negative. Given the negative endoscopic evaluation, treatment with scheduled iron infusions was started. Two months before the current presentation, the patient had recurrent hematochezia, along with fatigue, prompting her to present to the emergency department of this hospital. The vital signs were normal, and the hemoglobin level was 6.8 g per deciliter, which led to admission to this hospital. Results of serum protein electrophoresis were normal, as were the serum levels of free kappa and free lambda light chains. The blood levels of copper, lead, and zinc were also normal. One unit of packed red cells was transfused, and intravenous iron was administered, which resulted in a decrease in symptoms. Given the recent negative endoscopic evaluation and the absence of ongoing rectal bleeding, further investigation was deferred, and the patient was discharged home with instructions to return to her gastroenterologist for follow-up care. On the day of the current presentation, melena developed, and the patient returned to the emergency department of this hospital. On presentation, the vital signs were normal. The hemoglobin level was 6.5 g per deciliter, the white-cell count 3170 per microliter with a normal differential count, and the platelet count 144,000 per microliter. Computed tomography (CT) with angiography was performed according to a gastrointestinal bleeding protocol that was specific to the abdomen and pelvis. No active gastrointestinal bleeding was identified on imaging. The celiac and mesenteric arterial vasculature was normal, including a patent hepatic artery and superior mesenteric artery. There was occlusion of the left portal vein with restoration of flow in the distal segment. The right portal vein was dilated, and stenosis was present at the junction of the right portal vein and the main portal vein, which was patent. Associated splenomegaly was noted, along with portosystemic collaterals in the hepatic hilum. The study also showed evidence of a previous hepaticojejunostomy in the hepatic hilum surrounded by the collaterals and the presence of expected pneumobilia associated with hepaticojejunostomy. One unit of packed red cells was transfused, and the patient was admitted to this hospital for management of symptomatic anemia and recurrent hemorrhage. On evaluation, she reported ongoing hematochezia and melena, as well as fatigue and mild dyspnea on exertion. A review of systems was negative for weight loss, night sweats, abnormal bleeding from other mucosal sites, bruising, jaundice, pruritus, pedal edema, abdominal pain, and distention. The patient’s medical history was notable for seronegative ocular myasthenia gravis and symptomatic premature ventricular complexes, for which she had undergone cardiac ablation. Surgical history was notable for cholecystectomy, which had been performed 20 years before the current presentation; the procedure had been complicated by laceration of the bile duct, for which she had undergone open repair and hepaticojejunostomy. Appendectomy had been performed 4 years before the current presentation. The patient took no medications. She did not take nonsteroidal antiinflammatory drugs or dietary supplements. She had no known adverse reactions to medications. She lived in Massachusetts with her husband and adult child. She did not smoke, drink alcohol, or use recreational drugs. She was a retired educator. She reported no recent travel and had not lived outside the United States. She had no family history of liver disease, bleeding disorders, or cancer. The oral temperature was 36.1°C, the blood pressure 99/55 mm Hg, the heart rate 61 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. The weight was 85 kg, and the body-mass index (the weight in kilograms divided by the square of the height in meters) was 30. On examination, the skin was pale but not jaundiced. The abdomen was soft and nontender, without distention or palpable organomegaly. She did not have Terry’s nails, spider angiomas, or palmar erythema. The results of kidney-function tests were normal, as were blood levels of aspartate aminotransferase, alanine aminotransferase, bilirubin, and albumin. The prothrombin time was 13.9 seconds (reference range, 10.0 to 13.0), and the international normalized ratio was 1.2 (reference range, 0.8 to 1.1). Magnetic resonance cholangiopancreatography (MRCP) revealed an atrophic caudate lobe of the liver with associated focal intrahepatic biliary ductal dilatation. In addition, diffusion-weighted images showed a region of abnormal increased signal intensity and abnormal increased delayed enhancement that extended from the perihilar region to the superior surface of the liver near the confluence of the hepatic veins. These findings were associated with attenuation of the left and middle hepatic veins, occlusion of the main left portal vein, and stenosis at the origin of the right portal vein. EGD and colonoscopy showed erythematous mucosa and erosive gastropathy in the gastric antrum, as well as a hyperplastic polyp. Diverticulosis was also detected, without any vascular lesions or active bleeding.

case_1_2024: |
  A 25-year-old pregnant woman presented to the emergency department of the Poli District Hospital in the North Region of Cameroon because of vaginal bleeding after a snakebite. The patient had been in her usual state of health until 1 hour before this presentation, when she was bitten by a snake while walking with her family. On presentation to the emergency department, she reported fatigue, dizziness, abdominal pain, and pain and numbness in her left lower leg. The Glasgow Coma Scale score was 15 (on a scale of 3 to 15, with lower scores indicating greater alteration of consciousness). On examination, the heart rate was 134 beats per minute, the blood pressure 100/60 mm Hg, and the respiratory rate 20 breaths per minute while the patient was breathing ambient air. The physical examination was notable for mild conjunctival pallor and swelling in the inferior left lower leg, which had been tied with a tourniquet. The leg was tender with ecchymosis, and two fang marks were visible on the left foot. The patient had diffuse pain in the lower abdomen, intermittent contractions, and vaginal bleeding. Fetal movement was detected on palpation. The fetal heart rate was 112 beats per minute; ultrasonography was not available. The remainder of the physical examination was normal. The hemoglobin level was 7.0 g per deciliter (reference range, 11.5 to 15.0), the urea nitrogen level 145 mg per deciliter (51.8 mmol per liter; reference range, 15 to 45 mg per deciliter [5.4 to 16.1 mmol per liter]), the creatinine level 8.9 mg per deciliter (786.8 μmol per liter; reference range, 0.6 to 1.3 mg per deciliter [53.0 to 114.9 μmol per liter]), and the platelet count 36,000 per microliter (reference range, 150,000 to 450,000). Urine dipstick testing was positive for blood, and a 20-minute whole-blood clotting test revealed clotting abnormalities. The patient lived with her family in the North Region of Cameroon. She reported that she was at approximately 7 months’ gestation and had received no prenatal care. She had a history of six previous pregnancies. There was no other relevant medical or family history. She had been accompanied to the emergency department by her family members, who had brought the dead snake with them for identification.

case_2_2024: |
  A 57-year-old woman with resected stage IIIC cutaneous melanoma was admitted to this hospital because of fever. The patient had been in her usual state of health until 4 months before the current admission, when bleeding developed from a lesion on the right side of the scalp. After evaluation by her primary care physician, she was referred to a surgical clinic at another hospital; examination of a skin-biopsy specimen revealed ulcerated melanoma with positive margins. The patient was referred to the oncology clinic of this hospital. Three months before the current admission, a wide local excision of the scalp lesion and a neck lymph-node dissection were performed; examination of the specimens revealed metastatic melanoma in 2 of 26 lymph nodes. A diagnosis of stage IIIC melanoma was made. Molecular profiling identified the BRAF V600E mutation, and treatment with adjuvant therapy was planned to begin after the patient had recovered fully from surgery. One month before the current admission, the patient was evaluated in the oncology clinic for initiation of treatment with a combination of dabrafenib (a BRAF inhibitor) and trametinib (a MEK inhibitor) as targeted therapy for melanoma. She felt well, and the surgical wound had healed. Treatment with dabrafenib and trametinib was started. One day after the initiation of treatment with dabrafenib and trametinib, fever and nausea developed. Dabrafenib and trametinib therapy was temporarily discontinued, and treatment with acetaminophen and ibuprofen was started. Fever and nausea resolved after 1 day, and treatment with acetaminophen and ibuprofen was stopped. Once the patient had 1 day without recurrent fever after the antipyretic medications had been stopped, treatment with dabrafenib and trametinib was resumed. Two weeks before the current admission, fever recurred. The patient was evaluated at the other hospital. The blood levels of alanine aminotransferase (ALT), aspartate aminotransferase (AST), bilirubin, and alkaline phosphatase were normal, as were the complete blood count and the results of tests of kidney function. Treatment with dabrafenib and trametinib was again stopped, and treatment with acetaminophen and ibuprofen was started. Fever and nausea resolved after 1 day, and treatment with acetaminophen and ibuprofen was stopped. Once the patient had 1 day without recurrent fever after the antipyretic medications had been stopped, treatment with dabrafenib and trametinib was again resumed. Four days before the current admission, fever recurred. The patient was again evaluated at the other hospital. Results of liver tests and kidney-function tests were again normal, as was the complete blood count. Treatment with dabrafenib and trametinib was again stopped, and treatment with acetaminophen and ibuprofen was initiated. Daily fevers persisted for 4 days, and the patient was advised to present to the emergency department of this hospital for evaluation. On evaluation, the patient reported fatigue that had started 1 month earlier and had gradually increased in severity, as well as light-headedness when standing from a seated position. She also reported intermittent vomiting, loose stools, and pain in the right upper quadrant that increased after eating but no diarrhea or dysuria. She had a dry cough without shortness of breath. Other medical history included carpal tunnel syndrome that had been treated with carpal tunnel release surgery. The patient had no known drug allergies. She worked as a nurse and lived with her husband and two adult children in a coastal region of New England. She did not drink alcohol, smoke cigarettes, or use illicit drugs. Her father had hyperthyroidism; her mother had hypertension, diabetes mellitus, and cerebrovascular disease. The temporal temperature was 40.2°C, the blood pressure 85/53 mm Hg, the pulse 108 beats per minute, and the oxygen saturation 94% while the patient was breathing ambient air. She was diaphoretic and appeared ill. The mucous membranes were moist, and no lesions were present in the oropharynx. The heart sounds were regular, with no murmurs, and the lungs were clear on auscultation. There was mild tenderness in the right upper quadrant. No rash was present. The white-cell count was 5190 per microliter (reference range, 4500 to 11,000); 20% of the cells were bands (reference range, 0 to 10), and 10% were metamyelocytes (reference value, 0). The platelet count was 87,000 per microliter (reference range, 150,000 to 400,000). The blood level of creatinine was 2.73 mg per deciliter (241 μmol per liter; reference range, 0.60 to 1.50 mg per deciliter [53 to 133 μmol per liter]), AST 190 U per liter (reference range, 9 to 32), ALT 62 U per liter (reference range, 7 to 33), and alkaline phosphatase 173 U per liter (reference range, 30 to 100). Tests of a nasopharyngeal swab for adenovirus, human rhinovirus and enterovirus, influenza virus types A and B, parainfluenza virus types 1 through 4, respiratory syncytial virus, and severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) were negative. A blood specimen was obtained for culture. Imaging studies were obtained. Ultrasonography of the right upper quadrant revealed cholelithiasis without evidence of cholecystitis or biliary ductal dilatation. Computed tomography (CT) of the chest, abdomen, and pelvis, performed without the administration of intravenous contrast material, revealed findings suggestive of hepatic steatosis, pulmonary edema, small bilateral pleural effusions, subsegmental linear atelectasis, and bilateral lung nodules that were similar in appearance to those seen on staging CT performed 1 month earlier. Intravenous fluids were administered, and the blood pressure improved; empirical treatment with vancomycin, cefepime, metronidazole, and azithromycin was initiated. The patient was admitted to the hospital. On hospital day 2, fever and nausea resolved. There was no vomiting or loose stools. However, pain in the right upper quadrant had worsened. On hospital day 3, blood cultures were without growth, and treatment with vancomycin, cefepime, metronidazole, and azithromycin was discontinued. The patient remained afebrile. On hospital day 5, the blood level of AST was 407 U per liter, ALT 138 U per liter, and alkaline phosphatase 510 U per liter.

case_3_2024: |
  An 8-week-old male infant was admitted to the pediatric intensive care unit (PICU) of this hospital because of inconsolable crying, lethargy, weakness, and hypoxemia. The patient had been well until 7 days before the current presentation, when irritability and frequent crying developed. One day before the current presentation, the episodes of crying increased in duration, and the patient’s grandmother noticed that he cried more intensely when the right side of his abdomen was touched. The patient was evaluated at the pediatric primary care clinic of another hospital. The vital signs and physical examination were reportedly normal, and a diagnosis of discomfort due to gastrointestinal gas was considered. After the patient returned home, he had a crying episode that lasted for multiple hours while he was awake; the crying stopped while he was fully asleep. After he woke up, the crying continued for 8 hours and became weaker. During breast-feeding, the patient fed less vigorously than usual, and the latch onto the nipple was weaker. That night, the crying continued, and the patient became inconsolable. He had frantic movements of the arms and legs and slept only 1 hour. On the day of the current presentation, the inconsolable crying continued. The patient did not latch onto the nipple, and his mother expressed breast milk directly into his mouth. A family member called the pediatric primary care clinic and was instructed to bring the patient to the emergency department of this hospital for evaluation. In the emergency department, additional history was obtained from the patient’s family members. There had been no change in the frequency of wet diapers; the last bowel movement had occurred 2 days before this presentation. The patient had been born at a gestational age of 39 weeks 1 day by a normal spontaneous vaginal delivery after a normal pregnancy. The birth weight had been 4.5 kg (98th percentile), the length 54.6 cm (99th percentile), and the head circumference 36.5 cm (94th percentile). The patient had met normal developmental milestones. He had not yet received the routine immunizations recommended for 2-month-old infants. Medications included vitamin D supplements; there were no known medication allergies. The patient lived in an urban area of New England with his grandmother, who primarily cared for him, as well as his mother, father, and sister. His mother had depression, anxiety, and anemia. His father and sister were healthy. On examination, the axillary temperature was 37.2°C, the blood pressure 100/76 mm Hg, the heart rate 153 beats per minute, the respiratory rate 34 breaths per minute, and the oxygen saturation 97% while the patient was breathing ambient air. The weight was 7.1 kg (99th percentile), the height 62.5 cm (>99th percentile), and the head circumference 41.5 cm (99th percentile). The patient was alert but irritable. He cried weakly and could not be soothed. The anterior fontanelle was open, soft, and flat. The mucous membranes were moist. The heart rate was tachycardic and regular. The lungs were clear on auscultation. The abdomen was soft, with no hepatosplenomegaly. The results of the testicular examination were normal. There was no rash. The blood levels of glucose, lactic acid, lipase, aspartate aminotransferase, alanine aminotransferase, and bilirubin were normal, as were the results of kidney-function tests. The platelet count was 621,000 per microliter (reference range, 150,000 to 400,000); the remainder of the complete blood count and differential count was normal. The results of urinalysis and urine toxicology screening were normal. Tests for severe acute respiratory syndrome coronavirus 2, influenza A and B viruses, and respiratory syncytial virus were negative. Blood was obtained for culture. Radiography of the chest and abdomen and ultrasonography of the abdomen showed no abnormalities. While the patient was in the emergency department, he remained irritable and did not attain a calm awake state. He was admitted to this hospital. Four hours after presentation, lethargy developed. Additional testing was performed. Magnetic resonance imaging of the head showed no abnormalities. A lumbar puncture was performed for cerebrospinal fluid (CSF) analysis. The CSF glucose level was 54 mg per deciliter (3.0 mmol per liter; reference range, 50 to 75 mg per deciliter [2.8 to 4.2 mmol per liter]), and the CSF protein level was 104 mg per deciliter (reference range, 5 to 55); there were 1055 red cells per microliter and 2 nucleated cells per microliter, of which 70% were lymphocytes. A diagnosis of meningitis was considered. Empirical treatment with intravenous vancomycin, ceftriaxone, and acyclovir was started. Six hours after presentation, increased work of breathing developed, and the oxygen saturation decreased to 85% while the patient was breathing ambient air. Supplemental oxygen was administered through a nasal cannula at a rate of 2 liters per minute, and the oxygen saturation increased to 100%. The patient was transferred to the PICU. On arrival at the PICU, the patient was difficult to arouse. He had grunting respirations, head-bobbing, intercostal retractions, and an exaggerated abdominal breathing pattern. With vigorous stimulation, the patient had a weak hypophonic cry, gurgling, and stertor on inspiration. Ptosis was present in both eyes. When the eyes were opened by the examiner, the pupils were equal, round, and reactive. The face appeared symmetric and placid. There were few spontaneous movements of the arms, and the patient did not move his arms against gravity. There was no spontaneous movement of the legs, and diffuse hypotonia was present. Muscle bulk was normal and symmetric. Reflexes were decreased but preserved. Tracheal intubation was performed, and mechanical ventilation was initiated. Tachycardia and hypertension persisted despite the administration of boluses of sedative and analgesic agents and the initiation of continuous infusions of opioids and benzodiazepines.

case_5_2024: |
  A 36-year-old man was evaluated in the infectious diseases clinic of this hospital because of fevers. The patient had been in his usual state of health until 18 days before the current presentation, when he began to have a sensation of swelling in his throat. Three days later, the temporal temperature measured at home was 38.4°C. A home test for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) antigen was negative. The patient was evaluated in a local urgent care clinic, where he was told that there were white spots on his tonsils. Treatment with amoxicillin–clavulanic acid was started for a presumptive diagnosis of streptococcal pharyngitis. A throat culture was reportedly negative, but treatment with amoxicillin–clavulanic acid was continued. During the next 4 days, fevers persisted. A repeat home test for SARS-CoV-2 antigen was negative. Eleven days before the current presentation, the patient was evaluated by his primary care physician. In addition to fevers, the patient reported headaches. Two weeks before the onset of symptoms, he had traveled with his wife to the southwestern United States for 1 week. During the trip, his wife had begun to have fever and sore throat; her symptoms had resolved after several days, and she did not seek medical evaluation. The patient reported that he did not have throat pain, but rather that the lower part of his neck felt swollen and that moving his neck caused discomfort. He had no dysphagia, odynophagia, rhinorrhea, or rash. His medical history included seasonal allergies. Two years earlier, a routine screening test for human immunodeficiency virus (HIV) had been negative. In addition to amoxicillin–clavulanic acid, medications included ibuprofen as needed for headaches and acetaminophen as needed for fevers. The patient had no known drug allergies. He lived in Massachusetts and worked in an office setting. He had moved to the United States from Asia 7 years before the current presentation. He drank alcohol rarely and did not use illicit drugs. He occasionally smoked tobacco. His father had hypertension, and his paternal grandmother had cancer of unclear primary origin. On examination, the temporal temperature was 36.2°C, the blood pressure 127/69 mm Hg, the pulse 90 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 97% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 25.8. The tonsils appeared normal, without exudates or enlargement. There was mild tenderness on palpation over the anterior portion of the neck that was thought to correspond to enlarged lymph nodes in the anterior cervical region. The remainder of the examination was normal. A complete blood count with differential count and blood levels of electrolytes, glucose, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, and bilirubin were normal, as were the results of tests of kidney function. The blood level of C-reactive protein (CRP) was 65.8 mg per liter (reference value, <8.0). Testing for Epstein–Barr virus (EBV) antibodies was negative. Urinalysis was normal. A specimen of blood was obtained for culture. The results of chest radiography were normal. A diagnosis of viral pharyngitis was considered, but treatment with amoxicillin–clavulanic acid for possible streptococcal pharyngitis was continued. During the next 6 days, daily fevers and headaches continued, and fatigue developed. The patient reported his symptoms during a telephone call with his primary care physician. Blood cultures that had been obtained during the previous evaluation were without growth, and additional testing was performed. The blood level of CRP was 138.9 mg per liter, and the erythrocyte sedimentation rate (ESR) was 81 mm per hour (reference range, 0 to 14). A test for Lyme disease was nonreactive. The result of an interferon-γ release assay to detect previous exposure to Mycobacterium tuberculosis was invalid because of a test control failure. Imaging studies were obtained. Computed tomography (CT) of the neck, chest, and abdomen was performed after the administration of intravenous contrast material. A calcified lung nodule that was observed in the left lower lobe was consistent with previous granulomatous disease, and mild degenerative changes were noted in the thoracic spine. Evaluation of the thyroid gland was suboptimal owing to a streak artifact from the arms; however, a possible hypoattenuating nodule was observed in the right lobe. During the next 4 days, fevers continued, and the patient was referred to the infectious diseases clinic of this hospital for further evaluation. In the infectious diseases clinic, additional history was obtained. The patient reported that fevers were most prominent in the evening; the highest recorded temperature was 39.5°C. He had had two episodes of chills associated with fever, as well as occasional night sweats. He had no pets or animal exposures. He did not consume unpasteurized cheeses or uncooked meats. He was sexually active with his wife. A dental extraction had been performed 2 months before the onset of fevers. He had no known exposures to persons with tuberculosis. The temporal temperature was 36.6°C, the blood pressure 144/98 mm Hg, the pulse 130 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. He was noted to cough occasionally during the examination but was breathing comfortably with normal lung sounds. The oropharynx appeared normal, without tonsillar exudates. There was no supraclavicular, submandibular, cervical, axillary, or inguinal lymphadenopathy. Firm, nontender thyroid tissue was palpable in the anterior portion of the neck. No rashes or skin lesions were present, including on the palms or soles. The heart was tachycardic with a regular rhythm and no murmurs. There was no hepatosplenomegaly.

case_9_2024: |
  An 84-year-old man was admitted to this hospital after having a fall. Three weeks before the current presentation, the patient was evaluated in the emergency department of another hospital because of a transient episode of gross hematuria. Urinalysis showed trace blood (reference value, negative), and microscopic examination of the urinary sediment revealed 4 or 5 red cells per high-power field (reference range, 0 to 3). Results of tests of coagulation were normal, and the complete blood count showed anemia, which had been diagnosed previously and was stable as compared with findings obtained 11 months earlier. Computed tomography (CT) of the abdomen, performed after the administration of intravenous contrast material, showed a linear density in the bladder that measured 10 mm in diameter. The cause of the episode of hematuria was thought to be a kidney stone that had passed into the bladder. The patient was discharged home with a plan to follow up in the urology clinic affiliated with the other hospital; he was instructed to continue treatment with rivaroxaban, which he had been taking for many years to prevent stroke in the context of atrial fibrillation. One week before the current presentation, the patient was evaluated in the emergency department of the other hospital after he had expressive aphasia as well as numbness on the right side of his face and in his right arm, which had resolved before he arrived at the emergency department. He had missed multiple doses of rivaroxaban in the 2 weeks before the onset of these symptoms. CT angiography of the head and neck did not show evidence of stroke or clinically significant stenosis in the anterior or posterior cerebral circulation. The complete blood count showed that his anemia remained stable. The blood levels of electrolytes, alanine aminotransferase, aspartate aminotransferase, and alkaline phosphatase were normal, as were the results of tests of coagulation and kidney function. Urinalysis showed 1+ blood, and microscopic examination of the urinary sediment revealed 6 to 10 red cells per high-power field and 6 to 9 white cells per high-power field (reference range, 0 to 2). The patient was admitted to the other hospital. On hospital day 2, magnetic resonance imaging (MRI) of the head, performed after the administration of intravenous contrast material, showed moderate generalized atrophy and small-vessel ischemic changes. Transthoracic echocardiography (TTE) showed a left ventricular ejection fraction (LVEF) of 60%, increased estimated right ventricular systolic pressure, mild-to-moderate mitral regurgitation, mild aortic regurgitation, moderate tricuspid regurgitation, and intact intraventricular and atrial septa. The patient was told that his symptoms were due to a transient ischemic attack, and he was discharged home with instructions to continue taking rivaroxaban and with a plan to follow up in the neurology clinic affiliated with the other hospital. On the day of the current presentation, the patient fell in his bathroom at his home. Emergency medical services were called. The fingerstick blood glucose level was 130 mg per deciliter (7.2 mmol per liter; reference range, 70 to 100 mg per deciliter [3.9 to 5.6 mmol per liter]). The patient was not able to recall the events that led to the fall. He was transported to the emergency department of this hospital for evaluation. In the emergency department, the patient reported that he had felt unwell after discharge from the other hospital, with symptoms including generalized weakness and dizziness. He had no abdominal pain, chest pain, or urinary symptoms. His wife reported that before the patient’s admission to the other hospital, he had been completely independent, performing activities such as driving and grocery shopping. However, since his discharge from the other hospital, he had become progressively weaker and had required assistance with walking and dressing. The patient’s wife also reported an area of redness on the patient’s left arm where an intravenous catheter had been placed during admission to the other hospital. Other medical history included atrial fibrillation, heart failure with preserved ejection fraction, chronic obstructive pulmonary disease, depression, hypertension, and prostate cancer that had been treated with radiotherapy. Medications included amlodipine, finasteride, furosemide, losartan, rivaroxaban, rosuvastatin, and venlafaxine. The patient had no known drug allergies. He did not drink alcohol or use illicit drugs; he smoked one pack of cigarettes per day. He was retired and lived in Massachusetts with his wife. The temporal temperature was 36.1°C, the blood pressure 145/68 mm Hg, the pulse 61 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 93% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 24.4. The patient appeared ill with dry mucous membranes. The heart sounds were irregular. There was an area of erythema overlying the left antecubital fossa with mild induration but no fluctuance. He had an abrasion over the left knee. He was cooperative but confused and intermittently answered questions inappropriately; he occasionally stared off into space and did not respond to questions. The remainder of the examination was normal. The blood levels of electrolytes, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, and lactate were normal, as were the results of tests of coagulation. Urinalysis showed 3+ blood (reference value, negative) and 3+ leukocyte esterase (reference value, negative); microscopic evaluation of the urinary sediment revealed 5 to 10 red cells per high-power field (reference range, 0 to 2), more than 100 white cells per high-power field (reference value, <10), and 1+ bacteria. The blood level of creatinine was 2.01 mg per deciliter (178 μmol per liter; reference range, 0.60 to 1.50 mg per deciliter [53 to 133 μmol per liter]) and the blood level of high-sensitivity troponin T 68 ng per liter (reference range, 0 to 14). Tests for respiratory viruses, including severe acute respiratory syndrome coronavirus 2, were negative. An electrocardiogram (ECG) showed atrial fibrillation without ischemic changes. Imaging studies were obtained. CT angiography of the head and cervical spine showed no acute intracranial hemorrhage or evidence of an acute infarct and no acute fracture in the cervical spine. CT angiography of the chest, abdomen, and pelvis was also performed. A small pleural effusion was detected in the left lung. Moderate-to-severe coronary-artery calcification with multichamber cardiomegaly was present, and calcifications were scattered throughout the thoracic aorta, which showed aneurysmal dilatation. An indeterminate left adrenal nodule that measured 15 mm in diameter was detected, along with circumferential wall thickening in the urinary bladder and two stones in the urinary bladder that measured up to 5 mm in diameter; seeds from previous brachytherapy were also visible. Two focal areas of hyperdensity, each measuring up to 6 mm in diameter, that were seen along the posterior aspect of the spinal canal at the level of the eighth and ninth thoracic vertebrae were most likely meningiomas. There was a focal outpouching of the aorta superior to the origin of the celiac artery and mural thickening of the aorta at the level of the aortic hiatus with adjacent fat stranding. While the patient was in the emergency department, the high-sensitivity troponin T levels, which were checked 1 and 3 hours after the initial troponin measurement, were 71 ng per liter and 70 ng per liter, respectively. A bolus of 500 ml of normal saline was administered. A presumptive diagnosis of urinary tract infection was made, and urine was obtained for culture. Treatment with intravenous ceftriaxone was initiated, and the patient was admitted to the hospital. Treatment with furosemide and losartan was stopped, but his other home medications were continued. On hospital day 1, the urine culture grew more than 100,000 colony-forming units of Staphylococcus aureus. MRI of the head, performed without the administration of intravenous contrast material, was degraded by motion artifact, but there was no evidence of an acute infarct. A TTE showed an LVEF of 60%, a dilated right ventricle with normal systolic function, mild-to-moderate aortic regurgitation, mild mitral regurgitation, severe tricuspid regurgitation, and an elevated estimated right ventricular systolic pressure. Blood was obtained for culture, and treatment with ceftriaxone was continued. On hospital day 2, the patient remained afebrile. An ultrasound image of the left antecubital fossa showed an avascular hypoechoic collection, measuring 1.7 cm by 0.5 cm by 1.3 cm, overlying a partially occluded superficial vein. The patient was evaluated by the orthopedic surgery consultant; no surgical intervention was recommended. Antimicrobial susceptibility testing of the urine culture isolate revealed methicillin-sensitive S. aureus (MSSA). Treatment with ceftriaxone was stopped, and treatment with intravenous vancomycin and cefazolin was initiated. Blood cultures obtained on hospital day 1 grew gram-positive cocci in clusters in one of four bottles. Additional blood cultures were obtained. On hospital day 3, the patient had sudden chest pain while resting in bed. The pain was located over the left third intercostal space and did not radiate; the patient rated the pain at 5 on a scale of 0 to 10 (with 10 indicating the most severe pain). The pain lasted 5 minutes and resolved without intervention. On evaluation by the treating physician immediately after the pain resolved, the blood pressure was 193/80 mm Hg. An ECG showed atrial fibrillation without ischemic changes. A chest radiograph showed a small left pleural effusion similar to that previously seen on CT angiography and a confluent retrocardiac opacity in the left lower lobe. The blood level of high-sensitivity troponin T was 46 ng per liter. Treatment with losartan, which had been stopped on admission to the hospital, was restarted. During the next 12 hours, the blood pressure decreased to 167/81 mm Hg. On hospital day 4, the patient had chest pain that was different in character from the pain he had had the previous day. The pain, which he rated at 10, radiated into the abdomen. The patient appeared distressed. The blood pressure was 173/85 mm Hg. The pain was unchanged on palpation over the chest and abdomen. Treatment with low-dose intravenous hydromorphone was initiated, and the pain decreased to 5 out of 10.

case_10_2024: |
  A 46-year-old woman was admitted to this hospital because of hyperglycemia that was refractory to insulin therapy. Five years before the current presentation, the patient received a diagnosis of type 2 diabetes mellitus after nausea, vomiting, polyuria, and polydipsia had developed. At that time, the weight was 113 kg, and the body-mass index (BMI; the weight in kilograms divided by the square of the height in meters) was 45.6. Treatment with metformin was started, along with subcutaneous insulin glargine at a dose of 10 units daily. The patient had adverse effects associated with metformin, so treatment with metformin was discontinued and glipizide was started. During the next 3.5 years, despite progressive weight loss, the patient’s glycemic control worsened, which resulted in gradual intensification of her glucose-lowering regimen. Two years before the current presentation, the patient moved to the Boston area and established care at a clinic affiliated with another hospital. The weight was 63 kg, and the BMI was 25.4. Medications for diabetes included subcutaneous insulin glargine (20 units daily) and glipizide, and the glycated hemoglobin level was 13.2% (reference range, 4.3 to 5.6). Treatment with empagliflozin was started but then stopped because of a urinary tract infection. The dose of subcutaneous insulin glargine was increased to 30 units daily, and treatment with subcutaneous insulin lispro, administered at a dose of 10 units three times a day with meals, was added. Treatment with glipizide was stopped, and treatment with glimepiride and pioglitazone was started. One year before the current presentation, the weight was 48 kg, and the BMI was 19.4. Medications for diabetes included subcutaneous insulin glargine (34 units daily), subcutaneous insulin lispro (15 units three times a day with meals), glimepiride, and pioglitazone, and the glycated hemoglobin level was 14.0%. Anorexia had developed, along with fatigue. Although the patient reported eating very little, the blood glucose levels remained markedly elevated. Nine months before the current presentation, the weight was 42 kg, and the BMI was 16.9. Medications for diabetes included subcutaneous insulin glargine (46 units daily), subcutaneous insulin lispro (20 units three times a day with meals), glimepiride, and pioglitazone, and the glycated hemoglobin level was 11.0%. Six months before the current presentation, persistent abdominal pain developed, and the patient was admitted to the other hospital. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of intravenous contrast material, reportedly did not show evidence of obstruction, perforation, or abscess. The abdominal pain was attributed to gastroparesis; treatment with gabapentin, metoclopramide, and oxycodone was started. During the hospitalization, the patient was found to have profound hyperglycemia without diabetic ketoacidosis or hyperosmolar hyperglycemic syndrome. The glycated hemoglobin level was 15.5%. Testing was negative for antibodies to glutamic acid decarboxylase, islet antigen 2, and zinc transporter 8. A diagnosis of lipodystrophy was considered. Treatment with human regular U-500 insulin, given in daily doses of 250 units with breakfast and 200 units each with lunch and dinner, was started; treatment with subcutaneous insulin glargine and subcutaneous insulin lispro was stopped. The patient was discharged home. Subsequent to this hospitalization, a gastric-emptying study reportedly showed normal emptying at 1 hour. Two months before the current presentation, the abdominal pain worsened, and the patient was again admitted to the other hospital. Her hyperglycemia was initially treated with continuous intravenous insulin at doses of up to 40 units per hour. When the blood glucose level improved, treatment with intravenous insulin was stopped. Treatment with human regular U-500 insulin was then resumed at an increased dose (550 units each with breakfast and lunch and 450 units with dinner); treatment with isophane insulin, also known as neutral protamine Hagedorn (NPH) insulin, was started at a dose of 80 units twice a day. The abdominal pain subsided with improved glycemic control, and the patient was discharged home. Over the course of the 2 months between hospital discharge and the current presentation, the patient had five additional admissions to the other hospital because of abdominal pain and hyperglycemia. During each admission, the hyperglycemia was treated with high-dose intravenous insulin, the abdominal pain abated with improved blood glucose levels, and the patient was discharged home. During one admission, endoscopy was performed and reportedly revealed erosive gastritis and duodenitis due to infection with Helicobacter pylori, for which the patient was treated with amoxicillin, clarithromycin, bismuth subsalicylate, and pantoprazole. Nine days before the current presentation, the abdominal pain worsened, and the patient was transported by ambulance to the emergency department of the other hospital. Treatment with intravenous insulin was initiated, and the patient was admitted to the hospital. On the second hospital day, treatment with intravenous insulin was stopped, and treatment with human regular U-500 insulin was resumed at an increased dose of 650 units each with breakfast and lunch and 600 units with dinner; treatment with NPH insulin was also restarted at a dose of 80 units twice a day. She was transferred to this hospital for further care. On arrival at this hospital, the patient reported constant epigastric abdominal pain. She also reported that she had been administering her subcutaneous insulin medications at home without missed doses and confirmed that she had been rotating the injection sites on her abdomen. Other medical history included depression, as well as anemia and leukopenia; a bone marrow biopsy performed 7 months earlier revealed mild-to-moderate fibrosis with patchy myxoid degeneration. She had numbness and tingling in the hands and feet that had begun 9 months before the current presentation. Her menses had stopped 14 months before the current presentation. Other medications included acetaminophen, fluoxetine, gabapentin, glipizide, hydromorphone, lorazepam, mirtazapine, oxycodone, pancrelipase, pantoprazole, and pioglitazone. She had no known drug allergies. The patient was Black and lived in Boston with her husband and children; she had previously worked as a chef but was not working at the time of the current presentation. She rarely drank alcohol or smoked marijuana and had never smoked tobacco; she did not use illicit drugs. Her mother had rheumatoid arthritis and type 2 diabetes, and her father had liver disease. On examination, the temporal temperature was 36.1°C, the blood pressure 108/78 mm Hg, the pulse 98 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The weight was 42 kg, and the BMI was 17.0. The patient appeared cachectic with a diffuse absence of body fat and muscle mass. Her face had acromegaly-like features, including broadening of the nose and thickening of the lips. Acanthosis nigricans was present, most notably in the neck and axillae. She had skin tags on the face and neck, and vitiligo was present on the ears and on the fingers of the right hand. The abdomen was soft, nondistended, and diffusely tender on palpation, without rebound or guarding; there was no hepatosplenomegaly. There was skin breakdown in the legs. The remainder of the examination was normal. Laboratory testing showed a fasting blood glucose level of 311 mg per deciliter (17.3 mmol per liter; reference range, 70 to 100 mg per deciliter [3.9 to 5.6 mmol per liter]) and a C-peptide level of 12.1 ng per milliliter (reference range, 1.1 to 4.4). Blood levels of cholesterol, triglycerides, aspartate aminotransferase, alanine aminotransferase, alkaline phosphatase, total bilirubin, total complement, C3, and C4 were normal. The blood level of leptin was undetectable, and the blood level of adiponectin was 24.5 μg per milliliter (reference range, 2.9 to 30.4). A screening test for human immunodeficiency virus was negative. Testing for antibodies to nuclear antigens was positive at a titer of 1:320 with a homogeneous pattern; testing for antibodies to double-stranded DNA was negative. Serum protein electrophoresis showed a normal pattern with a mild diffuse increase in the gamma globulin level. Imaging studies were performed. CT of the abdomen and pelvis, performed without the administration of intravenous contrast material, revealed a near-complete absence of both visceral and subcutaneous fat, with multiple skin folds reflecting a clinically significant lack of fat. There was no bowel dilatation. The pancreas was atrophic, a finding commonly seen in patients with chronic insulin-dependent diabetes. There were bilateral, nonobstructing renal stones measuring up to 3 mm in diameter. The attenuation level of the liver was 58 Hounsfield units (HU), which is not consistent with hepatic steatosis (which is usually defined by an attenuation level of <40 HU). A nonspecific, round 3.3-cm hypodense lesion at the upper aspect of the spleen was noted.

case_11_2024: |
  An 82-year-old woman was admitted to this hospital because of difficulty walking, falls, and cognitive decline. The patient had been in her usual state of health, living independently with her husband and participating in a walking club, until 8 months before the current presentation, when generalized weakness developed. She began to walk more slowly and was no longer active with her walking club; she felt limited by pain in her feet. Five months before the current presentation, the patient began to have difficulty with climbing stairs and with rising from a seated position. Four months before the current presentation, she began to have falls at home. Three months before the current presentation, the patient fell and her husband was not able to lift her up from the floor. Emergency medical services were called, and she was admitted to another hospital for evaluation. During that hospitalization, a urinary tract infection and hyponatremia were diagnosed. The urinary tract infection was treated with trimethoprim–sulfamethoxazole. The hyponatremia was attributed to the syndrome of inappropriate antidiuretic hormone and was treated with fluid restriction and salt tablets. The use of a walker was recommended, and the patient was discharged to a rehabilitation facility. After 3 weeks in the rehabilitation facility, she was discharged home, but she fell again at home and subsequently returned to the other hospital for evaluation. She was readmitted to the other hospital and again discharged to a rehabilitation facility. Eight weeks before the current presentation, the patient was discharged from the rehabilitation facility, and she and her husband moved to an assisted-living facility. Fatigue developed, along with loss of appetite and a reduced intake of food. The patient began to need one-person assistance to walk. She also noticed that she had been having difficulty with math associated with the family finances, which she had always done with ease. Her family noticed that she had been having trouble carrying on a conversation and that she seemed less attentive than usual. Two weeks before the current presentation, the patient had another fall and was admitted to a second hospital, where she was found to have hyponatremia, hypokalemia, and hypomagnesemia. Magnetic resonance imaging (MRI) of the head reportedly showed moderate chronic small-vessel ischemic changes and ventriculomegaly. Increased food intake was encouraged, and outpatient evaluation in the neurology clinic affiliated with the second hospital was arranged. Discharge to a rehabilitation facility was recommended, but after discussions between the patient and her family, the patient returned to the assisted-living facility. After discharge from the hospital, the patient had a progressive loss of independence. She noted worsening generalized weakness and low back pain, and she needed two-person assistance to walk. Her family brought her to the emergency department of this hospital for evaluation. In the emergency department, the patient reported urinary incontinence, which she attributed to not having enough time to get to the toilet because of her physical limitations with movement; she had no dysuria or urinary urgency. There was no fecal incontinence. The patient had a history of hypertension, dyslipidemia, and hypothyroidism. Surgical history included hemiarthroplasty of the right shoulder and arthroplasty of both knees. She had chronic pain in the shoulders, knees, wrists, and hands, which had been attributed to osteoarthritis; the knee and shoulder pain had decreased after the surgeries but then returned during the year before the current presentation. Medications included atorvastatin, calcium citrate, levothyroxine, lisinopril, and tramadol. She had no known drug allergies. She did not drink alcohol, smoke tobacco, or use illicit drugs. In addition to her husband, her support network included four children who lived near the assisted-living facility. She was retired and had previously worked in finance. Her mother had had diabetes, and her father had had thyroid cancer; there was no known family history of dementia or neurodegenerative disorders. On examination, the temporal temperature was 36.6°C, the heart rate 88 beats per minute, the blood pressure 108/54 mm Hg, the respiratory rate 17 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 25.8. She appeared tired but was oriented to person and place. Pitting edema was present in the legs to the level of the mid-shins. A detailed strength examination was limited because of pain, with minimal movement of the shoulders, wrists, fingers, ankles, and knees. The patient could wiggle her toes but had weak plantar flexion and dorsiflexion of both feet. She could easily wiggle her fingers and lift her arms against gravity at the elbows. Light touch of the dorsum of the right hand caused pain, as did light touch of the right knee and the soles of both feet. Recognition of sensation to light touch and to vibration were normal. Cerebellar testing, gait testing, and reflex testing were limited by severe pain with movement and touch. The patient had symmetric erythema, swelling, and tenderness of the metacarpophalangeal and proximal interphalangeal joints. She had limited range of motion in the wrists and elbows, along with symmetric tenderness in the subtalar joints and swelling and pain with squeezing of the metatarsophalangeal joints. The blood levels of alcohol, ammonia, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, and bilirubin were normal, as were the results of tests of coagulation and urine toxicology screening. Urinalysis showed 3+ leukocyte esterase (reference value, negative) and the presence of nitrates (reference value, negative), and microscopic examination of the sediment revealed more than 100 white cells per high-power field (reference value, <10). Urine was obtained for culture, and intravenous ceftriaxone was administered. Imaging studies were obtained. Computed tomography (CT) of the head, performed without the administration of intravenous contrast material, revealed moderate ventriculomegaly that was out of proportion to the enlargement of the cerebral sulci. A high-volume lumbar puncture with gait evaluation before and after the procedure was not possible, given the patient’s inability to walk unassisted. Normal-pressure hydrocephalus was generally thought to be unlikely to explain her presentation. Altered mental status was attributed to delirium in the context of tramadol use and urinary tract infection. The patient was admitted to the hospital. On hospital day 2, the urine culture grew Citrobacter farmeri; treatment with trimethoprim–sulfamethoxazole was started. MRI of the cervical and lumbar spine, performed without the administration of intravenous contrast material, was terminated early because of the patient’s pain, and the images that were obtained were degraded by motion artifacts. However, no marked signal abnormality in the spinal cord or high-grade spinal or foraminal stenosis was observed. Additional laboratory studies were obtained. Tests for antibodies to human immunodeficiency virus types 1 and 2, hepatitis B virus antibodies, and hepatitis C virus antibodies were negative. The blood levels of glycated hemoglobin and cobalamin were normal, as were the results of serum protein electrophoresis with immunofixation; blood samples were obtained for measurement of copper and vitamin B6 levels. Treatment with gabapentin was started for neuropathic pain. On hospital day 3, pain had not decreased, and the dose of gabapentin was increased. On hospital day 4, electromyography and nerve conduction studies were performed. The amplitude of the compound muscle action potential (CMAP) was normal with stimulation of the right tibial nerve but was reduced with stimulation of the left tibial nerve and both peroneal nerves; in addition, the CMAP amplitude of the left ulnar nerve was mildly reduced, and that of the left median nerve was normal. The sensory-nerve action potential of the left radial nerve was normal, but the sensory-nerve action potential of the left sural nerve could not be obtained. The conduction velocities and distal latencies were normal. There was no abnormal spontaneous activity in any muscle examined. The motor-unit action potentials and motor-unit recruitment with voluntary activation were normal throughout. The results of the additional blood tests became available. The copper level was normal, and the vitamin B6 level was less than 2 μg per liter (reference range, 5 to 50). Treatment with vitamin B6 supplementation was started.

case_15_2024: |
  A 73-year-old woman was transferred to this hospital because of worsening rash. The patient had been in her usual state of health until 8 days before the current presentation, when rectal pain developed. She sought evaluation in the emergency department of another hospital. Limited information describing the physical examination was available. The white-cell count was 19,700 per microliter (reference range, 4800 to 10,800), the absolute lymphocyte count 6500 per microliter (reference range, 1000 to 5000), the absolute eosinophil count 3150 per microliter (reference range, 0 to 500), the absolute monocyte count 590 per microliter (reference range, 200 to 1000), and the plasma lactate level 2.6 mmol per liter (23.4 mg per deciliter; reference range, 0.4 to 2.0 mmol per liter [3.6 to 18.0 mg per deciliter]). The blood levels of electrolytes were normal, as were the results of tests of kidney function and coagulation. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of intravenous contrast material, reportedly showed a perianal collection measuring 1.8 cm in diameter. Attempts to aspirate the perianal collection were unsuccessful, and a punch biopsy was performed. The patient was admitted to the other hospital, and intravenous piperacillin–tazobactam and vancomycin were administered. On the second hospital day, examination of the punch-biopsy specimen reportedly showed no evidence of cancer. Rectal pain had abated, and the patient was discharged home to complete a course of amoxicillin–clavulanic acid and doxycycline. Two days after discharge from the other hospital, and 4 days before the current presentation, an erosive rash developed on the skin of the groin, with associated pruritus and pain in the affected area of the skin. The patient had no fever or chills. Over the course of the next 3 days, the rash progressed to the perineum and lower abdomen. One day before the current presentation, the patient sought evaluation in the emergency department of the other hospital. Skin breakdown and purulent drainage were reportedly present on the skin of the perineum, lower abdomen, and inframammary folds; the rash was estimated to involve 7% of the total body-surface area. Laboratory evaluation showed leukocytosis, lymphocytosis, and eosinophilia. CT of the abdomen and pelvis, performed after the administration of intravenous contrast material, reportedly showed a focus of inflammation and soft-tissue thickening, measuring 2.4 cm in diameter, in the left perianal area. The left pelvic sidewall, right external iliac, and right and left inguinal lymph nodes were enlarged, measuring up to 2.1 cm in diameter; the spleen was normal in size. A diagnosis of the Stevens–Johnson syndrome was considered, treatment with intravenous fluids and glucocorticoids was started, and the patient was transferred to this hospital for further care. On arrival at this hospital, the patient reported that the skin was no longer pruritic or painful. No eye pain, dysuria, or vaginal pain was present. She had a history of eczema and psoriasis, which had been diagnosed 3 years before the current presentation. Treatment with acitretin and topical betamethasone, clobetasol, and triamcinolone had been started for psoriasis, and had shown some benefit. Her eczema had been treated with dupilumab but was stopped after 6 months owing to ophthalmic complications. Other medical history included type 2 diabetes mellitus, hypertension, dyslipidemia, anxiety, and genital herpes simplex virus (HSV) infection. The last flare of genital HSV had occurred 3 years before the current presentation and had been treated with valacyclovir. Other medications included amlodipine, doxepin, gabapentin, insulin glargine, insulin lispro, metoprolol, and risperidone; lorazepam was used as needed for anxiety. There were no known drug allergies. The patient was retired and had previously worked as a nursing assistant. She was Black and lived with her sister in a suburb of Boston; she had not traveled outside the United States. She was a lifelong nonsmoker and did not drink alcohol or use illicit drugs. Both parents had diabetes; there was no family history of recurrent infections. On examination, the temporal temperature was 36.8°C, the blood pressure 131/71 mm Hg, the pulse 99 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 17.2. There were multiple punched-out, monomorphic ulcers coalescing into ulcerative plaques on the skin of the axillae, inframammary folds, neck, lower abdomen, pubic area, and both medial thighs with associated purulent drainage and malodor. Onychodystrophy was present on the fingernails and toenails. The palmar and dorsal aspects of both hands had scaling, deep fissuring, and serous crusting. Subtle blanching erythema covered more than 90% of the body-surface area; she had not noticed this change, and she did not know the timing of onset. No oral or mucosal lesions were present. There was nontender axillary and inguinal lymphadenopathy. The remainder of the examination was normal. The blood levels of electrolytes, alanine aminotransferase, aspartate aminotransferase, and alkaline phosphatase were normal, as were the results of tests of kidney function. The plasma level of lactate was 2.7 mmol per liter (24.3 mg per deciliter; reference range, 0.5 to 2.0 mmol per liter [4.5 to 18.0 mg per deciliter]) and the blood level of C-reactive protein 130.9 mg per liter (reference value, <8.0). The complete blood count with differential count was normal. A sample of epidermal cells that was obtained from the base of an unroofed lesion was sent for HSV nucleic acid testing. Punch biopsies of the skin of the left axilla and the left upper arm were performed. A clinical diagnosis of Kaposi’s varicelliform eruption (KVE) with superinfection was considered, and treatment with intravenous acyclovir, ceftriaxone, and vancomycin was started. The patient was admitted to this hospital. On the second hospital day, the white-cell count had increased to 17,270 per microliter (reference range, 4500 to 11,000), and the absolute eosinophil count had increased to 6820 per microliter (reference range, 0 to 900). The blood level of troponin was 7 ng per liter (reference range, 0 to 9), the cobalamin level 345 pg per milliliter (255 pmol per liter; reference value, >231 pg per milliliter [>170 pmol per liter]), the tryptase level 4.5 ng per milliliter (reference value, <11.5), and the IgE level 25,113 IU per milliliter (reference range, 0 to 100). Serum protein electrophoresis showed a normal pattern with a moderate diffuse decrease in the globulin level. Antibodies to antinuclear antigens were detected at a dilution of 1:40. Screening tests for human immunodeficiency virus types 1 and 2 were negative. Preliminary examination of the two skin-biopsy specimens revealed changes consistent with HSV infection in the left axilla and a psoriasiform dermatitis in the left upper arm; there was no evidence of cutaneous involvement caused by a T-cell lymphoproliferative disorder. Cultures that were obtained from one of the groin wounds grew moderate amounts of Pseudomonas aeruginosa. Treatment with ceftriaxone was stopped, and treatment with intravenous cefepime was started. CT of the chest, abdomen, and pelvis, performed after the administration of intravenous contrast material, revealed a multilobulated mass in the superior segment of the left lower lobe that extended beyond the left major fissure, along with multiple additional bilateral pulmonary nodules of varying size; there was marked bilateral axillary and subpectoral lymphadenopathy. Abdominal and pelvic images were remarkable for mild superficial soft-tissue thickening along the intergluteal cleft immediately posterior to the anal verge, as well as bilateral external iliac and inguinal lymphadenopathy.

case_23_2024: |
  A 78-year-old woman was admitted to this hospital because of progressive confusion and evolving changes on magnetic resonance imaging (MRI) of the head. The patient had been in her usual state of health until 5 months before the current admission, when she began to have a flat affect, which the patient’s daughter had attributed to grief after the death of the patient’s sister. The patient had a 3-year history of mild problems with memory, but more severe memory issues had developed along with the change in affect. Four months before the current admission, she was admitted to another hospital after an acute episode of word-finding difficulty that had been witnessed by her daughter. At that time, MRI of the head, performed without the administration of intravenous contrast material , revealed a subcentimeter focus of high signal intensity in the right frontal lobe on diffusion-weighted sequences and “pseudonormalization” on a map of the apparent diffusion coefficient, with corresponding T2-weighted fluid-attenuated inversion recovery (FLAIR) images showing hyperintensity consistent with subacute infarction. T2-weighted FLAIR images also showed multiple foci of hyperintensity (measuring up to 1.1 cm in diameter) in both cerebellar hemispheres that were consistent with chronic infarcts. In addition, multiple areas of hyperintensity were seen on T2-weighted FLAIR images in the periventricular, deep, and subcortical white matter of both cerebral hemispheres; these findings were suggestive of small-vessel disease. Gradient-echo sequences showed several punctate foci of susceptibility in a lobar distribution, findings that were consistent with chronic microhemorrhages . Magnetic resonance angiography showed normal intracranial arteries. Electrocardiography showed sinus rhythm with right bundle-branch block. Transthoracic echocardiography showed normal left ventricular systolic function, dilatation of the atria and right ventricle, moderate mitral regurgitation, severe tricuspid regurgitation , and no evidence of intracardiac shunting. Treatment with aspirin was started, and the patient was discharged home on hospital day 3 with a plan for extended outpatient cardiac monitoring. Ten days after discharge, the patient was evaluated by her primary care physician. The patient’s daughter, who had been living with her since discharge from the hospital because she did not think that the patient was safe living alone, accompanied her to the appointment. The patient’s daughter reported that the patient had been impulsive and occasionally confused, as well as progressively more forgetful. Attention and focus were impaired, and the patient had to be redirected during the interview. The remainder of the examination was normal. Treatment with mirtazapine was started for possible depression. Electroencephalography (EEG) was scheduled to rule out seizure with a postictal state as a cause of confusion. However, owing to the coronavirus disease 2019 pandemic, the EEG was canceled. During the next 14 weeks, the patient needed progressively more assistance with activities of daily living, including multiple reminders to eat meals and help with bathing. Her episodes of confusion occurred mostly at night. When these episodes began to increase in frequency, the patient’s daughter brought her to the emergency department of this hospital for evaluation. The patient had difficulty recalling past and recent events, and additional history was obtained from the patient’s daughter. The patient had had an 11-kg weight loss during the preceding 3 months that the daughter had attributed to an improved diet while they were living together. Other medical history included type 2 diabetes mellitus, hypertension, dyslipidemia, emphysema, sleep apnea, hypothyroidism, and obesity. Stage II infiltrating ductal carcinoma of the breast had been diagnosed 17 years before the current admission and had been treated with lumpectomy and chemoradiation therapy, followed by 3 years of treatment with tamoxifen and exemestane. The patient continued to undergo surveillance with alternating mammography and MRI of the breasts every 6 months; the last breast MRI, which had been performed 5 months before the current admission, showed normal results. Stage 1 adenocarcinoma of the lung had been diagnosed 14 years before the current admission and had been treated with surgical resection. The patient continued to undergo surveillance with annual computed tomography (CT) of the chest; the last CT of the chest, which had been performed 13 months before the current admission, showed a stable nodule in the right upper lobe that measured 7 mm in diameter. Medications included esomeprazole, dulaglutide, hydrochlorothiazide, levothyroxine, losartan, metformin, rosuvastatin, inhaled fluticasone, inhaled formoterol, and as-needed treatment with ipratropium–albuterol delivered by nebulizer. There were no known drug allergies. The patient was retired and had previously worked as a nurse. She was divorced and had lived independently in New England until she was hospitalized 4 months before the current admission. She drank alcohol occasionally and had a 75-pack-year smoking history and quit after lung cancer was diagnosed. Her mother had had coronary artery disease, and her father had had emphysema. On examination, the temporal temperature was 37.0°C, the blood pressure 162/71 mm Hg, the pulse 65 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 98% while the patient was breathing ambient air. The height was 167.6 cm, the weight 91.3 kg, and the body-mass index (the weight in kilograms divided by the square of the height in meters) 32.4. The patient was alert and interactive; she was oriented to name only. She was inattentive and tangential in conversation, with perseveration. Her speech was fluent without paraphasic errors. Cranial-nerve function was normal. Test results for strength, sensation, deep-tendon reflexes, and cerebellar function were normal. The blood levels of electrolytes, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, bilirubin, thyrotropin, cobalamin, lactate dehydrogenase, cortisol, and C-reactive protein were normal, as were the results of tests of kidney function and coagulation. The complete blood count and differential count were normal except for the level of hemoglobin, which was 10.2 g per liter (reference range, 12.0 to 16.0). The erythrocyte sedimentation rate was 35 mm per hour (reference range, 0 to 20). Screening tests for syphilis and human immunodeficiency virus infection were negative, as was an interferon-γ release assay to detect previous exposure to Mycobacterium tuberculosis. Imaging studies were obtained. Chest radiography showed bibasilar patchy opacities. MRI of the head, performed before and after the administration of intravenous contrast material, revealed new symmetric, confluent signal hyperintensity in the bilateral hippocampi, amygdala, and medial and anterior temporal lobes on T2-weighted and FLAIR images . There was no evidence of acute or subacute infarction or associated abnormal enhancement. Multiple punctate foci of susceptibility were seen in a predominantly lobar distribution in both cerebral hemispheres on susceptibility-weighted imaging — a finding that was suggestive of microhemorrhages. New hemosiderin staining was present within the sulci of the right parietal lobe. A lumbar puncture was performed for evaluation of cerebrospinal fluid (CSF), which was clear and colorless. In the third tube of CSF, there were 3 nucleated cells per microliter (reference range, 0 to 5) and 8 red cells per microliter (reference value, 0). The CSF level of protein was 47 mg per deciliter (reference range, 8 to 32) and the glucose level 112 mg per deciliter (6.2 mmol per liter; reference range, 40 to 70 mg per deciliter [2.2 to 3.9 mmol per liter]). The concurrent blood level of glucose was 191 mg per deciliter (10.6 mmol per liter; reference range, 74 to 100 mg per deciliter [4.1 to 5.6 mmol per liter]). There were 16 oligoclonal bands (reference range, 0 to 1); an IgG index was not obtained. No organisms were seen on Gram’s staining, and nucleic acid testing for herpes simplex virus (HSV) DNA was negative. The patient was admitted to this hospital. An EEG showed diffuse delta and theta slowing and disorganization of the background. There were abundant bilateral independent, temporal epileptiform discharges as well as brief runs of independent, lateralized periodic discharges in both temporal lobes.

case_24_2024: |
  A 30-year-old woman was evaluated in the psychiatry clinic of this hospital 4 weeks after the birth of her first child because of anxiety and intrusive thoughts. The patient (gravida 1, para 1) had had gestational hypertension, for which she had not received medication; otherwise, her pregnancy had been uncomplicated. Four weeks before the current evaluation, she went into labor at 39 weeks 1 day’s gestation and gave birth to a healthy male infant by spontaneous vaginal delivery in the labor and delivery unit of this hospital. Skin-to-skin contact, in which the infant is placed on the bare chest of the mother, was started immediately after the baby was born. During the next 2 days, the patient was engaged and inquisitive during postpartum counseling and education. She was able to initiate breast-feeding and appeared to be bonding appropriately with the infant. On the fourth hospital day, she was discharged home. At home, the patient breast-fed the infant but noticed that he had a poor latch. One day after discharge, the patient called the obstetrics clinic of this hospital to request lactation advice. She also described having difficulty sleeping and feeling anxious and nervous since giving birth. The patient was advised to start pumping breast milk in addition to breast-feeding. Treatment with sertraline was initiated. Three weeks before the current evaluation, the patient called the obstetrics clinic again for advice regarding the use of the breast pump. She was also concerned that the difficulties with breast-feeding were interfering with bonding with the infant, and she noted that her blood pressure, which she had measured with an ambulatory monitor at home, was 164/101 mm Hg. The patient was advised to seek evaluation in the labor and delivery unit of this hospital. On evaluation, the patient described insomnia, anxiety, painful nipples, decreased appetite, and mild headache. She reported no blurred vision or abdominal pain. The blood pressure was 140/84 mm Hg and the pulse 107 beats per minute. The patient appeared worried and anxious. The remainder of the physical examination was normal. The blood levels of electrolytes were normal, as were the complete blood count and the results of tests of kidney and liver function. The urinalysis was normal. Treatment with nifedipine was initiated for hypertension, along with lorazepam as needed for anxiety. Sertraline therapy was continued. The patient was discharged home. The next day, the patient awoke and told her husband, “I can’t go on like this. I can’t do this anymore. I can’t wake up feeling like this again.” He called the obstetrics clinic and was instructed to bring her to the labor and delivery unit. On evaluation, the patient stated that she had stopped breast-feeding because of bleeding of the nipples and had started feeding with formula. She felt exhausted and “emotionally numb,” and she sometimes could not remember whether she had fed the baby. She described feeling lonely, isolated, distressed, and unable to engage in most child care duties. The patient’s mother had been visiting her and her husband to assist them with child care. The patient reported that, during the pregnancy, she had been excited and had felt “ready and prepared,” although somewhat nervous in anticipation of the delivery. She had not felt traumatized after the pregnancy or delivery, but when she had returned home, she felt “hit by a ton of trains.” She would awaken frequently during the night when the infant made noises. When the infant was quiet, the patient was unable to sleep because of racing thoughts and feeling overwhelmed. She said, “The idea of being this baby’s mother for the rest of my life is too much for me to handle. I don’t want to do this now or for the rest of my life.” She added, “I wish I were dead sometimes” but reported no active suicidal or homicidal ideation or plan. The patient had a history of intermittent insomnia and migraines. She had had dysthymic symptoms as a teenager when she had moved to the United States from Central America, and she had had mild generalized anxiety and anxiety with public speaking during college, for which she had taken propranolol. She had had no previous suicidal or homicidal ideation or history of self-harm behaviors, and she had never had a psychiatric admission or intensive psychiatric treatment. The patient took prenatal vitamins, nifedipine, and sertraline. She also took lorazepam as needed for anxiety, acetaminophen and ibuprofen as needed for headaches, and docusate for constipation. There were no known drug allergies. She was on maternity leave from her work as an administrator, and she lived in suburban New England with her infant and husband. She felt safe and supported in the home. The patient drank alcohol rarely and did not smoke tobacco or use illicit drugs. Her mother had migraines, her father hypertension and anxiety, her brother anxiety, her maternal grandmother hematologic cancer, and her paternal grandmother hypertension. Her maternal grandfather had died of lung cancer and her paternal grandfather of a stroke. On the day of the current evaluation, the patient presented to this hospital to establish care with a psychiatrist. On evaluation, the patient repeatedly said, “The baby is a good baby” and stated that she did not want to hurt the infant or other people; however, she described intrusive thoughts of stabbing the infant and had visual hallucinations of herself holding a knife. She noted that the thoughts had started after delivery and had become increasingly vivid and frequent. They caused distress and anxiety and led to episodes of intense crying, rapid breathing, and feeling shaky. She avoided the kitchen because knives were present, and she had stopped cooking — an activity that she had previously enjoyed. The patient did not feel comfortable holding or feeding the infant because of the unwanted, intrusive thoughts and thus avoided physical contact with him. However, she checked on him every few minutes to make sure that he was alive and breathing and frequently asked her husband whether the infant was OK. The patient repeatedly searched on the internet looking for reassurance that she would not act on these thoughts. She contacted other mothers online and talked to her husband and mother to seek reassurance that she was not “a bad mother.” However, she had not told them or her clinicians about the intrusive thoughts because she was terrified that the infant would be taken away from her. On examination, the blood pressure was 138/83 mm Hg and the pulse 68 beats per minute. The patient was tearful and appeared exhausted. Her mood was anxious and dysphoric, and her affect was restricted and congruent with her mood. She did not have disorganized thinking, delusional content, or perceptual disturbances.

case_25_2024: |
  A 12-year-old boy with autism was admitted to this hospital because of decreased vision in both eyes. The patient had been in his usual state of health until 6 weeks before this admission, when he began to have difficulty seeing in both eyes. His vision was decreased when he woke up in the morning, improved throughout the day, and worsened again at night. Three weeks before the current admission, the patient told his parents about the vision changes. They took him to an optometry clinic for evaluation. Eyeglasses were not prescribed; a routine annual follow-up evaluation was scheduled. During the next 3 weeks, the patient noticed that the decrease in vision worsened. He typically walked on his toes and held onto his parents as he walked; however, 4 days before this admission, his parents noticed that he leaned on them heavily while walking. Two days before the current admission, they observed him walking into doors and walls and bumping into objects. On the day of this admission, the patient woke up screaming and panicked because he could not see. His parents brought him to the emergency department of this hospital. On evaluation, the patient reported that his vision had improved slightly throughout the day. He described darkening of his vision that was worse in the left eye than in the right eye. He was having difficulty identifying movement and details of objects, although he was able to see shapes and colors. The parents reported that the patient had been having puffiness and crusting of the eyes for 2 days, with no eye redness or pain. Review of systems was notable for 3 days of diarrhea and nausea. He had no fever, headache, rashes, mouth sores, joint pain, or weakness. The patient was born prematurely, at 7 months’ gestation. Labor and delivery had taken place outside the hospital setting, and perinatal hypoxia had occurred. The patient had been taken urgently to another hospital, where he was resuscitated and then hospitalized in the neonatal intensive care unit for 2 months. The patient had autism and attention deficit–hyperactivity disorder (ADHD). He had developmental delays in speech, language, cognition, and fine motor skills. He had received all routine childhood vaccinations and was taking risperidone; there were no known drug allergies. The patient lived with his parents and older sister, all of whom were healthy. Ten months before this admission, they had moved from an urban area to a rural area in New England. The patient was in sixth grade and was enrolled in special education classes at school. He had been an avid player of video and virtual reality games, but his parents had removed the gaming systems from their home 2 months before the patient’s vision changes had begun. He continued to watch videos on the computer and television; his parents noted that he did not sit close to the devices and sometimes looked at the wall instead of the screen. The patient’s parents described him as a “picky eater.” His diet consisted almost exclusively of hamburgers, french fries, ranch dressing, glazed doughnuts, and juice boxes. The patient avoided trying new foods and did not take vitamin pills or gummies because he disliked the taste or texture. On examination, the temporal temperature was 36.2°C, the blood pressure 104/71 mm Hg, the heart rate 94 beats per minute, and the oxygen saturation 98% while the patient was breathing ambient air. The height was 156 cm (70th percentile), the weight 40.3 kg (38th percentile), and the body-mass index 16.6. The patient was pale, alert, interactive, and wary of the physical examination. Mild periorbital swelling was present. The visual acuity in both eyes was limited to hand motion. The pupils were symmetric and reactive to light, and the extraocular movements were full. Color-vision testing, automated perimetry, fundus photography, and optical coherence tomography could not be performed because the patient had poor vision and was unable to cooperate. A slit-lamp examination was notable only for keratinization of the conjunctiva in both eyes. A funduscopic examination revealed pallor of the optic disk in both eyes. Examination of the peripheral retina was limited because the patient was unable to cooperate. Strength, sensation, reflexes, and coordination were normal. A gait examination revealed toe walking; the patient asked for assistance when walking. The abdomen was nontender. Horizontal ridges were present on the toenails, and there were scattered bruises on the arms and legs. No ulcers or rashes were seen. The patient was admitted to this hospital. During the next 2 days, imaging was attempted but limited because the patient was anxious about the testing. On the third hospital day, magnetic resonance imaging (MRI) of the head and orbits, with and without the intravenous administration of contrast material, was successfully performed while the patient was under sedation. A fluid-sensitive short-tau inversion recovery (STIR) sequence showed subtle hyperintensity of the mid-intraorbital segments of the optic nerves in both eyes, with no enhancement. The optic chiasm, optic tracts, and optic-nerve sheath complexes appeared normal. Diffuse heterogeneous thickening of the calvarium was present.

case_29_2024: |
  A 47-year-old man was admitted to this hospital because of confusion and acute kidney failure. The patient had been well until 6 days before the current admission, when fatigue and myalgias developed. During the subsequent 2 days, he continued to report to his job at a restaurant. Four days before this admission, the patient’s coworkers noticed that he was mildly confused. On the day of this admission, the confusion markedly increased, and new word-finding difficulties and garbled speech developed. Emergency medical services were called, and the patient was brought to the emergency department of this hospital. On evaluation in the emergency department, the patient was not able to participate fully in the interview or a review of systems because of confusion, but he described feeling hot and short of breath. He had not mentioned any recent cough, nausea, vomiting, diarrhea, or headache to his family or coworkers. He had no known recent falls, trauma, travel, or sick contacts. Additional history was obtained from the patient’s family. He had no known medical problems or drug allergies. He used no prescription medications but took ginseng extract and burdock root supplements. He lived in an urban area of New England with a friend and no pets in a former factory that had been converted into apartments. The patient smoked marijuana occasionally and had smoked cigarettes as a teenager. He drank alcohol infrequently and did not use illicit drugs. His sister had Sjögren’s syndrome, nemaline myopathy, cardiomyopathy, Fanconi’s anemia, and renal tubular acidosis. His parents were healthy. On examination, the temporal temperature was 35.8°C, the blood pressure 142/78 mm Hg, the pulse 114 beats per minute, the respiratory rate 30 breaths per minute, and the oxygen saturation 96% while the patient was breathing ambient air. The patient appeared anxious. He was alert and oriented; however, when he was asked a question, he often needed clarification and was slow to answer. He could not recite the days of the week backward and had difficulty following complex commands. His face was symmetric, and no dysarthria was noted. Cranial-nerve function, muscle tone and strength, sensation, proprioception, deep-tendon reflexes, and gait were normal. He did not have photophobia. The mucous membranes were moist, and the neck was supple. There was no jugular venous distention. The heart sounds were normal, and the lungs were clear on auscultation. The abdomen was nontender, and there was no hepatosplenomegaly. He had no leg swelling or rash. The patient had a white-cell count of 13,270 per microliter (reference range, 4500 to 11,000). The blood urea nitrogen level was 117 mg per deciliter (41.8 mmol per liter; reference range, 8 to 25 mg per deciliter [2.9 to 8.9 mmol per liter]), the creatinine level 13.0 mg per deciliter (1149 μmol per liter; reference range, 0.6 to 1.5 mg per deciliter [53 to 133 μmol per liter]), and the creatine kinase level 28,581 U per liter (reference range, 60 to 400). He had hyponatremia, hyperkalemia, and acidosis, as well as elevated blood levels of aspartate aminotransferase and alanine aminotransferase. A comprehensive urine toxicology screen was negative, as was a serum toxicology screen for acetaminophen, salicylates, ethanol, and tricyclic antidepressants. Nucleic acid testing of a specimen obtained from the nasopharynx was negative for severe acute respiratory syndrome coronavirus 2, adenovirus, human metapneumovirus, influenza virus types A and B, parainfluenza virus types 1 through 4, and respiratory syncytial virus, as well as Bordetella pertussis, B. parapertussis, Chlamydia pneumoniae, and Mycoplasma pneumoniae. Imaging studies were obtained. Radiography of the chest revealed an opacity in the right lower lobe. Computed tomography (CT) of the head was normal. Intravenous dextrose, insulin, calcium gluconate, and fluids were administered, and treatment with intravenous ceftriaxone and azithromycin was started. A Foley catheter was placed, and oliguria was noted. The patient was admitted to this hospital. Three hours after the patient’s arrival, the temporal temperature increased to 38.2°C. The respiratory rate increased to 45 breaths per minute, and the oxygen saturation decreased to 89% while the patient was breathing ambient air. Supplemental oxygen was delivered through a nasal cannula at a rate of 6 liters per minute, and the oxygen saturation increased to 98%. CT of the chest, abdomen, and pelvis, performed without the administration of intravenous contrast material, showed consolidation in the right lower lobe with minimal adjacent ground-glass opacity. There was no evidence of lymphadenopathy.

case_30_2024: |
  A 45-year-old woman was referred to the rheumatology clinic of this hospital because of retroperitoneal fibrosis and the possibility of IgG4-related disease. Seven years before the current presentation, the patient had undergone a bone marrow biopsy at another hospital because of mild persistent polycythemia and leukocytosis. Examination of the biopsy specimen reportedly showed normocellular marrow with maturing trilineage hematopoiesis. No evidence of a myeloproliferative neoplasm or a V617F mutation in the gene encoding Janus kinase 2 (JAK2) was detected. Five years later (2 years before the current presentation), the patient was evaluated by her primary care physician because of polycythemia and flank pain on the left side. A faint IgG kappa monoclonal band was reportedly seen on immunoelectrophoresis. The blood levels of IgG, IgA, IgM, erythropoietin, and lactate dehydrogenase were reportedly normal. Ultrasonography performed at the first hospital reportedly revealed a complicated cyst, measuring 24 mm in diameter, in the upper pole of the left kidney with mural thickening and internal echoes. The patient also had an 18-mm parapelvic cyst in the middle portion of the left kidney, a 4-mm nonobstructive calculus in the left kidney, and mild parenchymal scarring in the right kidney. Seven weeks later, magnetic resonance imaging (MRI) of the abdomen and pelvis, performed after the administration of gadolinium, allowed for further characterization of the lesions. The lesion in the upper pole of the left kidney reportedly had homogeneous enhancement and was suggestive of renal-cell carcinoma. Approximately 17 months before the current presentation, the patient was evaluated at the urology clinic of a second hospital. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of contrast material, reportedly showed the enhancing 24-mm mass in the upper pole of the left kidney that was suggestive of renal-cell carcinoma. There was no evidence of metastatic disease. The 18-mm mass in the middle of the left kidney appeared as poorly circumscribed and hypoattenuating. Laparoscopic partial nephrectomy was performed to remove the mass in the upper pole of the left kidney. Histopathological examination of the tissue specimen revealed mild focal global glomerulosclerosis, mild interstitial fibrosis, and mild arteriosclerosis. No tumor was seen. Four months later, follow-up MRI of the abdomen and pelvis performed at the first hospital showed no recurrence of a mass in the surgical bed. Three months thereafter, ultrasonography performed at the first hospital reportedly revealed a new 19-mm hypoechoic lesion in the lower pole of the right kidney and showed a stable 18-mm mass in the middle of the left kidney. Gadolinium-enhanced MRI performed 1 month later showed that the 19-mm lesion in the lower pole of the right kidney was exophytic and enhancing. The appearance of this lesion on imaging was reportedly similar to the appearance of the 24-mm lesion that had been resected from the left kidney. Approximately 7 months before the current presentation, the patient had a consultation with a urologist at a third hospital. A percutaneous CT-guided biopsy targeting the exophytic lesion in the lower pole of the right kidney was performed. On histopathological examination, there was no renal parenchyma; it was assumed that only retroperitoneal tissue near the kidney had been obtained. The biopsy specimen showed atypical fibrous tissue with a storiform pattern of fibrosis and lymphoplasmacytic inflammation. Polytypic kappa and lambda staining within plasma cells was noted. There were more than 10 IgG4+ plasma cells per high-power field, but these cells made up less than 40% of the overall IgG+ cells. Flow cytometry was performed on the tissue specimen obtained during the attempted renal biopsy and showed no monotypic B-cell population. The white-cell count, differential count, and blood levels of electrolytes and lactate dehydrogenase were normal, as were test results for liver and kidney function. A screening test for human immunodeficiency virus types 1 and 2 was negative. Two months later, whole-body 18F-fluorodeoxyglucose (FDG) positron-emission tomography (PET)–CT performed at the first hospital reportedly showed that the skeleton had a diffusely heterogeneous appearance, with FDG uptake in both humeri, the left radius, and both acetabula. Gadolinium-enhanced MRI performed 1 month later showed multiple enhancing marrow-replacing lesions in the left humerus, the left ilium, and both acetabula. These findings were suggestive of multiple myeloma, metastases, or an infiltrative process. The lesions in the right kidney had not changed since the previous MRI. Three months later, the patient was evaluated at the rheumatology clinic of this hospital. On review of systems, she reported fatigue, as well as pain in the left shoulder and arm that had lasted for several months. She reported no weight change, fever, chills, or cardiac, respiratory, gastrointestinal, or genitourinary symptoms. Her medical history was notable for early menopause, which had occurred at 40 years of age and had been attributed to primary ovarian failure, as well as celiac disease, hyperlipidemia, hypertension, hiatal hernia, kidney stones, and migraines. Medications included atorvastatin, spironolactone, topiramate, and a multivitamin. She reported having adverse reactions to meperidine, methylprednisolone, and nickel. The patient was self-employed and lived in a small town with her husband. She had one adult child. She had smoked one third of a pack of cigarettes per day for 10 years but had quit smoking more than 15 years before this evaluation. She had no history of alcohol or other substance use. Her mother had died in her 50s from renal-cell carcinoma. A maternal aunt had ovarian and uterine cancer, and another had ovarian cancer. The patient’s BRCA mutation status was negative. On examination, the temporal temperature was 36.7°C, the heart rate 63 beats per minute, the blood pressure 134/61 mm Hg, and the oxygen saturation 97% while the patient was breathing ambient air. The weight was 90 kg, and the body-mass index (the weight in kilograms divided by the square of the height in meters) was 30.1. She had no proptosis, enlargement of the lacrimal glands, or enlargement of the major salivary glands (submandibular or parotid). No lymphadenopathy was present. The cardiac, lung, and abdominal examinations were unremarkable. The musculoskeletal examination revealed tenderness and markedly limited abduction at the left shoulder but was otherwise unremarkable. The white-cell count, differential count, and blood levels of electrolytes, calcium, and albumin were normal, as were test results for liver and kidney function. A radiograph of the left shoulder showed a lytic lesion in the greater tuberosity that corresponded to lesions that had been identified on PET-CT and MRI. Three months later, repeat whole-body PET-CT performed at the first hospital reportedly showed FDG uptake in both humeri and both acetabula. No hypermetabolic lymph nodes or lytic bone lesions were reportedly present on CT. A CT-guided bone biopsy of the left humerus performed at the first hospital reportedly showed fragments of trabecular bone. The bone marrow contained a lymphohistiocytic infiltrate with many plasma cells and fibrosis. Immunostaining showed a high background level of kappa and lambda immunoglobulin light chains, without a clonal population, as well as scattered IgG4+ cells. Five months after the initial presentation, the patient returned to the rheumatology clinic of this hospital. Testing for hepatitis B surface antigen and hepatitis C antibody was negative, as was an interferon-γ release assay for Mycobacterium tuberculosis. Two doses of rituximab were prescribed, but the patient had an infusion reaction while the second dose was being administered and was unable to complete the course. Four months later, whole-body MRI performed at the first hospital reportedly showed multiple 2-to-3-cm lesions in the humeri and acetabula that had not changed substantially from previous imaging studies. Additional 3-cm lesions were noted in the distal femurs, proximal tibias, and proximal fibulas; these findings had not been seen previously. Histopathological examination of a biopsy specimen and aspirate of a left tibial lesion was performed at the first hospital. Polytypic light-chain expression was noted, with more than 30 IgG4+ plasma cells per high-power field and an IgG4:IgG ratio of greater than 40%.

case_32_2024: |
  A 72-year-old woman was evaluated for dysarthria and respiratory failure during an admission to this hospital, which had occurred before the coronavirus disease 2019 pandemic. Two years before the current evaluation, the patient presented to her primary care physician at this hospital with subacute exertional dyspnea, which had been present for more than a year but had progressively worsened during the past several months. The oxygen saturation was 91 to 94% while she was walking. She had edema in both legs. The white-cell count, platelet count, and blood levels of electrolytes, aspartate aminotransferase, alanine aminotransferase, bilirubin, albumin, and hemoglobin were normal, as were test results for kidney function. A chest radiograph showed an enlarged cardiac silhouette and bilateral interstitial opacities. Hydrochlorothiazide was prescribed. At a follow-up evaluation 2 weeks later, the patient’s weight had decreased by 5 kg, but the exertional dyspnea and bilateral leg edema were unchanged. The N-terminal pro–B-type natriuretic peptide level was normal, and the d-dimer level was 3259 ng per milliliter (reference value, <500). Computed tomographic angiography (CTA) of the chest, performed after the administration of intravenous contrast material, showed no pulmonary emboli. A dilated main pulmonary artery, mosaic attenuation of the lungs, and coronary-artery calcifications were present. Four weeks later, the patient presented to her primary care physician with increased exertional dyspnea. Her weight had decreased by 2 kg. The peak expiratory flow was 220 liters per second (expected value according to age, sex, and height, 350). A tapering course of prednisone and inhaled albuterol were prescribed, and her condition improved initially. The patient was lost to follow-up; her next visit took place 10 months before the current evaluation. At that time, the patient reported recurrent exertional dyspnea, which occurred when she moved from room to room. She reported an episode of transient facial asymmetry with saliva dripping from the left side of her mouth that had developed while she was washing herself; later that day, her sister had noticed that she was slurring words during a telephone call. The white-cell count, platelet count, and blood levels of thyrotropin, glycated hemoglobin, aspartate aminotransferase, alanine aminotransferase, bilirubin, albumin, and hemoglobin were normal. Furosemide was prescribed. Two months later, the patient presented to her primary care physician with throat pain and dyspnea that had been present for 3 weeks. An examination was notable for diffuse crackles in both lung fields. A chest radiograph showed pulmonary edema and a small right pleural effusion. Intravenous furosemide was administered. Transthoracic echocardiography showed normal biventricular wall thickness, size, and function. Mild biatrial enlargement, a patent foramen ovale with mild left-to-right shunting, moderate tricuspid regurgitation, and a right ventricular systolic pressure of 60 mm Hg were noted. On the day before the current evaluation, the patient called her primary care physician to report sore throat with difficulty swallowing that had started 2 days earlier. Because she had slurred speech over the phone, she was referred to the emergency department of this hospital. In the emergency department, the patient reported dysphagia with food, liquids, and medications. Her daughter reported that her voice had sounded “garbled” and “soft” during the preceding days and also during an episode of transient dysarthria that had developed a few months earlier. Dyspnea and mild leg edema had been present for at least 3 years, along with some orthopnea and an intermittent nonproductive cough. The patient had started using a walker in the past year owing to exertional fatigue, arthritic pain, and weakness in both legs. Two falls had occurred in the previous 8 months. In addition, the patient reported increased generalized weakness and limb weakness, daytime somnolence, and fatigue. She had no diplopia, numbness, dizziness, headache, chest pain, palpitations, bleeding, nausea, abdominal pain, constipation, diarrhea, or urinary symptoms. The patient’s medical history was notable for severe obesity, coronary-artery calcifications, hypertension, hyperlipidemia, atrial flutter, and hyperparathyroidism. Medications included furosemide, apixaban, aspirin, amlodipine, lisinopril, metoprolol, lovastatin, metformin, and sertraline. She had had no known adverse drug reactions. The patient was retired and divorced, and she lived alone in an assisted-living community. She had smoked two packs of cigarettes daily for 15 years but had quit smoking 20 years earlier, and she did not drink alcohol or use other substances. Her family history was notable for ischemic heart disease. Her father had had myocardial infarctions; a paternal cousin had systemic lupus erythematosus. On examination, the temporal temperature was 36.2°C, the heart rate 76 beats per minute, the blood pressure 154/88 mm Hg, the respiratory rate 21 breaths per minute, and the oxygen saturation 84% while the patient was breathing ambient air. The weight was 124 kg, and the body-mass index (the weight in kilograms divided by the square of the height in meters) was 53.1. The patient was appropriately oriented, and her speech was fluent. She appeared to have increased work of breathing. The oropharynx was clear; no stridor was noted. Auscultation revealed an irregular heart rhythm with a systolic murmur at the base of the left sternal border and crackles in both lungs. The patient had pitting edema in both legs with venous stasis dermatitis and had tenderness of the knees with mild crepitus but no erythema or effusion. The white-cell count, platelet count, and blood levels of calcium, magnesium, phosphate, creatine kinase, lactate, aspartate aminotransferase, alanine aminotransferase, bilirubin, albumin, globulin, lipase, and hemoglobin were normal. Urinalysis showed 1+ protein. Testing of an oropharyngeal swab for group A streptococcal antigen was negative, and a throat culture showed no growth. A chest radiograph showed an enlarged cardiac silhouette, low lung volumes, and bilateral interstitial opacities. Electrocardiography was notable for atrial flutter with a ventricular rate of 75 beats per minute, a rightward axis, and low precordial QRS voltage. On the first night in the emergency department, the patient was unable to lie flat to sleep because of dyspnea. Intravenous furosemide was administered, along with continuous positive airway pressure (with a pressure of 10 cm of water and a rate of 4 liters of oxygen per minute). Cardiology and neurology consultations were requested. Computed tomography (CT) of the head and CTA of the head and neck showed chronic lacunar infarcts and chronic hypertensive microangiopathy. No high-grade stenosis or large-vessel occlusion was noted. CT of the neck and mediastinum showed no mass or lymphadenopathy. On the second day, the patient was admitted to the hospital because of slurred speech, voice changes, and dyspnea. The examination was notable for tachypnea and a new onset of forgetfulness. The dysarthria was most pronounced with guttural sounds. She also had facial droop on the right side, subtle ptosis in the right eye, slight weakness in the proximal muscles on both sides, pronator drift on the left side, and the Babinski reflex in the right foot. Magnetic resonance imaging (MRI) of the head and magnetic resonance angiography (MRA) of the head and neck showed findings similar to those seen on CT. No evidence of acute infarction was noted. Scattered foci of susceptibility signal were present in the cerebral hemispheres, basal ganglia, and thalami, findings consistent with chronic microhemorrhages. MRA showed widely patent intracranial and cervical arteries. On the third day, the patient was somnolent and was using accessory muscles for breathing until bilevel positive airway pressure was initiated. An evaluation revealed weak cough and delayed swallow initiation. Owing to the degree of dysphagia, it was recommended that the patient avoid oral medications and food. The thyrotropin level was normal. Direct laryngoscopy showed an impaired swallow, normal vocal cords, and no mass or other source of obstruction. Intravenous furosemide and piperacillin–tazobactam and inhaled ipratropium were administered.

case_33_2024: |
  A 71-year-old woman was transferred to this hospital for neurosurgical evaluation because of confusion, aphasia, and a mass lesion in the brain. The patient had been in her usual state of health until 3 days before the current presentation, when headache and fatigue developed. The next day, she was typing on a computer at her workplace when she suddenly noticed that her typed words were incoherent. The episode of confusion and language production difficulties resolved after a few minutes. Confusion recurred in the evening while the patient was at dinner with her husband, and she sought evaluation in the emergency department of another hospital. Examination was reportedly normal. Computed tomography (CT) of the head, performed without the intravenous administration of contrast material, and CT angiography of the head and neck reportedly showed a large area of attenuation in the left posterior superior frontal lobe. The patient was admitted to the other hospital. On hospital day 2, magnetic resonance imaging (MRI) of the head, performed after the intravenous administration of contrast material, revealed a heterogeneously enhancing mass in the left frontal lobe with vasogenic edema and mass effect. A diagnosis of cancer with metastases to the brain was considered, and additional imaging studies were obtained. CT of the chest, abdomen, and pelvis, performed after the intravenous administration of contrast material, reportedly showed a pulmonary nodule that measured 0.2 cm in diameter and a nodule in the right breast that measured 1.3 cm in diameter. The appearance of the breast nodule was unchanged from that observed on imaging performed 8 years before the current presentation, except for the presence of a new punctate calcification along the anterior margin. On hospital day 3, expressive aphasia developed. CT of the head, performed without the intravenous administration of contrast material, reportedly showed increased edema and mass effect that corresponded to the abnormality in the left frontal lobe. Treatment with dexamethasone and levetiracetam was started. The patient received one dose of each medication before she was transferred to the neurosurgical unit of this hospital for evaluation and possible brain biopsy. The patient had a history of myasthenia gravis, vitamin B12 deficiency, and hypertension. Surgical history included supracervical hysterectomy with bilateral salpingo-oophorectomy for uterine fibroids (performed 31 years before the current presentation), transsternal thymectomy and wedge resection of the right upper lobe for a cortical thymoma (22 years before the current presentation), and sigmoid colectomy for recurrent diverticulitis (7 years before the current presentation). Ocular-predominant myasthenia gravis was diagnosed 18 years before the current presentation and 4 years after thymectomy. Myasthenia gravis had been treated for 11 years with cyclosporine and pyridostigmine. Seven years before the current presentation, a flare of myasthenia gravis was complicated by respiratory failure, for which the patient received bilevel positive airway pressure and underwent plasmapheresis. After that hospitalization, cyclosporine therapy was replaced by mycophenolate mofetil, which she had been taking daily for the past 7 years. Other medications included cholecalciferol, latanoprost ophthalmic drops, hydrochlorothiazide, polysaccharide–iron complex capsules, and monthly intramuscular vitamin B12 injections. Amoxicillin–clavulanate had previously caused rash. The patient lived in the northeastern United States, was married, and worked in an office. She had recently traveled to California for a wedding, and she reported no exposures to animals or fresh water. She had not had any recent dental procedures. She had no history of tobacco use or injection drug use. She rarely consumed alcoholic beverages. Her mother had systemic lupus erythematosus, and her father had lung cancer. A sister had rheumatoid arthritis. On examination, the oral temperature was 36.6°C, the blood pressure 150/80 mm Hg, the pulse 91 beats per minute, and the oxygen saturation 96% while the patient was breathing ambient air. Severe expressive aphasia was observed, and she followed commands intermittently. Orientation could not be accurately assessed. She had disconjugate gaze at rest. Motor strength was 5/5 in the left arm and left leg and 4/5 in the right arm and right leg. The blood level of glucose was normal, as were the results of tests of kidney function. The blood level of phosphorus was 2.2 mg per deciliter (reference range, 2.6 to 4.5). The complete blood count was normal, as were the results of tests of coagulation. Electroencephalography showed intermittent irregular delta slowing focally over the left frontal region but no epileptiform abnormalities. CT of the head, performed without the intravenous administration of contrast material, revealed ill-defined parenchymal hypoattenuation involving the left superior frontal gyrus, left middle frontal gyrus, and left centrum semiovale with associated sulcal effacement. Treatment with dexamethasone, hydrochlorothiazide, mycophenolate mofetil, and pyridostigmine was stopped, as was treatment with cholecalciferol, latanoprost drops, polysaccharide–iron complex, and vitamin B12. Treatment with levetiracetam was continued, and empirical treatment with intravenous ceftriaxone and vancomycin was started. A left frontal craniotomy with open brain biopsy was planned to allow for sufficient lesional tissue to be obtained and to enable further debulking to be performed, pending intraoperative findings and the results of pathological assessment. A small craniotomy centered at the coronal suture directly over the target lesion was performed. The lesion appeared gray, and tissue that appeared abnormal was sampled in several locations of the lesion. Direct microscopic visualization of the specimens identified areas that did not appear to be completely distinct from normal tissue, and thus, further debulking was not indicated. No purulence was noted. Intraoperative examination of a frozen section revealed a cellular infiltrate consisting of atypical cells in a focal perivascular arrangement. No evidence of pathologically significant acute inflammation was present in the tissue. At this time, these features suggested the presence of a malignant infiltrate. Additional specimens were submitted to the pathology department for formalin fixation and interpretation. A diagnosis of lymphoma was considered, and treatment with dexamethasone administered intravenously every 6 hours was started. On postoperative day 1, new facial droop on the right side developed, along with weakness with cervical flexion and monoplegia of the right arm. Repeat MRI of the head, performed after the intravenous administration of contrast material, revealed postsurgical changes in the left frontal lobe and susceptibility artifact at the biopsy site that was consistent with blood products. There was enlargement of the expansile lesion in the left frontal lobe that corresponded to an area of hyperintensity on T2-weighted fluid-attenuated inversion recovery imaging.

case_34_2024: |
  A 69-year-old man with a history of myocardial infarction, ischemic cardiomyopathy, and an implantable cardioverter–defibrillator (ICD) was evaluated because of dyspnea during an urgent visit at an outpatient primary care clinic affiliated with this hospital. The patient had been in his usual state of health until 2 days before the current presentation, when he felt unwell while working. He had dyspnea on exertion (while moving and stocking boxes and when walking home from work), with baseline exertional dyspnea that occurred after ascending two to three flights of stairs. The next day, the patient had palpitations and felt lightheaded throughout the day. The palpitations continued, and he was evaluated by his primary care physician at an outpatient primary care clinic affiliated with this hospital. On a review of systems, the patient reported nausea with intermittent retching, anorexia (eating only a slice of cheese for the day), and fatigue. He stated that his right eye was “out of focus,” but he also noted that he had had this symptom in the past. He reported no chest pain or pressure. Although he had often had angina in the past, the patient noted that he had not had any episodes in the past 2 years and that he had had only one episode of substernal discomfort, which occurred while he was walking and had lasted 45 seconds. In addition, he had had no presyncope or loss of consciousness, ICD discharge, edema, orthopnea, paroxysms of nocturnal dyspnea, fever, known sick contacts, diarrhea, weight change, abdominal pain or bloating, dysuria, myalgia, arthralgia, rash, bleeding symptoms, or focal neurologic symptoms. He had not missed any doses of medications, and his last ICD check was 3 months before the current presentation. The patient’s medical history was notable for premature coronary artery disease, with a first occurrence of myocardial infarction in his third decade of life. In his fifth decade of life, he had undergone coronary-artery bypass grafting (CABG) and subsequent stenting of the native left anterior descending coronary artery. Coronary angiography, which was performed 2 years earlier for evaluation of angina, showed that the bypass graft and stent were patent but that severe native coronary disease was present (and was unchanged from an earlier study). The patient’s medical history also included ischemic cardiomyopathy with chronically reduced ejection fraction and scarring of the inferior and inferoposterior left ventricle, and ventricular tachycardia that had been treated with antiarrhythmic medication and an ICD. The ICD had been placed 3 years before the current presentation during an admission at this hospital for syncope that was followed by in-hospital cardiac arrest due to ventricular tachycardia, which required multiple external defibrillations. Thereafter, the patient received treatment with oral amiodarone; however, device interrogation revealed intermittent ventricular tachycardia at rates of 109 to 117 beats per minute that persisted over the next 8 months, and he underwent endocardial ablation of ventricular tachycardia in the scar of the mid-inferior wall. Six months after ablation, he was readmitted to this hospital because of nausea and dizziness that were due to recurrent sustained slow ventricular tachycardia (110 beats per minute), for which he was treated with intravenous lidocaine and antitachycardia pacing. In addition, the patient’s medical history included bioprosthetic mitral valve replacement concurrent with CABG, which had been complicated by prosthetic valve deterioration with mixed stenosis and mitral regurgitation, and culminated in transcatheter valve-in-valve replacement 2.5 years before the current presentation. He also had a history of hypertension, pulmonary embolism (4 years before the current presentation), iron-deficiency anemia, a colonic polyp, and prolonged encephalopathy after CABG. Medications included aspirin, coumadin, furosemide, metoprolol, lisinopril, dapagliflozin, ranolazine, atorvastatin, ferrous gluconate, paroxetine, and clonazepam. Treatment with amiodarone had previously been associated with elevations in liver-function test results. At the patient’s last office visit with an electrophysiologist 6 months before the current presentation, device interrogation showed no ventricular tachycardia and the heart rate was 60 beats per minute; treatment with amiodarone was discontinued. A transthoracic echocardiogram obtained at the same office visit with the electrophysiologist showed a left ventricular ejection fraction of 31% with inferior, posterior, and apical territory dysfunction; right ventricular hypokinesis; a left-to-right interatrial shunt; trace-to-mild aortic insufficiency; a well-seated mitral valve prosthesis with no regurgitation and a mean transmitral gradient of 5 mm Hg; and a right ventricular systolic pressure of 31 mm Hg. At a primary care visit 5 months before the current presentation, the patient reported bloating. The heart rate was 62 beats per minute and the blood pressure 104/64 mm Hg. The thyrotropin level was normal, the N-terminal pro–B-type natriuretic peptide (NT-proBNP) level 646 pg per milliliter (reference value, <900), the hematocrit level 40.9% (reference range, 41.0 to 53.0), and the low-density lipoprotein cholesterol level 74 mg per deciliter (1.92 mmol per liter; reference range, 50 to 129 mg per deciliter [1.29 to 3.34 mmol per liter]). The patient had had a routine office visit with his cardiologist 18 days before the current presentation, during which the heart rate was 63 beats per minute and the blood pressure 111/69 mm Hg; the weight was 83 kg. No changes were made to his medications. An electrocardiogram (ECG) obtained at the visit with the cardiologist showed atrial pacing, first-degree atrioventricular delay, right bundle-branch block, and evidence of old inferior, apical, and posterior myocardial infarctions. The patient was employed in multiple service jobs. He did not drink alcohol or use tobacco or other substances. He lived with several roommates on the fourth floor of an apartment building in an urban area and climbed stairs daily. His family history was notable for coronary artery disease in his father and stroke in his father, mother, and maternal grandmother. At the current presentation, the temporal temperature was 35.7°C, the heart rate 124 beats per minute and regular, the blood pressure 84/59 mm Hg while the patient was sitting and 99/67 mm Hg while he was in the supine position, and the oxygen saturation 99% while he was breathing ambient air. The weight was 83 kg. The patient appeared diaphoretic and clammy, and the skin was warm to the touch. He was alert, oriented, and lucid. The previous sternotomy and ICD sites were intact. There was no heart murmur; however, a possible S3 heart sound and minimal basilar rales were observed. The jugular venous pulse was difficult to visualize. A healed appendectomy scar was present, but the abdomen was nontender, the liver was nonpulsatile, and there was no fluid wave. The legs were warm with mild, symmetric pedal edema. Laboratory test results were obtained 2 weeks before the current presentation. The sodium level was 139 mmol per liter (reference range, 135 to 145), the potassium level 4.1 mmol per liter (reference range, 3.4 to 5.0), the creatinine level 0.91 mg per deciliter (80.44 μg per liter; reference range, 0.80 to 1.30 mg per deciliter [70.72 to 114.92 μg per liter]), the hematocrit 44.0%, the NT-proBNP 669 pg per milliliter, and the international normalized ratio (INR) 2.9 (reference range, 0.9 to 1.1).

case_35_2024: |
  A newborn girl was admitted to the neonatal intensive care unit (NICU) of this hospital because of cardiorespiratory arrest at delivery. The newborn’s mother was a 19-year-old woman (gravida 1, para 1) with a history of hepatitis C virus infection. Pregnancy was complicated by urogenital Chlamydia trachomatis infection that was treated in the second trimester, as well as gestational hypertension. Serial ultrasound surveys of the fetal anatomy performed between 20 weeks 1 day of gestation and 39 weeks 6 days of gestation revealed dilatation of the urinary tract on the right side. Ultrasonography of the fetal heart was normal. At 40 weeks 0 days of gestation, spontaneous rupture of membranes occurred, and the newborn’s mother was admitted to this hospital. Fetal heart tracings indicated nonreassuring fetal status, and at 22 hours 39 minutes of labor, a cesarean section was performed. The uterus was incised, and the amniotic fluid was noted to be stained with meconium. Six minutes later, the newborn was delivered; she was in a breech position at delivery. The birth weight was 3575 g (62nd percentile), the length 50 cm (42nd percentile), and the head circumference 35.5 cm (72nd percentile). The newborn had limp tone and no respiratory effort. Ventilatory support was initiated, and the trachea was intubated. Cardiopulmonary resuscitation was performed. Doses of epinephrine were administered through the endotracheal tube and an umbilical venous catheter, as were boluses of normal saline. After 16 minutes, spontaneous circulation was restored. The Apgar scores at 1, 5, 10, 15, and 20 minutes were 1, 0, 0, 1, and 3, respectively. The newborn was admitted to the NICU. On the patient’s arrival in the NICU, the axillary temperature was 34.9°C, the heart rate 141 beats per minute, and the blood pressure 84/59 mm Hg. The oxygen saturation was 97% while she was receiving oxygen through a mechanical ventilator in pressure-control mode. A course of therapeutic hypothermia was initiated. Chest radiography revealed a small-to-moderate pneumothorax in the medial aspect of the pleural cavity on the right side. Subtle lucency in the middle-to-lower thorax was present on the left side, a finding attributed to a possible left pneumothorax or air trapping. Needle thoracentesis was performed on the right side, and 20 ml of air was removed. Empirical treatment with ampicillin and ceftazidime was started. On day 2, increased work of breathing developed, and additional imaging was performed. Repeat chest radiography showed resolution of the right pneumothorax and development of a large left pneumothorax with extensive collapse of the left lung. Needle thoracentesis was performed on the left side, and 27 ml of air was removed. Chest radiography performed after thoracentesis showed that the left pneumothorax had decreased in size and inflation of the left lung had increased. Pathological examination of the placenta revealed meconium-stained membranes. There was evidence of acute chorioamnionitis with fetal vascular involvement and bacterial organisms on and in the membranes. During the next 2 days, the difference between the preductal oxygen saturation and the postductal oxygen saturation ranged from 5 to 15 percentage points, a finding suggestive of persistent pulmonary hypertension of the newborn. The fraction of inspired oxygen on the mechanical ventilator was increased to 1.0, and the administration of inhaled nitric oxide was initiated. Hypotension was treated with fluid resuscitation, and dopamine and milrinone infusions were started. Empirical treatment with vancomycin was also started. On transthoracic echocardiography, biventricular systolic function was at the low end of the normal range, and the right ventricle was moderately enlarged. A patent ductus arteriosus (measuring 2.9 mm in diameter), a midmuscular ventricular septal defect (measuring 2.0 mm in diameter), and a patent foramen ovale (measuring 2.5 mm in diameter) were present; each of these features was associated with bidirectional shunting. Tricuspid regurgitation (peak gradient, 58 mm Hg; arterial blood pressure, 66/36 mm Hg) and ventricular septal flattening were present, findings suggestive of elevated right ventricular pressure due to pulmonary hypertension. Ultrasonography of the kidneys and bladder revealed severe dilatation of the urinary tract on the right side; the left kidney was normal. The patient had an episode of rhythmic myoclonic jerking of the left leg that progressed to shaking of the left leg and arm, and phenobarbital was administered. Electroencephalography confirmed that a seizure originating in the midline posterior region had occurred. The seizure had lasted 25 minutes and had resolved spontaneously before the administration of phenobarbital. Ultrasonography of the head was normal. On day 4, the patient completed the 72-hour course of therapeutic hypothermia, and rewarming began. The blood pressure decreased. The milrinone infusion was gradually discontinued, the dopamine infusion dose was increased, an epinephrine infusion was started, and hydrocortisone was administered. The newborn had episodes of agitation that were associated with labile oxygen saturation. Chest radiography showed that the left pneumothorax had continued to decrease in size; patchy opacities were seen throughout the right lung. Transthoracic echocardiography showed depressed right ventricular function. During the next week, the pressor dose was increased. The periods of decreased oxygen saturation became more frequent and more prolonged, and ventilatory support was increased. On day 11, the oxygen saturation was 95% while the patient was receiving oxygen through a mechanical ventilator in pressure-control mode (peak inspiratory pressure, 31 cm of water; positive end-expiratory pressure, 9 cm of water; fraction of inspired oxygen, 1.0), along with inhaled nitric oxide. Empirical therapy with vancomycin, ampicillin, and ceftazidime was stopped after the patient completed 10-day courses. On day 16, the axillary temperature increased to 38.8°C. Chest radiography showed an opacity in the left lower lobe and a small left pleural effusion, as well as linear opacities in both upper lobes. Empirical treatment with oxacillin and gentamicin was started. On day 19, ventilatory support remained elevated, and empirical antibiotic therapy was transitioned to vancomycin and cefepime. On day 21, repeat chest radiography showed a persistent opacity in the left lower lobe. Empirical therapy with vancomycin was discontinued.

case_37_2024: |
  A 41-year-old man was admitted to the epilepsy monitoring unit (EMU) of this hospital because of seizures. When the patient was 4 years of age, his mother noticed an episode of staring and unresponsiveness. At 19 years of age, he was the driver in a single-vehicle accident in which the car rolled over. The patient did not recall the events or seek medical evaluation after the accident. Approximately 15 years before this admission, the patient received a diagnosis of epilepsy when episodes of staring to the left and unresponsiveness occurred. The seizures were preceded by a “bad feeling” in the epigastric region and were followed by confusion, agitation, or somnolence. An electroencephalogram (EEG) reportedly revealed bitemporal sharp waves, and magnetic resonance imaging (MRI) of the head reportedly showed possible asymmetry in the temporal horns. The focal seizures initially occurred weekly and progressed to generalized tonic–clonic seizures. During the subsequent 15 years, the patient received treatment with various medications and adjusted doses of various antiseizure medications, and seizures occurred approximately once per month. During the 3 months before this admission, the frequency of seizures increased to up to three times monthly, despite adherence to his prescribed medications, which included carbamazepine, levetiracetam, and topiramate. The patient was evaluated in the neurology clinic of another hospital, and the doses of carbamazepine and levetiracetam were increased. Four weeks before this admission, the patient had had five seizures in 2 weeks. Two weeks before this admission, coworkers witnessed shaking of his arms and legs and called emergency medical services. The patient was transported to the emergency department of the other hospital. He received a prescription for diazepam, which was to be taken as needed at night for insomnia, and was discharged home. The next day, the patient’s neurologist was commuting to his office when he spotted the patient stumbling on the side of the road. The patient was behaving erratically and did not respond to questions or commands. Law enforcement was called, and the patient tried to run away. He was restrained and taken to the emergency department of the other hospital. The behavior and confusion resolved, and the patient was referred to the EMU of this hospital for additional evaluation. On the day of this scheduled admission, the patient described stress at work, inadequate sleep, and adherence to his prescribed antiseizure medications. On a review of systems, he noted that he had had “blurriness” of memory for a few days after each seizure; however, he had been able to function well at work. He had no fever, chills, malaise, or headache. During the admission interview, the patient said that something strange was about to happen. His vision became blurred, and both thighs moved nonrhythmically. The patient was aware of these events and noted that they were not typical symptoms of his seizures. The patient had no known medical problems other than epilepsy. Medications included carbamazepine, topiramate, levetiracetam, and cholecalciferol, as well as diazepam as needed for sleep. He had no known drug allergies. The patient was born in a Caribbean country and had moved to coastal New England 5 years before this admission to live with his mother and aunt. He worked as a skilled tradesman. He did not drink alcohol, use illicit drugs, or smoke cigarettes. His two sisters were healthy, and his maternal grandmother had Alzheimer’s disease. There was no family history of seizures or psychiatric disease. The results of a physical examination, including vital signs, mental status, mood, and affect, were normal. The initial MRI of the head revealed decreased volume of the left hippocampus and parahippocampal gyrus with increased signal intensity on T2-weighted fluid-attenuated inversion recovery imaging. Ex-vacuo dilatation of the left temporal horn was present, which was most likely secondary to the volume loss. Interictal positron-emission tomography of the head was performed, which showed subtle reduction of 18F-fluorodeoxyglucose uptake in the left mesial temporal lobe. During the patient’s first 3 days at this hospital, the doses of carbamazepine and levetiracetam were decreased gradually, and topiramate was continued. No electroclinical or electrographic seizures were observed. During the fourth and fifth hospital days, the dose of carbamazepine was further decreased, and levetiracetam was stopped. A total of five seizures were observed, with staring and subtle movements in both legs that occurred for up to 3 minutes. EEG was performed, which revealed that most electroclinical seizure events originated from the left temporal lobe focus; one event originated from the right temporal lobe. After the second seizure, the patient tried to remove the EEG electrodes and leave the room. He bit and kicked the clinicians who tried to stop him. Security personnel were called, and intravenous haloperidol and lorazepam were administered. Between seizures, the patient was calm and cooperative without agitation. The dose of carbamazepine was increased. On the patient’s sixth hospital day, the blood pressure increased to 160/100 mm Hg, and the pulse increased to 120 beats per minute. Sixteen hours after the fifth seizure, he pressed the seizure alarm button three times during episodes of leg weakness and “foggy” vision. He answered questions with one-word answers and held his hand to his chest, saying that his heart felt “off.” He had auditory hallucinations of a keyboard playing and stated, “Please don’t fire those three girls.” Treatment with oral labetalol and lorazepam was started, and the dose of carbamazepine was further increased. On the seventh hospital day, the patient dismantled a metal piece from the table in his room. He then held the door closed and refused to allow staff to enter and threatened them. When a staff member approached the patient, he struck that person with the metal piece. Security personnel were called, intravenous haloperidol was administered, and the patient was temporarily placed into four-point restraints. The dose of carbamazepine was further increased, treatment with levetiracetam was restarted, and risperidone was started. The agitation resolved, and additional history was obtained. The patient explained his combative behavior by stating, “I thought they were trying to kill me,” and also said, “That’s not me.” He was concerned about the staff member who was struck and asked if that person was hurt. He had had no previous episodes of anger or violence, although he frequently had a feeling of fearfulness after seizures that made him want to be away from other people and on his own. He did not report auditory or visual hallucinations or paranoia, and he had never received a diagnosis of a psychiatric disorder. During the subsequent 3 days, carbamazepine, levetiracetam, and topiramate were administered at the preadmission doses, treatment with lorazepam was continued, and clobazam was started. He intermittently declined to take medications, especially the medications that were started in the hospital, such as labetalol and risperidone. Treatment with oral carbamazepine was transitioned to intravenous lacosamide. The patient had additional episodes of foggy vision, anxiety, restlessness, impulsivity, and agitation. He perseverated on the idea that God had saved him. He insisted that he needed to call his mother to tell her that “it’s the end.” He asked her for help because he believed he would be killed in the hospital. He was seen trying to eat a mobile telephone. Two-point and four-point restraints were placed intermittently.

case_38_2024: |
  A 22-year-old woman was transferred to this hospital in the summer before the coronavirus disease 2019 pandemic because of headache, fever, and respiratory failure. The patient had been in her usual state of health until 8 days before the current presentation, when nausea and myalgias developed. Over the next 2 days, chills, vomiting, neck pain, and headache with sonophobia developed. She presented to the emergency department of another hospital, where an evaluation reportedly showed dry mucous membranes but no signs of meningitis. The white-cell count was 12,300 per microliter (reference range, 4800 to 10,800), and the platelet count was 95,000 per microliter (reference range, 150,000 to 450,000). Intravenous normal saline and morphine were administered, and the patient was discharged with supportive care for a presumed viral syndrome. During the next week, the patient had worsening headache and new photophobia, as well as malaise, anorexia, nonproductive cough, and dyspnea with minimal exertion. Two days before the current presentation, the patient’s mother noticed episodes of confusion with nonsensical speech and excessive sleepiness, and she took the patient back to the emergency department of the other hospital. On evaluation, the patient reported ongoing severe headaches and dyspnea. The temporal temperature was 38.0°C, the heart rate 106 beats per minute, the blood pressure 100/55 mm Hg, the respiratory rate 22 breaths per minute, and the oxygen saturation 97% while she was receiving supplemental oxygen through a nasal cannula at a rate of 2 liters per minute. The patient had photophobia, but the neurologic examination was reportedly otherwise normal. She had mild throat erythema and diffuse abdominal tenderness with intermittent guarding. A urine test for beta human chorionic gonadotropin was negative. Blood cultures were obtained. Computed tomography (CT) of the head, performed without the administration of intravenous contrast material, reportedly showed subarachnoid hemorrhage and diffuse ischemic changes in the parietal and temporal lobes. Lumbar puncture was deferred because of thrombocytopenia. CT of the chest, abdomen, and pelvis, performed after the administration of intravenous contrast material, reportedly showed diffuse interstitial lung markings, multiple opacities and nodules in the peripheral lung, two hypodensities in the peripheral spleen, and subcentimeter retroperitoneal lymphadenopathy. Empirical treatment with intravenous vancomycin, ceftriaxone, metronidazole, and doxycycline was administered. The patient was admitted to the intensive care unit (ICU) of the other hospital. The next morning, screening tests for human immunodeficiency virus, Epstein–Barr virus, hepatitis B virus, and hepatitis C virus were negative, as was a blood-smear examination for parasites. Platelets were transfused, and intravenous normal saline was administered. The respiratory rate increased to 45 breaths per minute, and the oxygen saturation was 93% while the patient was receiving supplemental oxygen through a nasal cannula at a rate of 8 liters per minute; ventilation with bilevel positive airway pressure was attempted, and intravenous furosemide was administered. Ceftriaxone and metronidazole were discontinued, and empirical treatment with intravenous meropenem and clindamycin was administered. The patient was transferred to the ICU of this hospital. On arrival at this hospital, the patient had confusion and tachypnea and thus provided a limited history, but family members provided additional information. The patient had a history of depression, for which she received citalopram. She had no known drug allergies. She worked in health care. She drank wine socially, used electronic cigarettes, and occasionally smoked marijuana but did not smoke tobacco. Her most recent travel had been to the Caribbean more than 1 year before the current presentation. She had no exposure to wooded or rural areas. Her family had dogs, but she had no bites or scratches; she had no other animal or insect exposures. There were no recent sexual contacts. Her mother had cutaneous lupus erythematosus, and her maternal grandmother had Hashimoto’s thyroiditis. On examination, the temporal temperature was 37.6°C, the heart rate 97 beats per minute, the blood pressure 103/56 mm Hg, the respiratory rate 49 breaths per minute, and the oxygen saturation 95% while the patient was receiving supplemental oxygen through a nasal cannula at a rate of 8 liters per minute. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 22. The patient appeared to be in respiratory distress, with accessory muscles used for breathing. She was oriented only after prompting. She had meningismus and concomitant rigidity of the shoulders with passive range of motion, but she had no focal cranial-nerve, strength, or sensory deficits. Auscultation of the lungs and heart revealed diffuse rales and rhonchi, as well as a grade 3/6 holosystolic murmur that was loudest at the apex and left axilla and radiated to the sternum. The spleen tip was palpable. A small patch of petechiae was present on the upper chest. The remainder of the examination was normal. The blood levels of phosphorus, globulin, aspartate aminotransferase, and alanine aminotransferase were normal, as were the results of coagulation tests; antinuclear antibodies were undetectable. Additional blood cultures were obtained. Chest radiography showed diffuse lung opacities and pleural effusions on both sides. Electrocardiography showed sinus tachycardia with normal intervals and nonspecific minor ST- and T-wave changes. Empirical treatment with intravenous vancomycin, meropenem, azithromycin, doxycycline, and acyclovir was administered. Four hours after admission, increased work of breathing, tachypnea, and confusion progressed, and the trachea was intubated for initiation of mechanical ventilation. Intravenous propofol, hydromorphone, and phenylephrine were administered. Bronchoalveolar lavage was performed, revealing mildly bloody and frothy effluent from all the lobes of the lungs. On examination of bronchoalveolar lavage specimens, the nucleated-cell count was 375 per microliter, with 77% neutrophils. Gram’s staining showed no organisms. Tests for common respiratory virus — including influenza A and B viruses, respiratory syncytial virus, adenovirus, and parainfluenza viruses — were negative. A culture was also obtained. CT of the head, performed without the administration of intravenous contrast material, revealed bilateral scattered curvilinear hyperdensities in the cortical sulci, findings suggestive of acute subarachnoid hemorrhage. There were also focal hypodense regions in the left superior parietal lobule and right temporal lobe with loss of normal gray–white matter differentiation, findings suggestive of acute cortical infarcts. CT pulmonary angiography showed evidence of mild interstitial edema, bilateral pleural effusions, and multifocal peribronchovascular nodular opacities and consolidations involving all the lobes of the lungs, some of which were peripherally distributed, without cavitation. CT of the abdomen and pelvis showed several splenic hypodensities, which were most likely splenic infarcts, with accompanying mild ascites and mild periportal edema. Platelets were transfused, and lumbar puncture was performed, with an opening pressure of 38 cm of water. On cerebrospinal fluid (CSF) analysis, the glucose level was 41 mg per deciliter (reference range, 50 to 75), the protein level 31 mg per deciliter (reference range, 5 to 55), the red-cell count 2400 per microliter (reference range, 0 to 5), and the nucleated-cell count 49 per microliter (reference range, 0 to 5), with 76% neutrophils, 16% monocytes, and 8% lymphocytes. Magnetic resonance imaging (MRI) of the head revealed multifocal subarachnoid sulcal hyperintensities on fluid-attenuated inversion recovery (FLAIR) imaging, findings that can be seen with subarachnoid hemorrhage or acute meningitis. The focal hypodense regions in the left superior parietal lobule and right temporal lobe that had been noted previously on CT were associated with restricted diffusion on an apparent-diffusion-coefficient map and on diffusion-weighted imaging from MRI of the head, which is compatible with bilateral acute cortical infarcts.

case_40_2024: |
  A 56-year-old woman with metabolic dysfunction–associated steatohepatitis and cirrhosis was admitted to this hospital because of end-stage liver disease. The patient had been chronically ill and was healing from recent left hip surgery when new fatigue and abdominal pain developed 15 days before this admission. The patient did not take her routine, prescribed medications because of confusion. Thirteen days before this admission, when confusion prevented the patient from going to a scheduled appointment for therapeutic paracentesis, her husband took her to the emergency department of another hospital. On evaluation, the patient reported abdominal pain and otherwise answered questions unreliably with one-word responses. She appeared jaundiced and was confused but oriented. Marked abdominal distention with bulging flanks and diffuse tenderness was observed. The left hip was bruised with a healing surgical wound with staples in place. Urinalysis was normal, and a urine toxicology screening was positive for opioids, oxycodone, and fentanyl, which had been prescribed. Radiography of the chest showed elevation of the right hemidiaphragm, increased opacification of the right hilum, and linear opacities in the left lower lung. Computed tomography (CT) of the abdomen and pelvis revealed a shrunken nodular cirrhotic liver contour and large-volume ascites; the gallbladder was surgically absent. Compression deformities of the lumbar spine, healed pubic rami fractures, and a left hip prosthesis were also noted. CT of the head revealed mild scattered hypodensities in the white matter, a finding consistent with chronic small-vessel disease. Empirical treatment with ceftriaxone was administered. The patient was admitted to the other hospital. During the subsequent 12 days, lactulose and rifaximin were administered, and hepatic encephalopathy abated. Anemia worsened, and packed red cells were transfused. Esophagogastroduodenoscopy was performed, which reportedly revealed esophageal varices with evidence of previous band ligation and no active bleeding, as well as portal hypertensive gastropathy and erythematous duodenitis. Results of testing of the peritoneal fluid were not consistent with spontaneous bacterial peritonitis, and ceftriaxone was stopped. Treatment with furosemide and spironolactone was administered, and three therapeutic paracenteses were performed. The renal function worsened, the administration of diuretic agents was stopped, albumin was given intravenously, and treatment with midodrine and octreotide was started. On hospital day 13, the patient was transferred to this hospital for additional management of end-stage liver disease and acute renal injury, as well as evaluation for liver transplantation. On transfer to this hospital, the patient described nausea and increasing abdominal distention and discomfort. A review of systems was notable for headache, heartburn, and pain in the left shoulder and hip. The patient had a history of coronary artery disease, diabetes mellitus type 2, hyperlipidemia, obesity, gastroesophageal reflux disease, hypothyroidism, anxiety, and depression. Migraines had occurred frequently in the past but had been rare after menopause. She had previously undergone a cesarean section, cholecystectomy, arthroplasty of the left shoulder, and recently, an open reduction and internal fixation involving the left femur. Medications included lactulose, midodrine, octreotide, ondansetron, pantoprazole, simethicone, insulin, gabapentin, duloxetine, and levothyroxine. Oxycodone and fentanyl patches started after the recent surgery were weaned and stopped, and the patient took acetaminophen as needed for pain. Treatment with azithromycin, trimethoprim–sulfamethoxazole, and hydromorphone had caused nausea and diarrhea; metoclopramide, promethazine, and prochlorperazine had caused anxiety. The patient lived in a rural area of New England with her husband and did not work because of medical disability. She did not drink alcohol, smoke cigarettes, or use illicit drugs. On examination, the temporal temperature was 36.2°C, the blood pressure 92/55 mm Hg, and the pulse 78 beats per minute. The patient appeared chronically ill and jaundiced and was alert and oriented. The abdomen was tensely distended, with a fluid wave and diffuse tenderness. She had no asterixis, and trace swelling was present in both legs. No rash was present. The neurologic examination was normal. Treatment with midodrine and octreotide was stopped, and treatment with terlipressin was started. On hospital day 2, the patient noted that headache, which had been present since admission to the other hospital, had increased in severity. The pain, which she described as “throbbing and pounding,” was in the right frontal region and reminded her of previous migraines. On hospital day 3, headache persisted, and the pain radiated to the back of her neck, which was not typical of her previous migraines. Butalbital–acetaminophen–caffeine was given, and a lidocaine patch was placed at the back of the neck; however, the pain did not abate after these treatments. On hospital day 4, nausea and abdominal distention increased, and therapeutic paracentesis was performed. CT of the head showed no changes from the previous imaging. The administration of sumatriptan and intravenous magnesium and hydromorphone relieved the headache. However, on hospital day 5, headache worsened in severity throughout the day until the patient was tearful and rated the pain at 9 on a scale of 0 to 10, with 10 indicating the most severe pain. She had new photophobia, and blurred vision developed in the right eye. Intravenous hydromorphone was administered, and she subsequently rated the pain at 6 out of 10.