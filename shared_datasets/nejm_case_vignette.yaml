  A 32-year-old woman was admitted to this hospital because of flank pain, fever, and hypoxemia. Two weeks before the current presentation, sharp, intermittent pain in the left flank developed. Two days before the current presentation, the pain worsened in intensity, became more constant, and was associated with nausea. The next day, the patient had multiple episodes of vomiting. On the morning of the current presentation, she noted a dry cough and a subjective feeling of warmth, although she had not checked her temperature at home. She presented to an urgent care clinic affiliated with her primary care physician’s office for evaluation. In the urgent care clinic, the patient reported ongoing pain in the left flank and dry cough. No increased urinary frequency, dysuria, or hematuria was present, and she had no shortness of breath. The temporal temperature was 38.1°C, the blood pressure 107/75 mm Hg, the pulse 113 beats per minute, the respiratory rate 20 breaths per minute, and the oxygen saturation 95% while she was breathing ambient air. Physical examination revealed abdominal tenderness on palpation of the left lower quadrant, but no tenderness was detected when the costovertebral angles were tapped. The white-cell count was 19,000 per microliter (reference range, 3800 to 10,800) with a neutrophilic predominance. The blood level of albumin was 2.8 g per deciliter (reference range, 3.3 to 5.5), and carbon dioxide 23 mmol per liter (reference range, 24 to 29); the anion gap was 18 mmol per liter (reference range, 10 to 20). Urinalysis showed 3+ blood (reference value, negative) and 3+ protein (reference value, negative) but was otherwise normal. A urine test for human chorionic gonadotropin was negative. The oxygen saturation decreased to 89% while the patient was in the urgent care clinic and then increased to 94% when oxygen was delivered through a nasal cannula at a rate of 3 liters per minute. She was transported by ambulance to the emergency department of this hospital. In the emergency department, the patient reported ongoing left flank pain, recurrent nausea, cough with new sputum production, and new shortness of breath. There was no history of joint pain, joint swelling, oral ulcers, or rash. She had no relevant medical history and had not been pregnant. Her surgical history included appendectomy. The patient took no medications and had no known adverse reactions to medications. She worked as a gardener and lived with a sister in Massachusetts. She did not smoke tobacco, vape, or use illicit drugs. She drank alcohol occasionally. Both of her parents had diabetes and hypertension. One sister had had kidney disease that required hemodialysis at 17 years of age; she died at 18 years of age. The patient identified as Hispanic. There was no family history of blood clots or cancer. On examination, the temporal temperature was 39.6°C, the blood pressure 102/58 mm Hg, the pulse 122 beats per minute, the respiratory rate 28 breaths per minute, and the oxygen saturation 96% while she was receiving oxygen through a nasal cannula at a rate of 3 liters per minute. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 30.1. The patient appeared uncomfortable. No oral ulcers, alopecia, or rash was present. The results of a joint examination were normal. On auscultation, inspiratory and expiratory course crackles were noted in both lungs. The heart sounds were tachycardic but otherwise normal. She had pain on palpation of the left lower abdomen. No edema was present. Urinalysis revealed 3+ blood (reference value, negative), 3+ protein (reference value, negative), more than 100 red cells per high-power field (reference range, 0 to 2), and 10 to 20 white cells per high-power field (reference value, <10). The ratio of protein to creatinine in urine was 3.5 (reference value, <0.15), a finding that suggests a urinary protein level of approximately 3.5 g per day. The glycated hemoglobin level was 6.2% (reference range, 4.3 to 5.6). A test for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) RNA was negative. Blood was obtained for culture, and imaging studies were performed. Chest radiography revealed low lung volumes; patchy basilar and retrocardiac opacities with partial obscuration of the left hemidiaphragmatic border and a small pleural effusion were observed on the left side. Computed tomography (CT) of the chest, performed according to a pulmonary embolism protocol, was markedly limited for the detection of pulmonary emboli because of the phase of contrast material but showed a partial filling defect in the right lower lobar pulmonary artery and a suspected filling defect in a subsegmental artery in the right lower lobe. Bronchial wall thickening was present, as were multifocal peribronchiolar and dependent consolidative opacities with surrounding ground-glass opacities. Small left and trace right pleural effusions and minimal areas of interlobular septal thickening associated with areas of ground-glass opacities were observed. CT of the abdomen and pelvis, performed after the administration of intravenous contrast material, revealed a nearly occlusive thrombus in the left renal vein and a nonocclusive thrombus in the right renal vein without thrombus or compression in the iliac veins. Early heterogeneous parenchymal enhancement of the kidneys and moderate perinephric stranding were observed. No evidence of cancer was seen in the chest, abdomen, or pelvis. The patient received 2 liters of lactated Ringer’s solution, and treatment with intravenous vancomycin and cefepime was started.

