  A 65-year-old woman was transferred to this hospital for evaluation of pancytopenia and back pain. The patient had been in her usual state of health until 3 weeks before the current evaluation, when midline cervical, thoracic, and lumbar back pain developed after she had rolled a patient over during her work as a home health aide. She was evaluated by her primary care physician. On neurologic examination, her strength was preserved and symmetric, and her gait was normal; no spinal or paraspinal tenderness was present on palpation. Treatment with prednisone, tramadol, and cyclobenzaprine was initiated, along with physical therapy. However, her pain persisted, prompting referral to a sports medicine specialist. Radiographs of the cervical, thoracic, and lumbar spine reportedly showed diffuse osteopenia and moderate degenerative disk disease with cervical osteophytes at the C5–C6 and C6–C7 levels. There was no evidence of acute fracture. Treatment with a higher dose of prednisone and oxycodone was prescribed. Four days before the current evaluation, the patient was transported by ambulance to the emergency department of another hospital after her sister had found her lying on the floor of her home, with immobility from back pain. She had had a bowel movement while lying on the floor, and her house was in disarray. On examination, the oral temperature was 36°C, and the remainder of the vital signs and physical examination were reportedly normal. The complete blood count was notable for a platelet count of 14,000 per microliter (reference range, 150,000 to 450,000), a hemoglobin level of 8.9 g per deciliter (reference range, 12.0 to 16.0), and a white-cell count of 5100 per microliter (reference range, 4500 to 11,000). An automated differential count revealed the presence of immature granulocytes and nucleated red cells. Additional laboratory studies showed a prothrombin time of 15.7 seconds (reference range, 9.1 to 12.1), which corresponded to an international normalized ratio of 1.3 (reference range, 0.9 to 1.2). The partial-thromboplastin time and the fibrinogen level were normal. The lactate dehydrogenase level was greater than 2500 U per liter (reference range, 110 to 210), the ferritin level 24,325 μg per liter (reference range, 10 to 200), and the haptoglobin level 91 mg per deciliter (reference range, 30 to 200). The vitamin B12, folate, and copper levels were normal. Nucleic acid amplification testing for babesia and anaplasma species was negative, as was serologic testing for Lyme disease. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of intravenous iodinated contrast material, reportedly showed nodules at both lung bases, as well as areas of hepatic nodularity and enhancement. There was a well-circumscribed, hypoattenuating lesion at the pancreatic head that was related to a known intraductal papillary mucinous neoplasm, which had not changed from imaging obtained 3 years earlier. A peripheral-blood smear reportedly showed schistocytes. After consultation with the hematology service was obtained, fresh-frozen plasma and packed red cells were transfused, and intravenous methylprednisolone was administered. The patient was transferred to this hospital to be evaluated for thrombotic thrombocytopenic purpura (TTP). On the patient’s arrival at this hospital, she reported diarrhea, epigastric abdominal pain, and profound fatigue, in addition to persistent spinal pain, night sweats, and cough during the preceding month. She did not have leg weakness, saddle anesthesia, or fecal incontinence. She noted an unintentional weight loss of approximately 9 kg during the past 6 weeks. Her medical history was notable for primary hypothyroidism, type 2 diabetes, migraines, and intraductal papillary mucinous neoplasm. An episode of complicated diverticulitis had been treated with sigmoid colectomy and partial small-bowel resection. Hysterectomy and cholecystectomy had been performed in the remote past. Medications included escitalopram, topiramate, levothyroxine, and pancreatic enzyme–replacement therapy. The patient lived alone in Massachusetts and worked as a home health aide. She had smoked two packs of cigarettes per day for 40 years but had quit smoking 3 years before the current evaluation. She did not drink alcohol or use recreational drugs. Her mother had had breast cancer at 70 years of age, and her niece had received a diagnosis of colorectal cancer at 40 years of age. A colonoscopy performed 18 months before the current evaluation was notable for hyperplastic polyps and tubular adenomas, which were resected. Her most recent mammogram, performed 5 years before the current evaluation, was normal. On examination, the oral temperature was 36.2°C, the heart rate 89 beats per minute, the respiratory rate 16 breaths per minute, the blood pressure 167/71 mm Hg, and the oxygen saturation 95% while the patient was breathing ambient air. She appeared pale and tired. There was tenderness on deep palpation of the epigastrium; Murphy’s sign was absent. No ecchymoses or petechiae were present. The platelet count was 10,000 per microliter (reference range, 150,000 to 450,000), the hemoglobin level 7.5 g per deciliter (reference range, 12.0 to 16.0), and the white-cell count 2860 per microliter (reference range, 4500 to 11,000). A manual differential count showed 9.4% nucleated red cells, 1.0% plasma cells (reference value, 0.0), and 1.0% metamyelocytes (reference value, 0.0). The reticulocyte count was 1.9% (reference range, 0.7 to 2.5). The aspartate aminotransferase level was 102 U per liter (reference range, 9 to 32), the alanine aminotransferase level 64 U per liter (reference range, 7 to 33), the alkaline phosphatase level 308 U per liter (reference range, 45 to 115), and the lipase level greater than 3000 U per liter (reference range, 13 to 60). Results of a basic metabolic panel and direct antiglobulin testing were otherwise unremarkable; the bilirubin levels were normal. Antinuclear antibody testing was positive at a titer of 1:40. Results of serum protein electrophoresis were normal, as were levels of free light chains, the kappa:lambda ratio, and the IgG4 level. A peripheral-blood smear showed basophilic stippling, hypolobated neutrophils with prominent granules, and thrombocytopenia with occasional large platelets. No blasts or schistocytes were seen. CT of the abdomen and pelvis, performed after the administration of intravenous iodinated contrast material, revealed a subcentimeter hypodense lesion on the pancreatic head, which had not changed from previous imaging and was most likely indicative of a side-branch intraductal papillary mucinous neoplasm. Diffuse parenchymal hypoattenuation was present in the liver, a finding compatible with hepatic steatosis. In addition, focal fat stranding and fluid surrounded the pancreatic tail; these features were consistent with acute pancreatitis. The patient was admitted to the hospital.

