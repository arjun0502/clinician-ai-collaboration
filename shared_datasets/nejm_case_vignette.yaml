  A 56-year-old man was admitted to this hospital because of left lower abdominal pain and anemia. The patient had been in his usual state of health until 1 year before the current presentation, when diarrhea developed. The stools were watery, foamy, and nonbloody. The diarrhea was worst after he had eaten, although it did not fully resolve with fasting. It occasionally woke him up from sleep and was associated with bloating but no pain, nausea, or vomiting. Eleven months before the current presentation, the patient was evaluated at another hospital. Computed tomography (CT) of the abdomen and pelvis reportedly revealed thickening of proximal jejunal loops. A possible fistula between a proximal jejunal loop and the distal transverse colon was noted. Esophagogastroduodenoscopy (EGD) and colonoscopy reportedly showed scalloped mucosa in the second portion of the duodenum and normal mucosa in the colon. A biopsy specimen from the duodenum reportedly showed villous blunting and intraepithelial lymphocytosis; a biopsy specimen from the colon reportedly showed glandular dysplasia. Testing for IgG and IgA to tissue transglutaminase was negative. The IgA level was 9 mg per deciliter (reference range, 47 to 310). A diagnosis of celiac disease was considered, and treatment with a gluten-free diet was started. Bloating abated, but diarrhea persisted. Ten months before the current presentation, the patient was evaluated in the outpatient gastroenterology clinic affiliated with the other hospital because of persistent diarrhea. The laboratory evaluation revealed iron-deficiency anemia and a fecal calprotectin level of 493 μg per gram (reference value, <50). Stool studies were positive for giardia antigen; a course of tinidazole was prescribed. During the next 8 months, several stool studies were positive for giardia antigen, and courses of antimicrobial agents — including metronidazole, nitazoxanide, and metronidazole plus albendazole — were administered. The diarrhea abated briefly with each course and then recurred. A screening test for human immunodeficiency virus types 1 and 2 was negative. Two months before the current presentation, the patient was admitted to this hospital because of persistent diarrhea and weight loss of 23 kg in the past year. The level of IgG to giardia in stool was 4.6 U per milliliter (reference value, <20.6); treatment with nitazoxanide was started and was continued for 7 days. The blood levels of C-reactive protein, cobalamin, folate, vitamin E, and vitamin A were normal. The copper level was 65 μg per deciliter (reference range, 73 to 129), the zinc level 49 μg per deciliter (reference range, 60 to 106), the vitamin K level 0.4 ng per milliliter (reference range, 0.1 to 2.2), and the 25-hydroxyvitamin D level 11 ng per milliliter (reference range, 20 to 80). CT of the abdomen and pelvis revealed diffuse mural thickening and mucosal hyperenhancement of the colon. Several jejunal loops were tethered to the distal transverse colon. Numerous prominent mesenteric lymph nodes were noted; the spleen was normal in size. Magnetic resonance enterography showed an enterocolonic fistula between the proximal jejunum and the distal transverse colon. Short-segment wall thickening and a focal stricture of the involved jejunal loop were causing mild upstream jejunal dilatation. No associated high-grade bowel obstruction was present. EGD was performed along with push enteroscopy and colonoscopy. Diffuse abnormal nodular mucosa was present in the duodenum and jejunum. The fistula in the proximal jejunum was surrounded by ulceration and friable tissue, with no clear mass. Colonoscopy showed a 1-mm fistula in the transverse colon with surrounding ulceration and a normal-appearing terminal ileum. Biopsy specimens from the duodenum and jejunum showed variably active neutrophilic enteritis. A lymphoid inflammatory infiltrate was seen in the lamina propria, as was a decrease in plasma cells. Rare organisms that were consistent with giardia were also identified in the duodenal specimen. Ulceration with mucosal granulation tissue and fibrinopurulent exudate was identified in the jejunal specimen, without evidence of cancer. Immunohistochemical staining for cytomegalovirus and adenovirus was negative in the small-bowel specimens, and staining for CD117 highlighted mast cells with normal morphologic features and a normal distribution. Biopsy specimens from the area of the colonic fistula showed fragments of organizing granulation tissue and fibrinopurulent exudate, findings consistent with ulceration in the presence of a fistula tract. Special staining for infectious microorganisms — including periodic acid–Schiff staining, Grocott’s methenamine silver staining, Steiner staining, and acid-fast staining — was negative. The finding of sparse plasma cells in the lamina propria of enterocolonic mucosa was consistent with immunoglobulin deficiency. The patient had negative tests for IgG, IgA, and IgM to enterocytes; IgG and IgA to gliadin; and IgG and IgA to tissue transglutaminase. The test for antibodies to tissue transglutaminase was performed while he was following a gluten-free diet. Testing for the presence of the HLA-DQ2 and HLA-DQ8 haplotypes was also negative, as was a nucleic acid amplification test of blood for Tropheryma whipplei DNA. Additional testing for immunodeficiency was performed. The blood levels of IgM and IgA were undetectable. The IgG level was 1190 mg per deciliter (reference range, 614 to 1295), with a normal level of IgG1 but with low levels of IgG2, IgG3, and IgG4. Serum electrophoresis with immunofixation showed an IgG lambda M component in the gamma region (0.81 g per deciliter). A diagnosis of monoclonal gammopathy of undetermined significance was suspected. Flow cytometry performed on peripheral blood revealed an immunophenotypically abnormal natural killer (NK)–cell population with features suggestive of clonality. A peripheral-blood smear showed a subpopulation of monotonous-appearing, slightly enlarged lymphoid cells with round-to-indented nuclei, condensed chromatin, and abundant eccentric pale granular cytoplasm. Sequencing of a blood sample with the use of a rapid heme panel was normal. The expanded NK-cell population was thought to be caused by either autoimmunity or infection; plans were made to perform repeat flow cytometry in 6 months to reassess the NK-cell population. A diagnosis of Crohn’s disease was suspected. The patient was hospitalized for approximately 1 month and received 17 days of treatment with total parenteral nutrition, which was tapered as his oral intake of food increased. Diarrhea resolved during the admission. Treatment with infliximab was started, with the first dose administered 2 days before discharge. In the presence of hypogammaglobulinemia, two doses of intravenous immune globulin were administered before immunosuppression with infliximab was initiated. After discharge, diarrhea did not recur, and the patient was eating normally. He returned to his work in construction. Ten days before the current presentation, dull pain in the left lower abdomen developed. During the next 10 days, stools were intermittently dark, without hematochezia or melena. Two days before the current presentation, outpatient laboratory testing revealed a hemoglobin level of 6.8 g per deciliter (reference range, 13.2 to 17.1); the level had been 8.0 g per deciliter on discharge from this hospital 1 month earlier. The patient’s primary care physician recommended that he present to the emergency department of this hospital for evaluation. In the emergency department, the patient reported occasional lightheadedness with position changes and ongoing mild left lower abdominal pain. Additional medical history included nephrolithiasis and dyslipidemia; surgical history included appendectomy and cholecystectomy. In addition to infliximab, medications included cholecalciferol, cyanocobalamin, ferrous sulfate, and a multivitamin. There were no known adverse reactions to medications. The patient was born in Brazil and had lived in the United States for 27 years. He had last visited Brazil 7 years before the current presentation. He lived with his wife and two teenage children in coastal Massachusetts. Their home had a city water supply. He was a lifelong nonsmoker and did not drink alcohol or use drugs. His sister had died at 44 years of age from an unknown cause. On examination, the temporal temperature was 36.6°C, the blood pressure 113/65 mm Hg, the pulse 84 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 24.0; the weight had decreased by 4 kg in the month since he was discharged from this hospital. The left lower abdomen was tender on palpation. The ankles had trace edema. No external hemorrhoids were noted, and the rectal tone was normal. No stool or gross blood was seen on a digital rectal examination. The blood levels of electrolytes, glucose, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, bilirubin, and lactic acid were normal, as were the results of coagulation and kidney-function tests. The hemoglobin level was 7.5 g per deciliter (reference range, 13.5 to 17.5); the complete blood count and differential count were otherwise normal. CT angiography of the abdomen and pelvis showed no evidence of active bleeding but revealed marked concentric wall thickening and aneurysmal dilatation of two discontinuous segments of proximal jejunum located in the left upper abdomen. The segments had mural hypoenhancement that was suggestive of bowel-wall ischemia. Adjacent proximal jejunal loops had mucosal hyperenhancement. The patient was admitted to the hospital.

