case_12_2025: |
  A 56-year-old woman was evaluated in the emergency department of this hospital because of sore throat and rash. The patient had been in her usual state of health until 2 days before the current presentation, when sore throat and pruritus on the chest developed. There was a history of depression with psychosis, and she resided in a homeless shelter. Despite pruritus, the patient did not inspect the skin on her chest. On the day of the current presentation, while the patient was looking in the mirror in a public bathroom, she noticed a rash on her face, which prompted her to look at the rest of her skin. She saw that the rash also involved the chest, abdomen, and legs. She presented to the emergency department of this hospital for evaluation. In the emergency department, the patient reported ongoing pruritus and sore throat. She noted that several residents at the homeless shelter had appeared to be scratching themselves in the week before the current presentation, and she had heard an employee at the shelter discussing lice and scabies with another shelter resident. There was no known exposure to new soaps, detergents, or lotions. She did not sleep outside or spend time in the woods. She was not sexually active. She had no fever, malaise, headache, confusion, changes in strength or sensation, dyspnea, or cough. In addition to her history of depression with psychosis, she had a history of dyslipidemia and metabolic dysfunction–associated steatohepatitis. Medications included risperidone and benztropine. There were no known adverse reactions to medications. She did not smoke tobacco, drink alcohol, or use illicit drugs. The temporal temperature was 38.4°C, the blood pressure 134/72 mm Hg, the pulse 83 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 96% while the patient was breathing ambient air. She was alert and cooperative. Diffuse pink papules were present on the forehead, nose, cheeks, and chin. An ulcer was present on the anterior upper gum. Excoriated papules and vesicles were seen on the back, chest, and abdomen, with involvement of the inframammary and inguinal folds. Pink papules were noted on the dorsal aspect of the hands and the palms. The lung sounds were normal. The blood levels of electrolytes and alkaline phosphatase were normal, as were the results of kidney-function tests. The aspartate aminotransferase level was 44 U per liter (reference range, 9 to 32), the alanine aminotransferase level 60 U per liter (reference range, 7 to 33), and the albumin level 3.2 g per deciliter (reference range, 3.3 to 5.0). The white-cell count was 5300 cells per microliter with 5.3% atypical lymphocytes; the remainder of the complete blood count was normal.

case_8_2025: |
  A 72-year-old woman was evaluated at this hospital because of altered mental status. Five years before the current admission, the patient underwent transurethral resection of a 4-cm papillary transitional-cell carcinoma of the bladder (grade 3 of 3) that had invaded the muscularis propria. She received local radiation therapy, as well as chemotherapy with fluorouracil and mitomycin C. Cytologic examination of the urine performed 3 months before the current admission reportedly showed findings that were suggestive of urothelial cancer. Two weeks before the current admission, the patient had hematuria with clots, accompanied by dysuria and flank pain. She received a course of oral ciprofloxacin. Four days before the current admission, cystoscopy revealed evidence of mild radiation cystitis, blood clots, and a new 1.5-cm tumor on the left lateral bladder wall. Cytologic examination revealed high-grade urothelial carcinoma. Bladder fulguration was scheduled. On the second day after cystoscopy (2 days before the current admission), the patient noted an unintentional weight gain of 2.5 kg during the preceding 2 days. On the third day after cystoscopy, the patient’s cardiologist recommended that she add a second daily dose of torsemide and spironolactone to her current regimen. That night, the patient was agitated and slept without her usual bilevel positive airway pressure device. The next morning, the patient’s daughter called emergency medical services when she noticed that the patient had persistent somnolence and altered mental status. The patient was transported to the emergency department of this hospital. Additional history was obtained from the patient’s daughter. The patient had been disoriented for the past few days and had had 2 weeks of hematuria, chills, fatigue, lethargy, progressive dyspnea, and edema in both legs. She had also had unintentional weight gain. During the previous 6 weeks, the patient had recorded fingerstick blood glucose levels of greater than 230 mg per deciliter (12.8 mmol per liter; reference range, 70 to 100 mg per deciliter [3.9 to 5.6 mmol per liter]), which had been attributed to increased carbohydrate intake. A review of systems had been notable for mechanical falls, right shoulder pain, constipation, and hemorrhoids. She had had no fever, anorexia, known sick contacts, or other neurologic symptoms. She had received two vaccinations against severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) in the previous 9 months. Approximately 7 months before the current admission, the patient had been admitted to this hospital because of somnolence; she had been found to have hypercapnia. She had received bilevel positive airway pressure, antibiotic agents, and diuretic therapy. Her symptoms had been attributed to excessive use of benzodiazepines. The patient’s medical history included asthma and recurrent bronchitis, restrictive lung disease, obstructive sleep apnea, precapillary and postcapillary pulmonary hypertension with right ventricular dysfunction, heart failure with preserved ejection fraction, coronary artery disease, right bundle-branch block, stage 3a chronic kidney disease (baseline creatinine level, 1.3 mg per deciliter [115 mmol per liter]; reference range, 0.6 to 1.5 mg per deciliter [53 to 133 mmol per liter]), hyperlipidemia, hypertension, type 2 diabetes mellitus, gout, gastroesophageal reflux disease, appendectomy, iron-deficiency anemia, osteoarthritis resulting in right total hip replacement and knee arthroscopy, osteoporosis with lumbar compression and previous hip fracture, fibromyalgia, depression, and anxiety. Medications included oral aspirin, armodafinil, allopurinol, colchicine, dapagliflozin, metformin, melatonin, metoprolol, montelukast, extended-release morphine sulfate, pantoprazole, pravastatin, sertraline, spironolactone, torsemide, and as-needed lorazepam and immediate-release morphine sulfate. The patient also received inhaled fluticasone–salmeterol and mometasone, as-needed supplemental oxygen, and albuterol and ipratropium nebulizers as needed. Cefuroxime, celecoxib, and oxycodone had caused urticaria. The patient was a retired factory worker and lived with her husband and daughter in the Boston area. She drank wine rarely and did not use tobacco or other substances. Her family history was notable for breast and stomach cancer in her mother. On examination, the patient appeared frail and somnolent and was in mild respiratory distress. The temporal temperature was 36.3°C, the heart rate 73 beats per minute, the blood pressure 102/54 mm Hg, the respiratory rate 25 breaths per minute, and the oxygen saturation 96% while she was receiving supplemental oxygen through a nasal cannula at a rate of 4 liters per minute. The weight was 76.0 kg (as compared with 72.3 kg measured 3 weeks earlier); the height was 152 cm, and the body-mass index (the weight in kilograms divided by the square of the height in meters) was 32.9. During the interview, she required frequent redirection, offered brief answers, and followed simple commands. Strength in the arms and legs was symmetric. The lung sounds were diminished in the anterior lung fields, with decreased respiratory efforts and bibasilar crackles. On auscultation, a grade 2/6 systolic murmur was present at the base. There was mild, diffuse abdominal tenderness and 2+ edema in both legs, with mildly diminished pulses that were symmetric. The remainder of the examination was normal. Blood levels of aspartate aminotransferase, alanine aminotransferase, bilirubin, alkaline phosphatase, and calcium were normal, as were the prothrombin time and international normalized ratio. Blood and urine samples were obtained for culture. Testing for SARS-CoV-2 RNA was negative. Electrocardiography showed sinus arrhythmia and known right bundle-branch block. A chest radiograph showed low lung volumes, mild interstitial opacities consistent with pulmonary edema, and small bilateral pleural effusions with adjacent atelectasis. The patient received intravenous vancomycin, ceftriaxone, and metronidazole. Bilevel positive airway pressure was initiated. Norepinephrine and bumetanide were administered intravenously. Four hours after the patient arrived in the emergency department, she was admitted to the intensive care unit (ICU). The temporal temperature was 36.7°C, the heart rate 69 beats per minute, the blood pressure 91/55 mm Hg while she was receiving intravenous norepinephrine, the respiratory rate 20 breaths per minute, and the oxygen saturation 93% while she was receiving bilevel positive airway pressure (inspiratory pressure, 12 cm of water; positive end-expiratory pressure, 5 cm of water; fraction of inspired oxygen, 0.40). Blood levels of acetaminophen, ethanol, and salicylates were undetectable, and urine toxicology screening was negative. A radial arterial catheter and a femoral central venous catheter were placed; measurements of central venous pressure ranged from 8 to 12 cm of water. Bedside cardiac ultrasonography reportedly showed that the left ventricular cavity was small but was functioning normally and that the right ventricle was dilated and hypokinetic. In the morning of the second day in the ICU, the patient was somnolent. The norepinephrine dose was increased from 5 μg per minute to 14 μg per minute, and vasopressin was started. Overnight, the urine output was recorded at approximately 100 to 150 ml per kilogram per hour, with a net fluid balance of −373 ml from the previous day. Intravenous chlorothiazide and calcium gluconate were administered. The glycated hemoglobin level was 7.5% (reference range, 4.3 to 5.6); the levels of thyrotropin, cortisol, aspartate aminotransferase, and alanine aminotransferase were normal. Abdominal and pelvic radiographs showed nondilated bowel loops, a partially healed fracture of the right pubic ramus, and evidence of previous left total hip arthroplasty. In the afternoon of the second day in the ICU, the patient reported diffuse myalgias, and intravenous bumetanide was changed to intravenous furosemide. Over the course of the first 12 hours of the second day, the urine output was 1895 ml, with a total fluid balance of −884 ml.

case_14_2025: |
  A 29-year-old woman was admitted to this hospital because of sore throat and peritonsillar swelling and bleeding. The patient had been well until 7 weeks before the current admission, when sore throat developed. When the soreness did not abate after 1 week, she sought evaluation at a primary care clinic of another hospital. Screening tests of a nasopharyngeal swab for severe acute respiratory syndrome coronavirus 2 RNA and streptococcal antigen were negative. The patient was instructed to rest and drink fluids. During the next 4 days, the throat soreness increased in severity to the point that the patient was unable to sleep through the night. She returned to the primary care clinic, and azithromycin was prescribed. During the subsequent 5 days, she took the prescribed antibiotic, but the throat soreness did not abate. She called the primary care clinic and was instructed to go to the emergency department of the other hospital. On evaluation in the emergency department, 31 days before the current admission, the patient described pain and swelling on the right side of the throat and noted that when she swallowed food, it felt as though the food became “stuck.” She reported fatigue but no fever, headache, shortness of breath, cough, nausea, vomiting, abdominal pain, diarrhea, or rash. On examination, the temporal temperature was 36.9°C, the blood pressure 105/77 mm Hg, the heart rate 74 beats per minute, and the oxygen saturation 99% while the patient was breathing ambient air. She appeared well and had a normal voice without hoarseness or stridor. The mucous membranes were moist. Edema and fluctuance were seen in the right peritonsillar area of the soft palate. The right tonsil had no erythema, swelling, or exudate. The uvula deviated to the left. No trismus was noted. The lungs were clear on auscultation. There was no palpable lymphadenopathy and no rash. The white-cell count was 6700 per microliter (reference range, 4000 to 11,000).  Computed tomography (CT) of the neck, performed after the intravenous administration of contrast material, revealed a hypodense lesion in the right peritonsillar region of the oropharynx that measured 2.6 cm by 2.1 cm by 3.8 cm. There was minimal peripheral enhancement. The presence of the lesion resulted in mild effacement of the oropharynx. Minimal fat stranding was present in the right parapharyngeal fat. No edema was noted in the right medial pterygoid muscle. A right jugulodigastric lymph node had a normal appearance. The patient was discharged home with a prescription for amoxicillin–clavulanate and was advised to schedule a follow-up visit at the otolaryngology clinic of the other hospital. Twenty-six days before the current admission, the patient was evaluated at the otolaryngology clinic of the other hospital. The right peritonsillar lesion was incised, and 3 ml of sanguineous fluid was drained. The next day, the patient returned to the otolaryngology clinic because of increased pain and swelling on the right side of the throat and bleeding from the incision site. On examination, the right peritonsillar area was more edematous than it had been the previous day, and ecchymosis, friable mucosa, and some necrotic granulation tissue were noted. The incision site was partially open with oozing of bloody fluid. A repeat drainage of fluid at this site was attempted, and a hematoma was evacuated with suction. Bleeding was treated with silver nitrate and oxidized regenerated cellulose; however, oozing at the site continued. The patient was taken to the operating room urgently. On examination while the patient was under anesthesia, there was oozing of bloody fluid from multiple sites in the right peritonsillar area. Oxymetazoline-soaked gauze and a human gelatin–thrombin matrix sealant were used to achieve hemostasis. The patient was admitted to the other hospital. Dexamethasone and ampicillin–sulbactam were administered, and an infusion of lactated Ringer’s solution was initiated. On the second hospital day, after confirmation that bleeding had stopped, she was discharged home with instructions to resume treatment with amoxicillin–clavulanate and to take acetaminophen and oxycodone as needed for pain. During the next 2 weeks, the pain and swelling on the right side of the throat decreased. However, 8 days before the current admission, the patient noticed that her voice sounded “froggy.” She returned to the otolaryngology clinic of the other hospital, and treatment with clindamycin and methylprednisolone was started. During the subsequent 4 days, the patient noticed intermittent bleeding on the right side of the throat. She was referred to the otolaryngology clinic of a second hospital. Four days before the current admission, aspiration of the swollen area of the right peritonsillar region reportedly yielded dark blood.

case_17_2025: |
  A 61-year-old man was transferred to this hospital because of acute hypoxemic respiratory failure and shock. Ten weeks earlier, the patient had undergone deceased-donor kidney transplantation at this hospital for hypertensive nephrosclerosis-related end-stage kidney disease. After transplantation, the patient’s hospitalization was notable for the administration of antithymocyte globulin induction therapy; delayed graft function with hyperkalemia, for which he underwent two sessions of hemodialysis; and urinary retention. On postoperative day 4, he was discharged home with instructions to take oral prednisone, tacrolimus, mycophenolate sodium, trimethoprim–sulfamethoxazole, and valganciclovir. Six weeks after transplantation (4 weeks before the current admission), during a follow-up visit in the transplantation clinic, the creatinine level was 1.60 mg per deciliter (141 μmol per liter; reference range, 0.60 to 1.50 mg per deciliter [53 to 133 μmol per liter]); however, hyperglycemia was noted, with a glycated hemoglobin level of 7.7% (reference value, <5.7). Treatment with a once-weekly injection of semaglutide was started. One week later, the patient was evaluated at the emergency department of another hospital for erythema and swelling of the left ankle after being scratched by a domestic cat. A radiograph of the ankle reportedly showed soft-tissue swelling. A course of amoxicillin–clavulanate was prescribed. During the next week, the patient began to have fatigue, nausea, emesis, polydipsia, and polyuria. Outpatient laboratory test results were notable for a glucose level of 519 mg per deciliter (29 mmol per liter; reference range, 70 to 100 mg per deciliter [3.9 to 5.6 mmol per liter]). At the recommendation of the transplantation team, he was admitted to the other hospital. On arrival at the other hospital, 10 days before the current admission, the oral temperature was 36.8°C, the heart rate 108 beats per minute, the blood pressure 127/74 mm Hg, the respiratory rate 26 breaths per minute, and the oxygen saturation 97% while the patient was breathing ambient air. The weight was 105.7 kg. The blood levels of calcium, magnesium, and phosphorus were normal. Urinalysis showed 4+ glucose. Nucleic acid testing of a nasopharyngeal swab for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) was negative. Electrocardiography reportedly showed sinus tachycardia with premature atrial contractions. Intravenous normal saline and insulin were administered. During the next 3 days, the patient received a total of 2.3 liters of intravenous crystalloid solution. On the fifth day of hospitalization, the oxygen saturation had decreased to 93% while the patient was breathing ambient air, and supplemental oxygen was administered intermittently. Nausea persisted with intermittent episodes of emesis and inability to eat. On the seventh day of hospitalization, the administration of labetalol — a medication that the patient had been taking at home — was discontinued because the blood pressure had decreased to 84/48 mm Hg and the heart rate had increased to more than 120 beats per minute. On the eighth day of hospitalization, a cough productive of white sputum developed, and dyspnea, which had also developed, had progressed such that it occurred with less exertion and when the patient was at rest. Radiographs of the chest obtained on the 9th and 10th days of hospitalization showed progressively worsening pulmonary edema. Intravenous boluses of furosemide were administered. Abdominal distention with ileus developed, and a nasogastric tube was inserted. On the 10th day of hospitalization, computed tomography (CT) of the chest, performed without the intravenous administration of contrast material, showed extensive interstitial and ground-glass opacities, as well as mediastinal and hilar lymphadenopathy. After multiple intravenous boluses of furosemide were administered, a continuous intravenous infusion of furosemide was started. When the blood pressure decreased to 83/50 mm Hg, midodrine was administered. The patient began to have tachypnea (up to 38 breaths per minute) with accessory-muscle use, and the oxygen saturation was 96% while the patient was receiving supplemental oxygen through a nasal cannula at a rate of 6 liters per minute. Oxygen was subsequently administered through a high-flow nasal cannula, and the patient was transferred to the intensive care unit (ICU). Specimens of blood and tracheal aspirate were obtained for culture. Empirical treatment with piperacillin–tazobactam was administered intravenously. The next day, the patient became lethargic and more hypoxemic; the oxygen saturation was 96% while the patient was receiving supplemental oxygen through a high-flow nasal cannula at a rate of 40 liters per minute. The trachea was intubated for initiation of mechanical ventilation. The blood pressure decreased to 81/53 mm Hg; lactated Ringer’s solution was administered intravenously, and a central venous catheter was placed for administration of norepinephrine. Transthoracic echocardiography reportedly showed normal ventricular function, left ventricular hypertrophy, left atrial enlargement, an inferior vena cava with respirophasic collapse, and mild thickening of the aortic and mitral valves. The esophageal temperature was 38.1°C. Treatment with piperacillin–tazobactam was discontinued, and empirical treatment with vancomycin and meropenem was started. The patient was transferred to the ICU of this hospital; norepinephrine, vasopressin, propofol, fentanyl, and hydrocortisone were administered intravenously en route. On admission to this hospital, additional history was provided by the patient’s wife. In addition to dyspnea, the patient had had nausea, anorexia, progressive abdominal discomfort, and intermittent emesis throughout the first hospitalization, and he was currently not having bowel movements. He also had dull headache and low back pain. He did not have chest pain, palpitations, dizziness, pain or redness at the surgical incision site, or bleeding symptoms. The patient’s medical history included hypertension, type 2 diabetes mellitus, hyperlipidemia, coronary calcifications, ectasia of the aorta, hyperparathyroidism for which he had undergone parathyroidectomy, obstructive sleep apnea, kyphoplasty at the level of the first lumbar vertebra, and repair and internal fixation of a left ankle fracture. The patient had been undergoing hemodialysis for 6 years while awaiting kidney transplantation. Outpatient medications included oral prednisone, tacrolimus, mycophenolate sodium, trimethoprim–sulfamethoxazole, valganciclovir, furosemide, labetalol, famotidine, and tamsulosin, as well as subcutaneous semaglutide. Atenolol had caused constipation, and amitriptyline had caused dry mouth. The patient’s family history was notable for diabetes in multiple maternal relatives, renal insufficiency in his mother, and prostate cancer in his father. The patient had smoked cigarettes for 20 years but had quit 25 years before the current admission. He did not drink alcohol or use other substances. He had lived in New England his entire life, except for 18 months during his teenage years, when he resided in the southern United States; he had not otherwise traveled. He had been previously employed in food service and education and had not had any known occupational exposures. He enjoyed gardening and had healthy domestic cats and a dog at home. On examination, the esophageal temperature was 38.1°C, the heart rate 123 beats per minute, and the blood pressure 114/58 mm Hg while the patient was receiving infusions of norepinephrine at a rate of 36 μg per minute and vasopressin. The weight was 109.0 kg. The oxygen saturation was 97% while he was receiving oxygen through a mechanical ventilator in volume-control mode (tidal volume, 500 ml at a rate of 20 breaths per minute; positive end-expiratory pressure, 8 cm of water; fraction of inspired oxygen, 0.50). No oral mucosal lesions were present. Auscultation of the chest revealed diffuse crackles in the lungs. The heart was tachycardic. The abdomen was distended and tense, with few bowel sounds. The kidney allograft site in the right lower quadrant was nonerythematous; no bruit was detected. A purpuric rash was present on the abdomen. An arteriovenous fistula in the left upper arm was associated with a weak thrill and bruit. Symmetric leg edema was present. Serum osmolality was normal. Nucleic acid amplification testing of deep tracheal aspirate for influenza A and B viruses, respiratory syncytial virus, and SARS-CoV-2 was negative. Cytomegalovirus DNA viral load was undetectable. Galactomannan was not detected in the blood, and pneumocystis antigen was not detected in the tracheal aspirate. Urine and sputum samples were obtained for culture while the patient was receiving mechanical ventilation. Electrocardiography revealed sinus tachycardia with premature atrial contractions. A chest radiograph showed diffuse bilateral interstitial and airspace opacities that were more extensive in the left lung than in the right lung. The endotracheal tube, central venous catheter in the right internal jugular vein, and nasogastric tube were all in appropriate positions. An abdominal radiograph obtained on the same day showed diffuse gaseous distention of the small and large bowel. Intravenous vancomycin and meropenem therapy was continued, and methylene blue therapy was started.

case_4_2025: |
  A 41-year-old man was evaluated at this hospital because of swelling in both ankles and episodes of syncope. The patient had been in his usual state of health until approximately 4.5 months before the current presentation, when exertional dyspnea and a burning sensation in the chest developed. The symptoms lasted for several weeks, and the patient was admitted to another hospital. Radiography and computed tomography (CT) of the chest reportedly showed no abnormalities. Coronary angiography showed severe stenosis of the right coronary artery, and a stent was placed. The patient’s symptoms resolved after the procedure; he was able to walk for 30 minutes daily without a recurrence of symptoms. Ten days before the current presentation, the patient had worsening fatigue. During the next 3 days, fever, diffuse myalgia, anorexia, mild headache, new scattered ecchymoses, and arthralgia in the wrists and ankles developed. Antigen testing for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) was reportedly negative. Symptoms abated on the fourth day. However, on the fifth day, he had a temperature of 38.2°C, and syncope occurred when he stood up from a chair, causing a fall that resulted in an injury to the right knee. The next morning, while the patient was urinating, he became nauseated, diaphoretic, and lightheaded. He tried to lower himself to the ground and called for his family; then, witnessed syncope occurred, and he hit his head. He regained consciousness after a few seconds, and soon afterward, he presented to the emergency department of this hospital. On examination, the temporal temperature was 36.3°C, the heart rate 79 beats per minute, the blood pressure 121/72 mm Hg, and the oxygen saturation 99% while the patient was breathing ambient air. He had dry mucous membranes. His right knee was tender and had limited range of motion during flexion. Ecchymoses were noted on the left hip and right biceps. Nucleic acid testing for SARS-CoV-2 and influenza types A and B was negative. An antibody test for Lyme disease was nonreactive. An electrocardiogram was normal. A chest radiograph obtained in the emergency department was reportedly normal. A radiograph of the right knee reportedly showed a joint effusion without evidence of fracture or dislocation. Lactated Ringer’s solution was administered intravenously, and the patient was discharged home. During the next 4 days, the patient reported new erythema and edema in the ankles. Ankle arthralgia persisted; it was worst in the morning and did not abate with the administration of acetaminophen. On the day of admission, the patient had a temperature of 39.4°C, and he returned to the emergency department of this hospital. Review of systems was notable for brief heart palpitations that had occurred over a period of several weeks, as well as chronic snoring. The patient reported no chest pain, dyspnea, orthopnea, paroxysmal nocturnal dyspnea, abdominal pain, diarrhea, vomiting, dysuria, cough, rhinorrhea, neck stiffness, dry mouth, mouth ulcer, lymphadenopathy, Raynaud’s phenomenon, vision changes, weakness, or paresthesia. He had no sick contacts. The patient’s medical history was notable for coronary artery disease, hypertension, hyperlipidemia, impaired glucose tolerance, obesity, erectile dysfunction, hepatic steatosis, rosacea, and anxiety. Medications included aspirin, ticagrelor, atorvastatin, metoprolol, amlodipine, and escitalopram. There were no known adverse reactions to medications. The patient worked in an office and lived in an urban area of New England with his spouse and a cat; the cat had scratched his left wrist approximately 6 months earlier. He had smoked a half pack of cigarettes daily for 12 years and had tried marijuana. He did not currently smoke cigarettes, drink alcohol, or use other substances. His travel history included visits to coastal New England, mid-Atlantic states, and the southeastern United States. For 2 years in the remote past, he had lived in the United Kingdom. His family history was notable for hyperlipidemia, hypertension, and systemic sclerosis in his mother; pulmonary fibrosis in a maternal aunt; smoking-related lung cancer in his maternal grandmother; and pancreatic cancer in his maternal grandfather. On examination, the temporal temperature was 37.6°C, the heart rate 88 beats per minute, the blood pressure 132/62 mm Hg, and the oxygen saturation 96% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 31.4. No lymphadenopathy was noted in the cervical, supraclavicular, submental, submandibular, axillary, or inguinal areas. The wrists were tender and swollen, with pain on extension and flexion. There was edema in the ankles, and erythematous macules were noted on the ankles. Rosacea was present, but no other skin or nail changes were noted. The rest of the examination was normal. Blood levels of calcium, magnesium, phosphorus, albumin, globulin, and total protein were normal, as were the white-cell count, the differential count, and blood levels of aspartate aminotransferase, alanine aminotransferase, bilirubin, and alkaline phosphatase. Urinalysis was normal. A blood specimen was obtained for culture. A nucleic acid test for SARS-CoV-2 was negative. Antibodies to human immunodeficiency virus and syphilis were not detected. An electrocardiogram was normal. Point-of-care ultrasonography reportedly showed normal ventricular function, no pericardial effusion, and no B lines. The next morning, no thrombus was identified on ultrasonography of the lower legs. Chest radiography revealed bilateral hilar enlargement and otherwise clear lung fields. Given this finding, the chest radiograph that had been previously obtained in the emergency department was again reviewed, and on retrospective assessment, bilateral hilar prominence was noted. CT of the chest and abdomen, performed after the intravenous administration of contrast material, showed diffuse mediastinal and bilateral hilar lymphadenopathy, a finding that had not been present on CT performed 4.5 months earlier. There were also multiple pulmonary nodules, including perifissural nodules and an 8-mm nodule in the right lower lobe that had increased in size since the previous study. Interlobular septal thickening in the right lower lobe was noted, as was diffuse bronchial-wall thickening, hepatic steatosis, and coronary-artery calcification.

case_36_2024: |
  A 16-year-old girl was admitted to this hospital because of abdominal pain. The patient had been in her usual state of health until 4 weeks before the current presentation, when intermittent abdominal pain developed. During the next 2 weeks, the episodes of pain became more frequent, increasing from every few days to two times daily and lasting approximately 2 minutes. Two weeks before the current presentation, the patient had new nausea, and she vomited three times. She was not able to go to school, and her parents took her to the emergency department of another hospital for evaluation. In the emergency department, the patient described the pain as sharp and rated it at 8 on a scale of 0 to 10 (with 10 indicating the most severe pain). The pain was worst in the epigastrium and in the upper quadrants of the abdomen. The temporal temperature was 36.6°C, the heart rate 105 beats per minute, the blood pressure 125/66 mm Hg, the respiratory rate 18 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. The mucous membranes were dry. She had diffuse abdominal tenderness with guarding on palpation of the epigastrium, left upper quadrant, and right upper quadrant. The white-cell count was 14,900 per microliter (reference range, 4500 to 13,000) and the hemoglobin level 11.3 g per deciliter (reference range, 12.0 to 16.0). Qualitative urine testing for human chorionic gonadotropin was negative, and urinalysis was normal. Ultrasonography of the abdomen and pelvis showed no abnormalities, although the appendix was not visualized. Oral acetaminophen was administered, as were intravenous ketorolac, famotidine, and ondansetron. The patient was discharged home with instructions to start treatment with oral famotidine, ondansetron, and ibuprofen. During the next week, the patient continued to have intermittent episodes of abdominal pain and nausea, and she left early from school on two days because of pain. She took ibuprofen on one occasion, but the pain subsequently worsened; she decided not to take any additional doses. She did not take any doses of famotidine or ondansetron. One week before the current presentation, abdominal pain woke the patient from sleep, and her parents took her to the emergency department at the other hospital. The mucous membranes were dry, and no abdominal distention or tenderness was noted. The white-cell count was 13,000 per microliter and the hemoglobin level 11.4 g per deciliter. Repeat ultrasonography of the abdomen and repeat transabdominal ultrasonography of the pelvis again showed no abnormalities. Screening tests for gonorrhea and chlamydia were negative. The patient was discharged home with instructions to start treatment with famotidine, ondansetron, and acetaminophen. During the subsequent week, episodes of abdominal pain and nausea continued to occur. On the day of the current presentation, the episodes of pain lasted 15 minutes, and the patient vomited five times. Her parents brought her to the emergency department of this hospital for evaluation. The patient described the episodes of abdominal pain as severe, occurring abruptly, and followed by nausea; when vomiting occurred, the severity of pain decreased. The pain was not related to menstruation, body position, time of day, or eating or drinking, although she noted that she had had decreased appetite. She had had fatigue, dizziness, and generalized weakness, as well as constipation that had worsened during the previous 2 weeks; the last bowel movement had occurred 3 days before the current presentation. There was no fever, diarrhea, or rash. The patient’s medical history included iron-deficiency anemia and anxiety disorder; she had had pica as a toddler. She had normal growth and development and had received all childhood vaccinations. Medications included iron supplementation, oral contraception, and famotidine, as well as acetaminophen as needed for abdominal pain; she had not started taking ondansetron. She had no known drug allergies. The patient lived with her mother, father, sister, and dog in an urban area of New England. She attended high school. She was sexually active and had had two male partners; she used condoms consistently. She did not drink alcohol, use illicit drugs, or smoke tobacco; she had last smoked marijuana 4 weeks before the current presentation. Her maternal grandmother had peptic ulcer disease, her maternal grandfather had heart disease, and her father had depression and anxiety. On examination, the temporal temperature was 36.7°C, the heart rate 84 beats per minute, and the blood pressure 113/78 mm Hg. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 25.8. The patient was actively retching during the examination. The mucous membranes were moist, and bowel sounds were present. The abdomen was nondistended, soft, and diffusely tender (predominantly in the epigastrium), and there was guarding without rebound. The rectal examination was normal, with no palpable stool in the rectal vault. The white-cell count was 15,720 per microliter and the hemoglobin level 10.8 g per deciliter. Blood levels of electrolytes, glucose, aspartate aminotransferase, alanine aminotransferase, alkaline phosphatase, and bilirubin were normal, as were the results of kidney-function tests. The urine level of human chorionic gonadotropin was less than 6 IU per milliliter (reference range in nonpregnant adults, 0 to 6), and urinalysis was normal. Computed tomography (CT) of the abdomen, performed after the administration of intravenous contrast material and without the administration of oral contrast material, showed the gastric contents, a normal appendix, and no evidence of bowel obstruction. There was a small amount of solid stool in the ascending colon and sigmoid colon. A mixture of aluminum hydroxide, diphenhydramine, lidocaine, magnesium hydroxide, and magnesium citrate was administered, but the patient vomited after taking these medications.

case_31_2024: |
  A 37-year-old man was admitted to this hospital because of fever, myalgia, jaundice, and hypoxemia. The patient had been healthy until 9 days before this admission, when malaise, fatigue, and generalized weakness developed. The symptoms were severe, and he slept almost all day and night. Seven days before this admission, the patient had an oral temperature of 39.4°C, and headache developed, as well as achiness and stiffness in the arms, shoulders, knees, and legs. He was not able to eat a full meal because of decreased appetite and nausea. He did not have abdominal pain, vomiting, or diarrhea. Five days before this admission, the fever and headache abated; however, the achiness increased, and the patient noticed that his urine was dark yellow. Three days before this admission, the patient sought evaluation in the urgent care clinic of another hospital. Testing was negative for severe acute respiratory syndrome coronavirus 2, respiratory syncytial virus, and influenza virus types A and B. He was instructed to get adequate rest and hydration. Two days before this admission, the symptoms had not abated, and the patient returned to the urgent care clinic. On examination, new yellow discoloration of the skin and eyes was observed, and he was instructed to go to the emergency department of the other hospital. On evaluation, the temporal temperature was 36.8°C, the blood pressure 106/70 mm Hg, the pulse 109 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. The white-cell count was 17,900 per microliter (reference range, 4500 to 11,000), the platelet count 34,000 per microliter (reference range, 150,000 to 400,000), and the hemoglobin level 15.7 g per deciliter (reference range, 13.0 to 17.0). The creatinine level was 3.0 mg per deciliter (265 μmol per liter; reference range, 0.6 to 1.4 mg per deciliter [53 to 124 μmol per liter]), the total bilirubin level 15.9 mg per deciliter (272 μmol per liter; reference range, 0.0 to 1.2 mg per deciliter [0 to 21 μmol per liter]), and the direct bilirubin level more than 10.0 mg per deciliter (171 μmol per liter; reference range, 0.0 to 0.5 mg per deciliter [0 to 9 μmol per liter]). Blood cultures were obtained. The patient was admitted to the other hospital. During the subsequent 2 days, the patient received intravenous fluids. On the third hospital day, the blood pressure decreased to 71/60 mm Hg, and the oxygen saturation had also decreased. The creatinine level increased to 3.8 mg per deciliter (336 μmol per liter), the hemoglobin level decreased to 10.3 g per deciliter, and the total bilirubin level increased to 20.9 mg per deciliter (357 μmol per liter). Supplemental oxygen was administered through a nasal cannula, and boluses of intravenous fluids were given. The patient was transferred to this hospital for further treatment. On evaluation, the patient reported exhaustion and shortness of breath but no cough, rhinorrhea, or congestion. He had no known medical conditions, took no medications, and had no known drug allergies. He lived in an apartment in an urban area of New England with his partner, who had had an acute illness characterized by fever, malaise, nausea, and diarrhea that began 7 days before this admission and resolved after 4 days. The patient worked in an office, and he took daily walks with his dog through the woods and along a river; he recalled receiving multiple insect bites during these walks. He reported no recent travel. He had smoked one pack of cigarettes per day for 16 years and used marijuana daily. He consumed two alcoholic drinks at a time, a few times per week, and he did not use illicit drugs. On examination, the temporal temperature was 36.3°C, the blood pressure 100/56 mm Hg, the pulse 103 beats per minute, the respiratory rate 42 breaths per minute, and the oxygen saturation 91% while the patient was receiving supplemental oxygen through a nasal cannula at a rate of 4 liters per minute. He was alert and oriented but appeared ill. He had increased work of breathing, with the use of accessory muscles of respiration; diffuse rales were heard in both lungs. There was no abdominal tenderness, hepatosplenomegaly, asterixis, or leg swelling. Marked scleral icterus and jaundiced skin were present, but he had no conjunctival suffusion, rash, or ulcers. Radiography of the chest revealed bilateral, predominantly peripheral, patchy opacities. Ultrasonography of the abdomen showed hyperechogenic and prominent portal triads with a “starry sky” appearance; there was no biliary ductal dilatation or hydronephrosis. Computed tomography (CT) of the chest, abdomen, and pelvis, performed without the administration of intravenous contrast material, revealed multifocal consolidative and ground-glass opacities with tree-in-bud nodularity in both lungs, as well as small pleural effusions and enlarged mediastinal and hilar lymph nodes. No hepatic lesions, biliary ductal dilatation, or hepatosplenomegaly were noted. The patient started treatment with continuous positive airway pressure. Empirical treatment with intravenous vancomycin and cefepime and oral doxycycline was administered.

case_19_2024: |
  A 46-year-old man was evaluated in the rheumatology clinic of this hospital because of arthritis and rash. One week before the current presentation, an episode of lightheadedness occurred when the patient stood up from a seated position. The episode was associated with diaphoresis and mild nausea; it lasted for a few minutes and resolved spontaneously. Four days later, another episode of lightheadedness occurred, and the patient sought evaluation in the emergency department of this hospital. The temporal temperature was 36.3°C, the blood pressure 147/80 mm Hg, the pulse 109 beats per minute, and the oxygen saturation 100% while the patient was breathing ambient air. Swelling of the wrists and ankles was present. The blood levels of glucose and electrolytes and the results of kidney-function tests were normal. The aspartate aminotransferase and alanine aminotransferase levels were normal; the alkaline phosphatase level was 157 U per liter (reference range, 45 to 115). The complete blood count with differential count was normal, as was the urinalysis. The erythrocyte sedimentation rate was 104 mm per hour (reference range, 0 to 14), the C-reactive protein level 6.3 mg per liter (reference value, <8.0), and the D-dimer level 990 ng per milliliter (reference value, <500). An electrocardiogram showed sinus tachycardia. Computed tomography (CT) of the chest, performed after the administration of intravenous contrast material timed to evaluate the pulmonary arteries, showed no pulmonary embolus or pulmonary nodules; there was no mediastinal or hilar lymphadenopathy. Intravenous crystalloid solution was administered, and the lightheadedness resolved. Plans were made for an evaluation of the joint swelling and elevated erythrocyte sedimentation rate in the rheumatology clinic affiliated with this hospital. The patient was discharged home. Three days later, the patient was seen in the rheumatology clinic. Additional history was obtained. Four months before the current presentation, mild coronavirus disease 2019 (Covid-19) had developed after the patient had returned from a vacation in Central America and the Caribbean. Symptoms associated with Covid-19 resolved after 5 days. One week after the resolution of symptoms, and 14 weeks before the current presentation, pain and swelling of the wrists had developed. There was morning stiffness in both wrists and difficulty with forming a fist; the stiffness abated with activity and hot showers. The patient had had a partial response after the administration of topical diclofenac, acetaminophen, and plant-based topical applications for joint pain. He also had noted a sensation of instability in the ankles occurring toward the end of the day. In addition to the joint symptoms, a rash involving the chest, back, and legs had developed; the palms and soles were spared. The rash was mildly pruritic at night and nonpainful. Alopecia, anorexia, and an estimated 8 kg of weight loss had also occurred. Two weeks before the current presentation, nasal crusting had developed, and the patient had noted the presence of scant blood when using facial tissue. The patient’s medical history was notable for asthma and eczema. Medications included topical triamcinolone and topical hydrocortisone. An unspecified allergy to diphenhydramine had been reported previously. The patient lived in Boston and worked in an office. He smoked a half pack of cigarettes and consumed two alcoholic beverages daily. There was no history of illicit drug use. He was sexually active with men; his most recent sexual activity, with a new partner, had occurred 5 months before the current presentation. His family history included psoriasis in his grandmother. On examination, the temporal temperature was 36.5°C, the blood pressure 156/90 mm Hg, the pulse 105 beats per minute, and the oxygen saturation 100% while the patient was breathing ambient air. Multiple small areas of alopecia were scattered throughout the scalp, and there was crusting in the distal nares. The left commissure of the mouth had an ulcerative lesion; there was no evidence of mucosal lesions or cervical lymphadenopathy. Swelling, warmth, and mild tenderness of the wrists and ankles were present. Swelling of several metacarpophalangeal joints was also present. There was a hyperpigmented, macular rash with scaling that involved the trunk, back, and legs, extending to the dorsal aspect of the feet. The heart rate was tachycardic but regular, without murmurs. The remainder of the examination was normal.

case_3_2025: |
  A 54-year-old male athlete was evaluated in the cardiovascular performance program clinic of this hospital because of progressive exertional dyspnea and chest pain. The patient had been in his usual state of health, including engaging in regular vigorous exercise, until 17 months before the current presentation, when intermittent nonradiating chest pressure and dyspnea on exertion developed. He felt unable to “get a full breath” during high-intensity aerobic exercise. The only other history of chest discomfort was an episode of dull chest pain on the left side lasting 2 days, which had occurred after airline travel 5 years before the current presentation. On evaluation at that time, the blood level of troponin was normal, and an electrocardiogram showed sinus bradycardia. Five years before the current presentation, coronary computed tomographic angiography (CTA) was performed according to an accelerated diagnostic protocol for chest pain. The patient had a Coronary Artery Disease Reporting and Data System (CAD-RADS) score of 0 (range, 0 to 5, with higher scores indicating more atherosclerotic plaque or severe stenosis) and a coronary-artery calcium score of 0, indicating no calcifications. He had no luminal narrowing or noncalcified plaque. The heart chambers were morphologically normal (i.e., normal size and normal wall thickness at end diastole), and the imaging findings were consistent with preserved resting systolic function of the left ventricle. One month after the onset of intermittent chest pressure and dyspnea on exertion, and 16 months before the current presentation, the patient was evaluated by his primary care physician. On examination, there was a grade 2/6 midsystolic murmur that had not been previously identified. Electrocardiography was performed and reportedly showed sinus rhythm, new rightward axis, reduced R-wave progression, and new inferolateral T-wave inversions, as compared with the electrocardiogram obtained 5 years before the current presentation. Findings on chest radiography were reportedly normal, as were results of laboratory tests, including a complete blood count, measures of kidney function, and blood levels of electrolytes, aspartate aminotransferase, alanine aminotransferase, albumin, total protein, iron, d-dimer, and thyrotropin. Treatment with aspirin was started, and additional cardiac testing was planned. Ten days later, the patient underwent stress echocardiography. An electrocardiogram obtained when the patient was at rest reportedly showed T-wave inversions, and an echocardiogram reportedly showed a hyperdynamic left ventricle with mild mitral regurgitation. After 11 minutes of bicycle exercise, mild chest pressure and dyspnea developed, along with horizontal and downsloping ST depressions (2 mm) in the inferolateral leads, but no inducible left ventricular wall-motion abnormalities were detected. Six weeks later, and 14 months before the current presentation, the patient was evaluated in the cardiology clinic of this hospital. He reported ongoing intermittent chest pressure and dyspnea on exertion during rigorous exercise. The physical examination was reportedly normal. Electrocardiography showed T-wave inversions that were more pronounced than those seen on previous imaging studies and a new Q wave in lead aVL. Transthoracic echocardiography showed a hyperdynamic left ventricle with symmetric wall thickening (17 mm), systolic intracavitary left ventricular obliteration without an outflow-tract or midcavity gradient, biatrial and inferior vena cava dilatation, right ventricular wall thickening, and mitral valve thickening. Additional imaging studies were performed. Cardiac magnetic resonance imaging (MRI), performed according to the diagnostic protocol for workup of suspected hypertrophic cardiomyopathy, confirmed concentric left ventricular wall thickening of up to 18 mm and a lack of tapering of the left ventricular wall thickness from the base to the apex. No evidence of myocardial edema was present; however, focal late gadolinium enhancement (defined as 6 SD above the reference signal intensity) affecting 3% of the left ventricular myocardium was present in the midwall apical interventricular septum. The anterior mitral leaflet appeared to be mildly elongated. These findings were suggestive but not diagnostic of hypertrophic cardiomyopathy. Holter monitoring showed occasional ectopic beats, with one 3-beat ventricular run and short supraventricular runs. A genetic testing panel that assessed for 56 genes associated with hypertrophic cardiomyopathy, including the genes encoding myosin, titin, lamin, transthyretin, and the γ2 subunit of AMP-activated protein kinase, was negative. The patient’s adult children underwent echocardiography for screening purposes and were negative for thickened ventricular walls. During the next year, the patient’s symptoms persisted. A repeat stress echocardiogram showed mild mitral regurgitation at peak stress, with a peak left ventricular outflow-tract gradient of 12 mm Hg; blood pressure increased appropriately with exercise. He was referred to the cardiovascular performance program clinic of this hospital for cardiopulmonary exercise testing, exercise guidance, and an exercise prescription. In the cardiovascular performance program clinic, the patient reported lifelong athletic pursuits, including playing several sports in college and maintaining a vigorous exercise regimen of cycling, hockey, and rowing after college; he began competing in triathlons during his fourth decade of life. He described an insidious but progressive decline in exercise tolerance during the 17 months before the current presentation, which was accompanied by an increasing difficulty in recovery after exercise. He reported upper abdominal discomfort and bloating that occurred when he walked his dog after eating and a 2-week history of hoarseness. In addition, he reported no syncope, lightheadedness, palpitations, diaphoresis, or flushing. He had had no edema, orthopnea, paroxysmal nocturnal dyspnea, weight change, bruising or bleeding, or neurologic symptoms. He had not been vaccinated against severe acute respiratory syndrome coronavirus 2. The patient’s medical history included arthritis, surgeries to repair tears in both rotator cuffs, meniscectomies in both knees, and colonic polyps. Medications included aspirin; he had no known adverse reactions to medications. The patient worked as an executive, and he lived in suburban New England with his family. He drank alcohol socially and had used intranasal cocaine in the remote past; he had never used tobacco. His family history included premature coronary artery disease and heart failure in his father; hypertension, atrial fibrillation, and heart failure in his mother; and dyslipidemia in multiple relatives. On examination, the heart rate was 81 beats per minute and the blood pressure 116/70 mm Hg. The jugular venous pressure was 13 cm of water, and Kussmaul’s sign was present. Small angiomas (<4 mm) were noted on the truncal skin. The remainder of the examination was normal. An electrocardiogram obtained when the patient was at rest showed sinus rhythm, rightward axis, T-wave inversions, and decreased QRS amplitudes, as compared with the electrocardiogram obtained 5 years before the current presentation. Cardiopulmonary exercise testing revealed reduced maximal oxygen consumption at 19.7 ml per kilogram of body weight per minute (59% of the predicted value, as compared with age- and sex-matched nonathletic controls), a ventilatory threshold at 83% of peak oxygen consumption, and impaired oxygen pulse augmentation, which is a surrogate for stroke volume augmentation. Since the patient had normal spirometry and oxygenation, these findings suggested severe exercise impairment due to cardiovascular limitation. The blood levels of albumin, globulin, total protein, and thyrotropin were normal. Furosemide and spironolactone were prescribed, and diagnostic tests were performed.

case_16_2025: |
  A 34-year-old man was admitted to this hospital because of pain in the left ear with hearing loss, facial droop on the left side, and a nasopharyngeal mass that was identified on computed tomography (CT). The patient had been well until approximately 8 months before the current presentation, when pain and a sensation of pressure and fullness developed in the left ear. During the subsequent 5 months, he was seen in the primary care clinic of another hospital on five occasions and received three courses of treatment with oral antibiotic agents; however, the patient’s symptoms did not abate. He also received one course of prednisone treatment, which provided slight relief of symptoms. Three months before the current presentation, treatment with neomycin ear drops was started, and the patient was referred to the otolaryngology clinic of the other hospital. Physical examination showed normal external ears and ear canals without edema or drainage. Although the tympanic membranes were intact, serous middle-ear effusions were present in both ears. It was recommended that the patient continue daily use of cetirizine, which he had been taking as needed for allergy symptoms. Treatment with fluticasone nasal spray was started, and a tapering course of oral prednisone was prescribed. The treatment resulted in a slight abatement of his symptoms; however, 2 weeks later, an upper respiratory illness developed, and the ear symptoms increased in severity. The prednisone taper was extended. Seven weeks before the current presentation, the pain in the left ear became so severe that it awoke the patient from sleep, and he also had pain in the sinuses. He sought evaluation at the emergency department of the other hospital. Treatment with cefdinir was started, oral prednisone was restarted, and a follow-up visit in the otolaryngology clinic was scheduled. Six weeks before the current presentation, examination in the otolaryngology clinic showed that the tympanic membranes were intact and the right middle ear was well aerated, but the serous middle-ear effusion persisted in the left ear. The patient had edematous turbinates in both nasal passages and clear rhinorrhea. The oropharynx was normal. Nasopharyngoscopy revealed hypertrophied inferior nasal turbinates and hypertrophied, edematous, and erythematous tori tubarii. An audiogram showed normal hearing in the right ear and mild conductive hearing loss in the left ear. Results of tympanometry were normal in the right ear and “flat” in the left ear, which indicated that the patient had no movement of the tympanic membrane on insufflation, a finding consistent with effusion in the left middle ear. Word-recognition scores were excellent in the right ear and good in the left ear (a score of 90 to 100% is typically considered to be excellent, and 78 to 89% is good). Myringotomy was performed on the left ear. The dosing frequency of fluticasone nasal spray was increased, and treatment with oxymetazoline nasal spray and oral famotidine was started. During the subsequent 3 days, the patient’s sinus pain increased in severity and progressed from the sinuses to the top of the head and down the neck; the pain did not abate with treatment with acetaminophen and ibuprofen. He had new green nasal drainage, sore throat, and hoarseness. He sought evaluation at the emergency department of the other hospital. CT of the head, performed without the administration of intravenous contrast material, showed moderate fluid in the mastoid bones on both sides. Treatment with amoxicillin–clavulanate was started, and a follow-up appointment in the otolaryngology clinic was scheduled. Four weeks before the current presentation, green nasal drainage and hoarseness persisted, and new swelling and clear discharge developed in the patient’s left eye. He sought evaluation at the primary care clinic of the other hospital, and treatment with trimethoprim–sulfamethoxazole was started. Three weeks before the current presentation, the patient was evaluated again in the otolaryngology clinic because of persistent pain in the left ear that radiated to the throat and ear pressure and muffled hearing that gave him the sensation of being underwater. Flexible fiberoptic transnasal laryngoscopy performed through the left nostril revealed edematous left nasal turbinates with green purulent drainage and edematous, erythematous tori tubarii with a cobblestone appearance and white drainage. The epiglottis and the base of the tongue were normal. The vocal cords were mobile but difficult to visualize because of copious amounts of thick white drainage. Interarytenoid and postcricoid edema was present. No polyps or masses were seen. Treatment with trimethoprim–sulfamethoxazole and prednisone was continued, treatment with nystatin mouthwash was started, and surgical myringotomy with tympanostomy was planned. Nine days before the current presentation, an examination performed while the patient was under anesthesia revealed prominent bulges in the anterior and inferior walls of both external ear canals and intact tympanic membranes. The right middle-ear space was clear, but a serous effusion was present in the left middle ear. Surgical myringotomy was performed and tympanostomy tubes were placed in both ears. Treatment with ciprofloxacin–dexamethasone ear drops was started. The patient’s symptoms abated briefly, but the ear pain and pressure recurred the following day. The symptoms persisted, and he presented to the emergency department of this hospital for further evaluation. In the emergency department, the patient reported ongoing ear pain and hoarseness, along with new odynophagia and dysphagia. He had had an unintentional weight loss of approximately 13.6 kg in the previous month. His medical history included mild seasonal allergies, gastroesophageal reflux disease, and chronic neck pain that had been treated. Additional medications included famotidine, and acetaminophen and ibuprofen were used as needed for pain. The patient was born in the United States, lived with his wife and two children in a rural area of New England, and worked as an accountant. He drank alcohol rarely and did not smoke cigarettes or use illicit drugs. He had no known family history of cancer or autoimmune disease. On physical examination, the patient appeared well. The blood pressure was 161/99 mm Hg, the heart rate 106 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 97% while the patient was breathing ambient air. The external ears and ear canals were normal. The tympanic membranes had tympanostomy tubes in place, but the lumens were not visible. The pupils were equal, round, and reactive to light. The extraocular muscles and facial sensation appeared to be normal; however, the face was asymmetric, with drooping of the left cheek and flattening of the left nasolabial fold, and there was weakness on puffing the cheeks and smiling. Delayed blinking of the left eye, along with weak eye closure on the left side, was observed. On raising the eyebrows, weakness was observed in the left eyebrow. His hearing appeared to be normal, and palate elevation, shoulder shrug, tongue protrusion, and speech were also normal. Muscle tone and strength and sensation to light touch were normal in the arms and legs. The remainder of the examination was normal. The blood level of C-reactive protein was 101.9 mg per liter (reference value, <8), and the erythrocyte sedimentation rate was 71 mm per hour (reference range, 0 to 14). The blood level of alanine aminotransferase was 137 U per liter (reference range, 10 to 55), the aspartate aminotransferase level 55 U per liter (reference range, 10 to 40), the alkaline phosphatase level 226 U per liter (reference range, 45 to 115), and the γ-glutamyltransferase level 300 U per liter (reference range, 8 to 61). The complete blood count with differential count was normal, as were the results of tests of renal function and coagulation. Imaging studies were obtained. CT angiography of the head revealed prominence of the soft tissue in the posterior nasopharynx that was more pronounced on the left side than on the right side and extended into the left poststyloid parapharyngeal space, where the soft tissue encased and mildly narrowed the left internal carotid artery at the skull base. There was opacification in the mastoid air cells on both sides. Contrast-enhanced magnetic resonance imaging (MRI) of the skull base revealed enhancing soft tissue with a masslike appearance and reduced diffusivity in the nasopharynx that was more pronounced on the left side than on the right side. There was involvement of the prevertebral longus colli muscles and left poststyloid parapharyngeal space with encasement of the left internal carotid artery. In addition, dural thickening and enhancement was present in the left middle cranial fossa, which extended along the left tentorial leaflet. Multiple cranial nerves, including both trigeminal nerves, the left facial nerve, and the left hypoglossal nerve, showed enhancement. No osseous erosion or abnormality of the bone marrow signal were seen in the adjacent skull base.

case_7_2024: |
  A 67-year-old woman was evaluated at this hospital because of headache and retro-orbital pain. The patient had been in her usual state of health until 10 months before the current admission, when a photosensitive, erythematous, papular rash developed on the forearms a few weeks after she had started treatment with hydrochlorothiazide. Over the next 7 months, an intermittent, painless, nonpruritic, erythematous, annular rash developed on the trunk and the proximal portions of the arms and legs. Three months before the current presentation, the rashes worsened, and the patient was evaluated by a dermatologist at another hospital. The thyrotropin level was normal. Examination of a punch-biopsy specimen of abdominal skin reportedly showed spongiotic dermatitis with superficial perivascular lymphocytic inflammatory-cell infiltrate with eosinophils; neither vasculitis nor dermal mucin was found. The rashes were thought to be related to medication; treatment with amlodipine was started, and hydrochlorothiazide was discontinued. She was treated with topical triamcinolone ointment. The photosensitive rash on the forearms resolved, and the annular rash on the trunk abated. Ten days after the evaluation at the first hospital, and 8 weeks before the current admission, the patient presented to the emergency department of a second hospital because of progressive temporal headache with retro-orbital pain on the left side that had lasted for 3 days. The physical examination was reportedly normal. The erythrocyte sedimentation rate was 12 mm per hour (reference range, 0 to 19). The complete blood count and blood levels of electrolytes, aspartate aminotransferase, alanine aminotransferase, and total bilirubin were normal, as were the results of tests of kidney function. Computed tomography (CT) of the head was performed and reportedly showed mild periventricular white-matter disease with no acute intracranial abnormality. CT angiography of the head and neck reportedly showed no intracranial aneurysm, stenosis, or occlusion. The patient was discharged home. The next morning, the patient awoke with double vision. The headache had resolved. She presented to a neuro-ophthalmology urgent care clinic associated with this hospital. The patient reported persistent pain in the left eye, which was worse with abduction, as well as photosensitivity and an episode of pain in the left side of the jaw in the preceding week. She had normal visual acuity, color vision, visual fields, and afferent visual function. The optic disks were normal, sharp, and flat. The left eye had esotropia and hypertropia, as well as a limitation in abduction. The erythrocyte sedimentation rate was 11 mm per hour, and the C-reactive protein level was 3.0 mg per liter (reference value, <8.0). A presumptive diagnosis of acute left sixth cranial nerve palsy associated with cerebral microvascular disease was considered. Corrective treatment with eye patching was recommended, and the double vision resolved over the next 3 weeks. Eight weeks after she had presented to the emergency department of the second hospital, the patient presented to the emergency department of a third hospital because similar symptoms had developed in her right eye. She reported having headache with retro-orbital pain on the right side over the past 3 days, accompanied by changes in her color vision and occasional floaters. The physical examination was notable for a blood pressure of 159/66 mm Hg and an abduction deficit of the right eye. The erythrocyte sedimentation rate was 17 mm per hour (reference range, 0 to 30), and the high-sensitivity C-reactive protein level was 1.64 mg per liter (reference value, <3.00). The complete blood count and blood levels of electrolytes, albumin, aspartate aminotransferase, alanine aminotransferase, and total bilirubin were normal, as were the results of tests of kidney function. A screening test for Lyme disease antibodies was negative. Cross-sectional imaging of the head and orbits had been performed at the first hospital, and the results were reinterpreted at the third hospital. CT of the reportedly showed stranding of the intraconal fat in the right orbit. Magnetic resonance imaging (MRI) and magnetic resonance angiography of the head, neck, and orbits (performed with and without the administration of intravenous contrast material) reportedly showed abnormal enhancement and edema of the optic nerve and surrounding tissue on the right side. On my directed review of the MRI, I found that the mild edema and enhancement predominantly involved the optic-nerve sheath and intraconal fat, which confirmed the findings on CT of the head. The optic nerve itself was largely spared. The temporomandibular joints were partially visible, and there was mild periarticular edema and enhancement of the left joint. On T2-weighted imaging, scattered hyperintense foci were seen in the periventricular and subcortical white matter, a nonspecific finding most likely attributable to chronic small-vessel disease. Intravenous methylprednisolone was administered, and the patient was transferred to the neurology unit of this hospital. On evaluation, she reported persistent double vision and pain on right lateral gaze but resolution of the retro-orbital headache. She also reported a recent mild flare of an erythematous, annular rash, as well as recent hair thinning and long-standing Raynaud’s phenomenon. Review of systems was negative for fever, night sweats, weight loss, joint erythema or swelling, muscle stiffness or pain, scalp or temple tenderness, jaw claudication, recurrent sinusitis, nasal crusting, epistaxis, cough, hoarseness, cough or shortness of breath, hemoptysis, dry mouth or dry eyes, oral ulcers, ptosis, dysphagia, dysarthria, hearing changes, paresthesia, weakness in the arms and legs, or changes in the nails. There were no gastrointestinal or urinary symptoms. The patient had a remote history of Graves’ disease with orbitopathy that had been diagnosed and treated more than two decades before this presentation. The medical history was also notable for hypothyroidism, hypertension, hyperlipidemia, gastroesophageal reflux disease, cholecystectomy, ovary-sparing hysterectomy, and lumpectomy for estrogen-receptor–positive, progesterone receptor–positive breast cancer. A surveillance mammogram obtained in the previous month had reportedly been normal. She had received three vaccines against severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2). Medications included atorvastatin, amlodipine, levothyroxine, and tamoxifen. A rash had occurred after the previous use of hydrochlorothiazide. She was married and lived in coastal Massachusetts. She drank wine rarely and did not use tobacco or other substances. Her family history was notable for a maternal aunt with thyroid disease and a child with vitiligo. On examination, the temporal temperature was 36.1°C, the pulse 68 beats per minute, the blood pressure 173/72 mm Hg, and the oxygen saturation 95% while the patient was breathing ambient air. A few scattered erythematous macules were present on the abdomen, including a well-healed punch-biopsy site. A few telangiectasias were observed on the face. There was no rash on the face or scalp, and no sclerodactyly was observed. The hair was normal in pattern and distribution. There was no conjunctival injection. Extraocular movements were normal except for abduction of the right eye, which was limited and caused pain. There was no proptosis or lid lag. Visual acuity was 20/25 in the left eye and 20/40 with red color desaturation in the right eye. The right optic disk appeared pale as compared with the left optic disk. The remainder of the general and neurologic examination was normal. An electrocardiogram was normal. The complete blood count and blood levels of electrolytes, calcium, albumin, and globulin were normal. The erythrocyte sedimentation rate was 6 mm per hour, and the C-reactive protein level was 0.6 mg per liter. Screening tests for antibodies to hepatitis B virus core antigen, hepatitis C virus, histone, and human immunodeficiency virus were negative, as were tests for Lyme disease antibodies, syphilis antibodies, rheumatoid factor, and varicella–zoster virus IgM; varicella–zoster virus IgG was detected. A test for SARS-CoV-2 RNA, an interferon-γ release assay for Mycobacterium tuberculosis, and serum and urine toxicology screens were also negative. A lumbar puncture was performed. The cerebrospinal fluid (CSF) was clear, with an opening pressure of 14 cm of water. Gram’s staining of the CSF showed rare mononuclear cells and no organisms. The CSF glucose level was 86 mg per deciliter (4.8 mmol per liter; reference range, 50 to 75 mg per deciliter [2.8 to 4.2 mmol per liter]), and the CSF protein level was 30 mg per deciliter (reference range, 5 to 55). There were no nucleated cells present. On the second day, testing for antibodies to bartonella was negative. The levels of angiotensin-converting enzyme, C3, and C4 were normal, as were the results of serum free light-chain testing, serum protein electrophoresis, and urinalysis. The IgG4 level was 137.3 mg per deciliter (reference range, 3.9 to 86.4); the levels of other IgG subclasses were normal. Testing for lupus anticoagulant, anticardiolipin antibodies, and β2-glycoprotein 1 antibodies was negative, as was CSF testing for cryptococcal antigen and varicella–zoster virus IgM. CT of the chest, performed after the administration of intravenous contrast material, showed no lymphadenopathy; there was hepatic steatosis and a 2-mm right apical nodule. MRI of the head and whole spine, performed after the administration of intravenous contrast material, showed asymmetric enhancement surrounding the intraorbital and intracanalicular segments of the right optic-nerve sheath and intraconal fat. No abnormal spinal cord enhancement was observed. Ultrasonography of the temporal arteries showed no halo sign.

case_19_2025: |
  A 69-year-old man was admitted to this hospital because of headache and ataxia. The patient had a history of systemic diffuse large B-cell lymphoma (DLBCL), which had been diagnosed 3 years before the current presentation and had been treated with bendamustine and rituximab. One year after the initial diagnosis, weakness developed in the right hand. Magnetic resonance imaging (MRI) of the head showed an enhancing lesion in the left centrum semiovale; a biopsy of the enhancing brain lesion revealed that the patient had a relapse of DLBCL of the central nervous system (CNS) that was positive for Epstein–Barr virus (EBV). There was no radiographic response to treatment with high-dose methotrexate; treatment with tisagenlecleucel (chimeric antigen receptor [CAR] T-cell therapy) was subsequently initiated, followed by treatment with ibrutinib. Nineteen months before the current presentation, treatment with ibrutinib was stopped after cryptococcal pneumonia developed. DLBCL was thought to be in remission. After treatment, strength in the right arm was 4/5, and reflexes were 3+ in the right brachioradialis, biceps, and triceps. The patient had been in his usual state of health, active and participating in several water sports, until 2 weeks before the current presentation, when he fell and struck his back while sailing. After the fall, pain developed in the midback and over the right lower ribs posteriorly. Over the course of the next 2 weeks, the patient noted progressive weakness and difficulty with coordination while using his hands, to the point that he was not able to feed himself. He also had headache that felt similar to previous migraines. His wife brought him to the emergency department of this hospital for evaluation. Other medical history included hypertension, dyslipidemia, nonischemic dilated cardiomyopathy, urinary retention, thrombosis of the superior mesenteric vein, hypogammaglobulinemia, attention deficit–hyperactivity disorder, and mood disorder. Lymphopenia persisted after CAR T-cell therapy. Medications included acyclovir prophylaxis, apixaban, atorvastatin, dextroamphetamine–amphetamine, empagliflozin, fluconazole, metoprolol succinate, sacubitril–valsartan, sulfamethoxazole–trimethoprim prophylaxis, tamsulosin, and venlafaxine. The patient also received periodic intravenous immune globulin infusions for prevention of infection. There were no known adverse reactions to medications. He was retired from work in real estate. He lived with his wife and dog near a lake in a suburban area of New England and spent time outdoors swimming, paddleboarding, and working in the yard. He had had several recent tick bites but no known mosquito bites. The patient reported that he had not recently consumed any deli meats or unpasteurized dairy products. He was a lifelong nonsmoker, had stopped drinking alcohol 3 years before the current presentation, and did not use illicit drugs. On evaluation, the temporal temperature was 36.3°C, the blood pressure 107/65 mm Hg, the pulse 86 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 96% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 23.1. The patient was awake and alert. He was attentive to conversation, oriented, and able to follow two-step commands. His speech was slow and mildly hypophonic. The neck was supple. There was end-gaze nystagmus on lateral gaze in both eyes. There were fasciculations in the muscles of the legs, and increased tone was noted in the right arm and right leg. Weakness was present on abduction of the fingers of both hands, and finger–nose–finger testing revealed ataxia in both hands. He had weakness and hyperreflexia in the right arm that was similar to findings from previous examinations; strength and reflexes were otherwise normal. Results of tests of sensation were normal. The blood levels of electrolytes, glucose, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, bilirubin, albumin, total protein, cobalamin, thyrotropin, zinc, and copper were normal, as were the results of tests of kidney function. Screening tests for human immunodeficiency virus infection types 1 and 2, syphilis, and Lyme disease were negative. The white-cell count was 4860 per microliter (reference range, 4500 to 11,000), with a neutrophil count of 3750 per microliter (reference range, 1800 to 7700), a lymphocyte count of 260 per microliter (reference range, 1000 to 4800), a monocyte count of 810 per milliliter (reference range, 200 to 1200), and an eosinophil count of 40 per milliliter (reference range, 0 to 900); the remainder of the complete blood count was normal. Computed tomography (CT) of the head, performed without the administration of intravenous contrast material, showed postsurgical changes related to previous left frontal craniotomy and a hyperdense calcified lesion (measuring 6 mm in diameter) in the left centrum semiovale that had an appearance similar to that seen on previous studies. CT angiography of the chest, abdomen, and pelvis, performed after the administration of intravenous contrast material, revealed acute-appearing fractures of the posterior right 11th and 12th ribs. CT of the cervical spine showed moderate end-plate degenerative changes involving the fourth through seventh cervical vertebrae but no acute fracture or facet malalignment. The patient was admitted to this hospital. Treatment with empagliflozin was discontinued, and treatment with apixaban was stopped to facilitate lumbar puncture for the evaluation of cerebrospinal fluid (CSF). Treatment with other home medications was continued. On the second hospital day, MRI of the head showed that the calcified lesion in the left frontal lobe was unchanged, a finding that most likely reflected treated lymphoma. On the third hospital day, electromyography and nerve conduction studies showed electrodiagnostic evidence of a subacute neurogenic process involving multiple nerve roots at the cranial and cervical levels. Such findings are sometimes seen in the context of early chronic polyradiculopathy. On the fourth hospital day, hypophonia worsened and lethargy developed. Finger–nose–finger testing showed worsening ataxia in the hands, and new truncal ataxia was observed. On the fifth hospital day, sixth cranial nerve palsy developed in both eyes, and the patient had difficulty with swallowing solids. Treatment with oral acyclovir, which had been administered for prophylaxis, was switched to treatment with intravenous acyclovir. In addition, treatment with intravenous ceftriaxone, vancomycin, and ampicillin was started. On the sixth hospital day, lumbar puncture was performed; the opening pressure was 15 cm of water. Analysis of the CSF showed 21 nucleated cells per microliter (reference range, 0 to 5), of which 77% were lymphocytes (reference range, 0 to 100), 14% were monocytes (reference range, 0 to 100), and 9% were unclassified cells (reference value, 0) that were described as enlarged lymphoid cells with prominent nucleoli and abundant cytoplasm. The CSF glucose level was 51 mg per deciliter (2.8 mmol per liter; reference range, 50 to 75 [2.8 to 4.2 mmol per liter]), and the total protein level was 74 mg per deciliter (reference range, 5 to 55). Gram’s staining of the CSF revealed moderate mononuclear cells with no bacteria. Cytologic examination of the CSF revealed numerous lymphocytes with rare, atypical forms; flow cytometry did not show evidence of a monoclonal B-cell population. On the ninth hospital day, T2-weighted fluid-attenuated inversion recovery (FLAIR) images from MRI of the head revealed signal hyperintensity in both hemispheres of the cerebellar cortex, in the cerebellar folia, and in the brain stem; no abnormal enhancement was noted. These findings were similar to those seen on the previous study obtained 1 week earlier but were more conspicuous than the earlier findings. The calcified lesion in the left frontal lobe was unchanged.

case_18_2025: |
  A 63-year-old woman was evaluated at this hospital because of dyspnea on exertion that had persisted for 2 months. Fifteen months before the current presentation, the patient received a diagnosis of rheumatoid arthritis in the rheumatology clinic of another hospital after she had presented with a 6-month history of swelling and stiffness in the hand joints and skin tightening on several fingers. An evaluation revealed swan-neck deformities in both hands, and radiography showed marginal erosion of the hands. The white-cell count and differential count, the mean corpuscular volume, and the blood levels of thyrotropin, calcium, bilirubin, creatine kinase, total protein, globulin, and vitamins B12 and D were normal. Antibodies to β2-glycoprotein, cardiolipin, thyroid peroxidase, double-stranded DNA, topoisomerase 1, mitochondria, smooth muscle, Smith antigen, ribonucleoprotein, Ro antigen, and La antigen were not detected. In addition, there were no antibodies to Borrelia burgdorferi, hepatitis B core antibodies, or hepatitis C antibodies, and an interferon-γ release assay for Mycobacterium tuberculosis was negative. Treatment with methotrexate was initiated, and the joint swelling reduced during the next 2 months. Approximately 1 year later, and 7 weeks before the current presentation, exertional dyspnea and fatigue developed. The patient first noticed that she was “struggling” on hikes with her friends, whereas she had often been the first to reach the end of the hiking trail. During the next 2 weeks, dry cough developed, and dyspnea progressed to the point that the patient needed to rest after 10 minutes of routine treadmill and elliptical exercises. She started to use three pillows to sleep, and she noted abdominal distention, anorexia, and postprandial nausea.One month before the current presentation, the patient was evaluated by her primary care physician, affiliated with the other hospital. Screening for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) infection was negative. The results of urinalysis and the blood levels of thyrotropin, amylase, lipase, and γ-glutamyltransferase were normal. Chest radiography reportedly showed diffuse reticular interstitial markings, and abdominal ultrasonography reportedly showed hepatic cysts, pleural fluid, and hydronephrosis on both sides. The following week, the patient was evaluated by a cardiologist affiliated with the other hospital. An electrocardiogram (ECG) reportedly showed ectopic atrial rhythm, T-wave inversions in inferior and precordial leads, and prolongation of the corrected QT interval (QTc). Transthoracic echocardiography (TTE) reportedly showed normal biventricular size and systolic function, with no evidence of hemodynamically significant valvular disease. However, the study was notable for an abnormal echogenic structure adjacent to the aortic root that appeared to be most consistent with soft tissue, as well as fluid and diffuse echogenic material in the pericardial space. Computed tomography (CT) of the chest, performed without the administration of intravenous contrast material, reportedly showed pericardial fluid and thickening, pleural fluid on the left side, pararenal fluid on both sides, and infiltrative changes in the fat in the mediastinum and surrounding the aorta. Treatment with methotrexate was discontinued, and colchicine and furosemide were started. Owing to persistent symptoms, the patient took time off from work. One week later, limited echocardiography reportedly showed that the pericardial effusion had decreased in size, but organized intrapericardial material was again noted. The patient was evaluated by her rheumatologist, and the dose of furosemide was increased because of leg edema and persistent dyspnea. Eight days before the current presentation, CT of the abdomen and pelvis showed anterior pararenal and bilateral perirenal fluid and soft tissue, as well as bilateral pleural effusions. A small pericardial effusion, hepatic cysts, and a uterine leiomyoma were noted. One week later, abdominal magnetic resonance imaging (MRI) was performed. T1-weighted imaging showed extensive abnormal hypointense soft-tissue thickening in the retroperitoneal space surrounding both kidneys, the abdominal aorta, and the descending thoracic aorta. The head of the pancreas had a bulky appearance. Pleural effusions and pericardial thickening were noted. The next day, dyspnea worsened, and the patient was referred to the emergency department of this hospital. In the emergency department, review of systems was notable for persistent dyspnea, which increased with minimal activity and had prevented the patient from sleeping for more than 3 hours at a time. The patient also reported leg edema, abdominal distention, and dry cough that was worse when she was in the supine position. She had dry mouth and polydipsia that had persisted for 2 months, along with polyuria that was characterized by colorless urine. The patient also noted a several-month history of “fast heart rates” and the perception that her heart was beating forcefully. Four weeks before the current presentation, the patient had sustained a fracture of the right distal radius after a fall that had occurred while she was cleaning, and the arm was immobilized in a cast. The degree of swelling and stiffness in the hands was similar to that seen 1 year earlier, after she had started treatment with methotrexate. She reported no chest pain or pressure, lightheadedness, syncope, fever, chills, night sweats, productive cough, weight change, emesis, abdominal pain, back or flank pain, hematuria or dysuria, arthralgia, rash, photosensitivity, hair or nail changes, or neurologic symptoms. Other medical history was notable for surgical resection of a meningioma, a positive tuberculin skin test but a negative interferon-γ release assay 1 year earlier, a solitary lung nodule, hypertension, dyslipidemia, diabetes mellitus, Helicobacter pylori gastritis, adhesive capsulitis (frozen shoulder) for which the patient had received glucocorticoid injections, and knee arthroscopy. Medications included metformin, as well as calcium and multivitamin supplements; methotrexate, lisinopril, and atorvastatin had recently been discontinued. Colchicine had caused diarrhea; there were no other known adverse reactions to medications. The patient had completed vaccinations against SARS-CoV-2 approximately 7 months before the current presentation. She was born and raised in East Asia. She worked in an office setting and lived with her husband in a wooded area of New England. She drank three glasses of wine per week and did not use tobacco or other substances. Her family history included coronary artery disease and colon cancer in her father, systemic lupus erythematosus in her son, and hypertension and diabetes mellitus in multiple relatives. On examination, the temporal temperature was 36.4°C, the heart rate 77 beats per minute, the blood pressure 144/74 mm Hg, and the oxygen saturation 99% while the patient was breathing ambient air. The weight was 62.6 kg, the height 168 cm, and the body-mass index (the weight in kilograms divided by the square of the height in meters) 22.3. The patient appeared fatigued and was coughing during the examination. The mucous membranes were dry and cracked. The jugular venous pressure was 14 cm of water. Auscultation of the chest revealed diminished breath sounds and crackles in both lungs. There was abdominal distention but no tenderness or organomegaly. The right forearm was in a cast; distal hand strength and pulses were intact. Swan-neck deformities were present, but there were no other joint abnormalities. Edema was present in the lower legs. Skin tightening was seen on the fingers, but no rashes were identified. The results of urinalysis, the white-cell count and differential count, the venous blood pH, and the blood levels of high-sensitivity troponin T, calcium, magnesium, phosphorus, bilirubin, and lactate dehydrogenase were normal. Screening for SARS-CoV-2 infection was negative. ECG revealed probable ectopic atrial rhythm, right-axis deviation, diffuse T-wave inversions in inferior and precordial leads, and QTc prolongation of 509 msec. Chest radiography showed an enlarged cardiac silhouette, diffuse pulmonary edema, and small bilateral pleural effusions. CT of the chest, performed after the administration of intravenous contrast material, showed pulmonary edema with bilateral pleural effusions, a small pericardial effusion with extensive pericardial thickening, and soft-tissue thickening surrounding the ascending aorta, the descending thoracic aorta, and the portions of the kidneys that were visible on imaging. Furosemide was administered intravenously. The patient was admitted to the hospital. On the second hospital day, the results of serum protein electrophoresis and the levels of IgG subclasses were normal. On the third hospital day, TTE showed diffuse echogenic material in the pericardial space, pleural effusions, and an atypical appearance of tissue around the aortic root Cardiac MRI was also performed. Abnormal gadolinium enhancement in the pericardium and soft-tissue edema in the mediastinum were noted, with neither finding affecting the myocardium.

case_15_2025: |
  A 52-year-old man presented to the emergency department of Centro de Educación Médica e Investigaciones Clínicas (CEMIC) in Buenos Aires in early autumn with fever that had persisted for 1 week. The patient had been in his usual state of good health until 7 days before the current presentation, when fever developed. He presented to the emergency department of CEMIC for evaluation. The temperature was 38.0°C, and testing of a nasopharyngeal swab for severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) RNA was negative. Supportive care was recommended. During the next 7 days, fever persisted and additional symptoms developed, including nausea, abdominal pain, and watery diarrhea. The patient had poor oral intake and became concerned about his ability to maintain adequate hydration. He returned to the emergency department for further evaluation. The temporal temperature was 36.3°C, the blood pressure 100/75 mm Hg, the pulse 91 beats per minute, the respiratory rate 22 breaths per minute, and the oxygen saturation 89% while he was breathing ambient air. The oxygen saturation increased to 93% after the administration of supplemental oxygen through a simple face mask at a rate of 2 liters per minute. The patient appeared to be confused but had no focal neurologic deficits. Portable chest radiography, performed in the emergency department, revealed diffuse ground-glass opacities in both lungs, predominantly in the lower lobes, with associated reticular opacities. These findings were suggestive of volume overload or vascular redistribution; an underlying infection such as atypical pneumonia could not be ruled out. The patient had worsening hypoxemia while he was receiving supplemental oxygen through a simple face mask. Supplemental oxygen was subsequently administered through a nonrebreather face mask at a rate of 15 liters per minute, but the oxygen saturation remained at 89%. He was admitted to the intensive care unit (ICU) of the hospital. The patient’s medical history was notable for cholelithiasis, for which cholecystectomy had been performed 2 years earlier. He was fully vaccinated against SARS-CoV-2 but not against influenza virus. He took no medications and had no known adverse drug reactions. The patient lived in Buenos Aires with his wife and son, had no pets, and worked in an office setting without occupational exposures. He reported no recreational drug use or high-risk sexual behaviors. His family history was notable for hypertension and diabetes. Approximately 1 month before the current presentation, he had undergone a dental root-canal procedure. The patient had recently visited a rural area in the region of Chascomús, located in the Buenos Aires Province of Argentina. While in Chascomús, he had camped outdoors in a tent. He reported no known insect bites, contact with rodents, or other exposures. On admission to the ICU, the patient had persistent hypoxemia, with an oxygen saturation of 88%, and supplemental oxygen was administered through a high-flow nasal cannula. On examination, dry mucous membranes were noted. The oropharynx appeared to be congested, and there was evidence of poor dental hygiene, with decayed teeth. Crackles were heard at the base of both lungs. There was no murmur, jugular venous distention, or peripheral signs of embolic disease. The abdomen was soft, bowel sounds were present, and there was mild epigastric tenderness on palpation. No edema of the arms or legs was noted. Laboratory studies revealed an elevated hematocrit (56.9%; reference range, 41 to 53), leukocytosis (16,500 white cells per microliter; reference range, 4500 to 11,000) with a predominance of neutrophils, and thrombocytopenia (54,000 platelets per microliter; reference range, 150,000 to 400,000). In addition, the blood urea nitrogen level was elevated (49 mg per deciliter [17.5 mmol per liter]; reference range, 8 to 25 mg per deciliter [2.9 to 8.9 mmol per liter]), with a normal creatinine level (1.23 mg per deciliter [109 μmol per liter]; reference range, 0.60 to 1.50 mg per deciliter [53 to 133 μmol per liter]); no previously obtained values were available. Blood and sputum were obtained for culture. Testing for common respiratory pathogens, including SARS-CoV-2 and influenza virus types A and B, was negative, as was urinary antigen testing for Streptococcus pneumoniae. Serologic testing for human immunodeficiency virus (HIV), dengue virus, and leptospira was also performed. Computed tomography of the chest, performed without the administration of intravenous contrast material, showed interlobular septal thickening in both lungs, predominantly in the lower lobes, along with peribronchovascular thickening. Patchy ground-glass opacities and some areas of consolidation were present in both lungs, along with mosaic attenuation and increased vascular diameters, predominantly in the lower lobes. In the right upper lobe, nodular opacities with adjacent ground-glass changes were observed, a finding consistent with the halo sign, which was suggestive of an invasive fungal infection. In the right middle lobe and left lower lobe, parenchymal bands were identified, a finding consistent with atelectasis. Additional findings included ground-glass opacities in the posterior aspects of the lower lobes, which were most likely indicative of dependent atelectasis, and thickening of the fissures. Overall, the findings were consistent with pulmonary edema; the possibility of a superimposed infection could not be ruled out. Empirical antimicrobial therapy with ceftriaxone, vancomycin, clarithromycin, and oseltamivir was initiated. The patient continued to receive supplemental oxygen through a high-flow nasal cannula at a rate of 50 liters per minute, with a fraction of inspired oxygen of 100%. However, the partial pressure of arterial oxygen was 42 mm Hg (reference range, 80 to 100), with a partial pressure of arterial carbon dioxide of 70 mm Hg (reference range, 35 to 45) and an arterial pH of 7.14 (reference range, 7.35 to 7.45). The trachea was intubated, and mechanical ventilation was initiated. Owing to persistent abdominal pain and severe hypoxemia, point-of-care ultrasonography of the heart, chest, and abdomen was performed. No visceromegaly was noted in the abdomen. Pleuropulmonary findings included a severe diffuse alveolar–interstitial syndrome with bibasilar consolidations and mild bilateral pleural effusions. Focused cardiac ultrasonography showed normal biventricular function.

case_11_2025: |
  A 79-year-old woman was evaluated in the primary care clinic of this hospital because of cough and weight loss. The patient had been in her usual state of health until 4 weeks before the current presentation, when dry cough, coryza, sore throat, and fatigue developed. Coryza and sore throat resolved, but cough and fatigue persisted. She was evaluated by her primary care physician. In the primary care clinic, the patient reported ongoing cough that had become productive of sputum and had begun interfering with sleep; she attributed the ongoing fatigue to disrupted sleep. No dyspnea, pleurisy, or hemoptysis was present. The weight had decreased by 10.4 kg during the past year. There were no night sweats. She had traveled to South Africa 5 years before the current presentation, to South America 4 years before the current presentation, and to Southeast Asia 6 months before the current presentation. During the trip to Southeast Asia, urinary frequency and dysuria developed. The patient was treated with an unknown antibiotic agent, and her symptoms resolved. Persistent nonbloody diarrhea developed after treatment with the antibiotic; bowel movements were more frequent and loose after she consumed certain foods (coffee and ice cream). After adjustments in diet, diarrhea abated but did not resolve. The patient had a history of osteoporosis, recurrent urinary tract infections, and primary hyperparathyroidism, for which she had undergone parathyroidectomy. Medications included calcium carbonate, cholecalciferol, and a multivitamin. There were no known adverse reactions to medications. She was a retired professional, was widowed, and lived alone in a suburb of Boston; she helped provide care for her mother. She traveled frequently to California to visit her family. She was a lifelong nonsmoker and drank alcohol occasionally. Her mother had had lymphoma, which had been diagnosed 25 years earlier; the patient did not know the type of lymphoma or the specific details of treatment that had ultimately led to remission. Her mother had a relapse 8 years earlier, and after chemotherapy and radiation therapy, she was again in remission. On examination, the temporal temperature was 35.6°C, the blood pressure 116/69 mm Hg, the pulse 81 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 98% while the patient was breathing ambient air. She appeared thin. The breath sounds were diminished at the right lung base, and dullness was noted on percussion. There was no palpable cervical, supraclavicular, or axillary lymphadenopathy. The abdomen was nondistended and soft, with no tenderness on palpation; she had no evidence of splenomegaly. There was no clubbing. The blood levels of electrolytes, glucose, alanine aminotransferase, aspartate aminotransferase, alkaline phosphatase, albumin, and protein were normal, as were the complete blood count with differential count and the results of tests of kidney function. The blood level of lactate dehydrogenase was 227 U per liter (reference range, 110 to 210), and the blood level of total protein was 8.0 g per deciliter (reference range, 6.4 to 8.3). The erythrocyte sedimentation rate was 55 mm per hour (reference range, 0 to 29), and the level of C-reactive protein was 11.9 mg per liter (reference value, >8.0). Imaging studies were obtained to help determine the cause of the patient’s cough and to further assess the abnormal findings on pulmonary examination. Two days later, chest radiography revealed a moderate-sized right pleural effusion and airspace opacities in the right middle and lower lobes. The right cardiomediastinal silhouette was partially obscured. Six days later, thoracentesis was performed, and 1.3 liters of pleural fluid were removed. The fluid was yellow and moderately turbid. There were 14,000 red cells per microliter and 6342 nucleated cells per microliter; 10% of the nucleated cells were neutrophils, 30% were lymphocytes, 1% were monocytes, 5% were macrophages, and 54% were unclassified cells. The pleural fluid level of total protein was 5.6 g per deciliter, and the pleural fluid level of lactate dehydrogenase was 230 U per liter.

case_20_2024: |
  A 73-year-old man was admitted to this hospital because of recurrent fever. The patient had been in his usual state of health until 22 months before the current presentation, when 2 days of fever, cough, and fatigue developed. The patient sought evaluation at a primary care clinic affiliated with another hospital. Empirical oral antibiotic agents were administered to treat pneumonia. During the subsequent month, the cough resolved but fever recurred intermittently. The patient returned to the primary care clinic. Computed tomography (CT) of the chest, abdomen, and pelvis, performed after the administration of intravenous contrast material, showed scattered solid pulmonary nodules, a few hepatic hemangiomas, and bilobar subcentimeter hepatic hypodensities. There was borderline splenomegaly, with the spleen measuring 13.0 cm in length (reference range, <13.2), and there was no lymphadenopathy. One week later, magnetic resonance imaging (MRI) of the abdomen revealed that the hepatic lesions, which appeared hyperintense on T2-weighted images with enhancement, had increased in number and size, measuring up to 2.4 cm in diameter. Some lesions were only enhanced peripherally, a finding that suggested central necrosis. A bone marrow biopsy and a liver biopsy were performed. Pathological examination of a bone marrow–biopsy specimen reportedly revealed normocellular bone marrow and rare nonnecrotizing granulomas. Pathological examination of the liver-biopsy specimen showed prominent portal histiocytosis and portal and lobular nonnecrotizing granulomas, with detached neutrophilic aggregates; a few of these foci were fibrin-ring granulomas. Special staining for acid-fast bacilli, Grocott’s methenamine silver staining, and Brown–Hopps staining were negative for organisms. Immunohistochemical staining for cytomegalovirus, Epstein–Barr virus, and spirochetes was negative. Langerin staining for Langerhans’ cells was negative. Twenty months before the current presentation, the patient sought evaluation in the emergency department of this hospital because of 2 days of intermittent fever, which often occurred with chills, night sweats, and abdominal discomfort. Before the onset of this illness, the patient had no history of recurrent fever or severe bacterial infections. He had hypertension, hyperlipidemia, and coronary artery disease that had led to percutaneous coronary intervention of three vessels 12 years before the current presentation. He also had a history of hiatal hernia, gastroesophageal reflux disease, and gallstone pancreatitis that had led to a cholecystectomy 9 years earlier. Medications included rosuvastatin, aspirin, ferrous sulfate, and a multivitamin. He had no known drug allergies. The patient lived in a suburban area of New England with his wife and pet cats and finches. He was a veteran who had been stationed in Guam, Thailand, and Japan, as well as in Vietnam 5 decades before the current presentation. He had traveled to the Southwest and Southeast regions of the United States 2 years before the current presentation. The patient was retired and had previously worked in the food-services industry. He was a lifelong nonsmoker, and he did not use alcohol or illicit drugs. His family history included idiopathic thrombocytopenic purpura, psoriasis, granuloma annulare, and chronic pancreatitis in his siblings. His son had iritis. There was no family history of frequent infections or early childhood deaths. The temporal temperature was 37.3°C, the pulse 79 beats per minute, the blood pressure 113/56 mm Hg, the respiratory rate 20 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. The lungs were clear on auscultation. He had mild tenderness in the epigastrium, as well as splenomegaly. Leukopenia and anemia were present. The levels of angiotensin-converting enzyme, 1,3-β-d-glucan, and galactomannan were normal. Testing for infection with Mycobacterium tuberculosis, human immunodeficiency virus, Epstein–Barr virus, cytomegalovirus, and hepatitis B and C viruses was negative. Testing for infection with Chlamydia psittaci and Coxiella burnetii was also negative, as was testing for brucellosis, bartonellosis, listeriosis, histoplasmosis, coccidioidomycosis, cryptococcosis, blastomycosis, malaria, babesiosis, toxoplasmosis, syphilis, Lyme disease, anaplasmosis, and ehrlichiosis. CT of the chest, abdomen, and pelvis revealed progressive increases in the number and size of the hepatic lesions, which measured up to 3.0 cm in diameter. There was also splenomegaly, with the spleen measuring 13.5 cm in length. Pathological examination of a bone marrow–biopsy specimen and of a specimen obtained on fine-needle aspiration of the liver showed nonnecrotizing granulomas like those seen on the previous liver biopsy. Cytologic examination of the specimens and flow cytometry of the peripheral blood were normal. Transthoracic echocardiography (TTE) showed no valvular vegetations. Empirical doxycycline therapy was started, and the patient was discharged home. During the subsequent 19 months, the patient continued to have intermittent fever, chills, and epigastric pain, which led to additional admissions to this hospital and the other hospital. During the second admission to this hospital, 19 months before this admission, empirical doxycycline therapy was stopped, and empirical prednisone therapy was started, along with trimethoprim–sulfamethoxazole for prophylaxis against Pneumocystis jirovecii pneumonia. During the third admission, 18 months before this admission, CT of the chest, abdomen, and pelvis revealed worsening splenomegaly, with the spleen measuring 14.2 cm in length, and hepatic lesions that had increased in size and number. A percutaneous drain was placed in the largest hepatic lesion, which measured 4.0 cm in diameter. Bacterial, mycobacterial, and fungal cultures of the drained fluid did not grow organisms; however, culture of the blood showed growth of Klebsiella pneumoniae. The patient underwent esophagogastroduodenoscopy (EGD) and colonoscopy, which revealed gastritis, esophagitis, and diverticulosis. Treatment with prednisone and trimethoprim–sulfamethoxazole was stopped, intravenous ceftriaxone was started, and he was discharged home. The patient’s fourth and fifth admissions occurred at the other hospital 17 months and 16 months before this admission, respectively. During the fourth admission, another percutaneous drain was placed in a dominant hepatic lesion, and cultures reportedly resulted in no growth. The patient received a course of empirical broad-spectrum antibiotics. During the fifth admission, cultures again reportedly showed no growth. The patient received another course of empirical broad-spectrum antibiotics and was discharged home with instructions to restart empirical doxycycline therapy. The sixth admission also occurred at the other hospital, 1 month before this admission. CT of the abdomen revealed numerous new and enlarged hypodense hepatic lesions with new scattered subcentimeter splenic hypodensities. Another liver biopsy was performed, which revealed liver parenchyma with abscess, acute inflammation and debris, and histiocytic and stromal reaction with histiocytic aggregates. Grocott’s methenamine silver staining showed few bacteria, and a culture grew Escherichia coli; no acid-fast bacilli or fungal forms were detected. Treatment with doxycycline was stopped, intravenous ceftriaxone was started, and the patient was discharged home with instructions to start taking ciprofloxacin. During the subsequent month, fever did not abate. The patient returned to this hospital for a seventh admission. CT of the chest, abdomen, and pelvis showed stable scattered solid pulmonary nodules, new interstitial pulmonary edema, and increased splenomegaly, with the spleen measuring 15.0 cm in length. There was also an increase in the size and number of the hepatic and splenic hypodensities. The patient underwent EGD, which showed portal hypertensive gastropathy. TTE showed no vegetations. Aspiration of a hepatic lesion was performed, and a culture grew Enterococcus faecalis. Treatment with amoxicillin was started.

case_22_2024: |
  A 30-year-old woman (gravida 1, para 1) was admitted to this hospital 6 days after the delivery of her baby because of fever and abdominal pain. The patient had received routine prenatal care at another hospital. Six days before this admission, the patient went into labor at 35 weeks 3 days’ gestation and was brought to the emergency department of this hospital. The result of testing for group B streptococcus colonization was not available; empirical treatment with vancomycin was administered. Spontaneous rupture of membranes occurred, resulting in clear, odorless fluid. Eight hours later, the patient vaginally delivered a male infant and an intact placenta. She had lost an estimated 300 ml of blood, and she had a second-degree perineal laceration, which was repaired. The baby was large for gestational age, weighing 3575 g. On the second postpartum day, the patient was discharged home. During the subsequent 4 days, the patient pumped breast milk and visited her baby in the special care nursery of this hospital daily while he was being treated for prematurity and feeding difficulties. She had mild diffuse abdominal and pelvic cramping and vaginal bleeding with occasional clots. On the day of the current admission, fever and chills developed, and the patient returned to the emergency department of this hospital. Review of systems was notable for small, painful bumps in the inguinal area on both sides that had developed during pregnancy and had intermittently drained blood and pus. She also had leg swelling that had abated since childbirth. On examination, the temporal temperature was 38.7°C and the blood pressure 125/80 mm Hg. The lungs were clear on auscultation, the breasts nontender, the uterine fundus mildly tender, and the legs mildly swollen. Tender, erythematous pustules that drained yellow, purulent fluid were present in the inguinal area on the right side; scarring was present in the inguinal area on the left side. The repaired perineal laceration was healing well. The white-cell count was 22,940 per microliter (reference range, 4500 to 11,000). Blood and cervical cultures were obtained. The patient had rosacea, acne, and hidradenitis suppurativa. Episodes of diverticulitis had occurred 5 years and 2 years before this admission, and an episode of epiploic appendagitis had occurred 10 weeks before this admission. She was taking prenatal vitamins, topical azelaic acid, and acetaminophen and ibuprofen as needed for abdominal pain. Amoxicillin and cephalexin had caused hives. She worked as an educator and lived with her husband and dog in a suburban area of New England. She did not vape or smoke cigarettes, drink alcohol, or use illicit drugs. Her father and paternal grandfather had arthritis that had been diagnosed in early adulthood, her brother had Crohn’s disease, and another brother had neurofibromatosis. Her mother was healthy. Computed tomography (CT) of the abdomen and pelvis, performed after the administration of intravenous contrast material, showed normal postpartum uterine enlargement, with mild adjacent fat stranding. Empirical treatment with gentamicin and clindamycin was started. The patient was admitted to the hospital with a presumptive diagnosis of endometritis. Fever, abdominal pain, and leukocytosis did not abate, and vancomycin was added on hospital day 3. A test dose of cefepime was administered on hospital day 4. When the patient did not have an allergic reaction to the test dose, gentamicin and clindamycin were stopped, and she was treated with vancomycin, cefepime, and metronidazole. On hospital day 6, an endometrial biopsy was performed. Pathological examination of the biopsy specimen revealed neutrophilic debris that included fragments of stroma with a dense neutrophilic infiltrate. Magnetic resonance imaging (MRI) and magnetic resonance angiography of the pelvis, performed before and after the administration of intravenous contrast material, showed mild ascites and anasarca. No evidence of retained products of conception, fluid collections, or venous or arterial thromboses was observed. Four days later, magnetic resonance angiography of the pelvis revealed increased ascites and anasarca, as well as two new fluid collections: a peripherally enhancing left parametrial collection that measured 6.3 cm in largest dimension and a collection located near the right uterocervical junction that measured 3.2 cm in largest dimension. Treatment with cefepime and metronidazole was stopped, vancomycin was continued, and meropenem was started because of ongoing fever. A percutaneous catheter was inserted into the left parametrial fluid collection, and 20 ml of purulent fluid was drained; cultures showed no growth. On hospital day 11, abdominal pain increased, and shortness of breath developed. The oxygen saturation was 86% while the patient was breathing ambient air. Supplemental oxygen was administered through a nasal cannula at a rate of 2 liters per minute, and the oxygen saturation increased to 91%. The temporal temperature was 36.7°C, the blood pressure 109/58 mm Hg, the heart rate 112 beats per minute, and the respiratory rate 24 breaths per minute. The patient appeared tired and ill. Marked jugular venous distention was present. The heart sounds were tachycardic and regular, and the lungs were clear on auscultation. The abdomen was distended and diffusely tender on palpation, and the percutaneous catheter inserted along the midline of the pelvis had scant purulent drainage. Diffuse anasarca and symmetric 1+ ankle edema were present. Transthoracic echocardiography showed normal biventricular function; however, the right atrium and right ventricle were dilated, and the interventricular septum was flattened during diastole. The main pulmonary artery and its branches were also dilated. CT pulmonary angiography showed bibasilar subsegmental atelectasis and no pulmonary embolism. CT of the abdomen and pelvis revealed increased ascites and anasarca, new splenomegaly, new hepatomegaly with heterogeneous peripheral enhancement, and mild periportal edema. The percutaneously drained left parametrial fluid collection had resolved; the fluid collection at the right uterocervical junction remained unchanged. Results of liver-function tests were abnormal, and magnetic resonance cholangiopancreatography revealed multiple new intrahepatic fluid collections, which were hyperintense on T2-weighted imaging. The next day, new edematous, violaceous, friable plaques developed on the left upper arm at the site where a previous peripheral intravenous catheter had been inserted. A new erythematous-to-violaceous bulla on the left abdominal wall also developed. The plaques located on the left arm subsequently ulcerated, as did new skin lesions located in the right inguinal crease and on the mons pubis. During the next 2 days, the bulla located on the left abdominal wall also began to ulcerate, and another similar lesion formed around the site where the percutaneous drainage catheter had been inserted. The ulcers involving the left upper arm, right inguinal crease, and mons pubis increased in area and depth, and a new ulcer formed in the left inguinal crease. Treatment with intravenous furosemide was administered. Vancomycin was stopped, meropenem was continued, and daptomycin and micafungin were started.

case_6_2024: |
  A 21-year-old man was admitted to this hospital in the summer because of pancytopenia. The patient had been in his usual state of good health until 4 weeks before the current presentation, when nausea and vomiting developed. The nausea and vomiting resolved after 1 day, but fatigue developed. Two weeks before the current presentation, lightheadedness associated with changing positions developed, as well as night sweats; fatigue persisted. On the morning of the current presentation, the patient had lightheadedness while lying down, and he presented to the emergency department of another hospital for evaluation. At the other hospital, the patient reported ongoing lightheadedness. The temporal temperature was 37.2°C, the blood pressure 131/68 mm Hg, the pulse 121 beats per minute, the respiratory rate 12 breaths per minute, and the oxygen saturation 100% while he was breathing ambient air. The weight was 91.2 kg, the height 192 cm, and the body-mass index (the weight in kilograms divided by the square of the height in meters) 24.7. The conjunctivae were pale. Laboratory studies revealed pancytopenia and an elevated blood bilirubin level. The blood lactate dehydrogenase level was greater than 2500 U per liter (reference range, 135 to 225). Blood levels of glucose, electrolytes, aspartate aminotransferase, alanine aminotransferase, alkaline phosphatase, albumin, d-dimer, and fibrinogen were normal, as were the results of kidney-function tests. Imaging studies were obtained. Chest radiography reportedly showed no abnormalities. Intravenous fluids were administered, and the pulse decreased to 100 beats per minute. Oral doxycycline was administered for possible tickborne illness. One unit of packed red cells was transfused, and the patient was transferred to the emergency department of this hospital for further evaluation. On evaluation at this hospital, the patient reported that the lightheadedness had abated. He had no history of fever, hematuria, blood in the stool, or bleeding from other sites. He worked as a carpenter and spent minimal time outside. He lived with his parents and brother and had two cats and a dog. He took no medications. There were no known drug allergies. He did not smoke cigarettes, drink alcohol, or use illicit drugs. His maternal grandmother had had lymphoma. The temporal temperature was 36.4°C, the blood pressure 131/64 mm Hg, the pulse 89 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 99% while the patient was breathing ambient air. The results of pulmonary, cardiovascular, and abdominal examinations were normal. Areas of hypopigmentation of the skin were detected near the elbows, fingers, and feet. Cranial nerve function was intact, and strength was 5 out of 5 in the arms and legs. Examination of a peripheral-blood smear revealed evidence of macrocytic anemia with anisopoikilocytosis. Few white cells were present. There were neutrophils with variable segmentation and occasional immature forms, as well as platelets that were normal in terms of number and morphologic features. A direct antiglobulin test was negative for IgG; C3 was detected on microscopic examination. Screening tests for Lyme disease, human immunodeficiency virus, and severe acute respiratory syndrome coronavirus 2 RNA were negative. Urinalysis showed 2+ urobilinogen (reference value, negative), without bilirubin, blood, glucose, ketones, protein, or nitrates; the specific gravity and pH were normal. Imaging studies were obtained. A sagittal ultrasound image of the abdomen showed mild splenomegaly, with the spleen measuring 15.8 cm on the long axis (reference value with adjustment for sex and height, <14.1). There was an incidental rounded echogenic lesion in the left hepatic lobe that measured up to 1.3 cm in diameter, a finding consistent with a hepatic hemangioma.

case_1_2026: |
  A 50-year-old woman was admitted to this hospital because of fever and abdominal pain after she had returned from a trip to rural Brazil. The patient was born and raised in Brazil and immigrated to Boston in early adulthood. In the weeks leading up to the current presentation, she traveled to a remote area in northeastern Brazil. Four days before the current presentation, after she had returned to Massachusetts, fatigue developed. The next day, she had several episodes of watery diarrhea that were accompanied by nausea and mild diffuse abdominal discomfort. Her symptoms lasted for 3 days, and her weight decreased by 3 kg. Dyspnea and lethargy developed, and she presented to the emergency department of this hospital. In the emergency department, the patient answered questions only intermittently owing to malaise; additional history was obtained from her husband. In the days before the current presentation, the patient had noted chills, malaise, headache, and pain in the knees and legs. She had not noted rash, jaundice, pruritus, chest pain, cough, eye or ear pain or dysfunction, hematochezia, melena, dysuria, or hematuria. The patient had a history of schistosomiasis that had occurred during childhood and had been complicated by noncirrhotic portal hypertension, esophageal varices, splenomegaly, chronic thrombocytopenia, and chronic leukopenia. Other medical history included gastroesophageal reflux disease, iron deficiency anemia, hypothyroidism, and allergic rhinitis. Approximately 10 years before the current presentation, ultrasonography of the liver reportedly revealed coarse echogenicity that was consistent with fatty infiltration. Evaluation for a cause of liver disease was unrevealing, and a liver biopsy showed features of nodular regenerative hyperplasia but no clinically significant fibrosis. Six years before the current presentation, liver elastography showed a liver stiffness of 18.4 kPa (reference range, 2 to 7), a finding consistent with F4 fibrosis (liver stiffness, >14 kPa). The levels of thyrotropin and alpha-fetoprotein were normal. Four years before the current presentation, liver ultrasonography reportedly revealed morphologic features in the liver that were consistent with cirrhosis, as well as gallbladder wall thickening and splenomegaly, with the spleen measuring 16 cm in the greatest dimension (reference value, ≤12). Esophagogastroduodenoscopy procedures performed 30 months and 2 months before the current presentation reportedly showed grade II esophageal varices (2 to 3 mm in diameter and mildly tortuous or straight). Medications included levothyroxine, cetirizine, ergocalciferol, resveratrol, and a multivitamin. Propranolol had caused fatigue, and there was a history of adverse reactions to medications containing sulfa. The patient had received vaccinations against severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2), hepatitis A and B viruses, and pneumococcus. The patient lived in a suburb of Boston with her family, and she worked in the service industry, where she was often exposed to dust. She did not use alcohol, tobacco, or other substances. She had no history of travel other than the recent trip to Brazil. During the trip, she had been bitten by multiple mosquitoes while spending time at a beach in a region where cases of dengue fever and chikungunya virus infection were known to have occurred. She had not taken malaria prophylaxis. She had no known sick contacts. Information on other environmental, animal, and food exposures was not available. One of her brothers had died in his fourth decade of life from chronic liver disease attributed to alcohol use. Two other brothers had a history of hematemesis, one of whom had had schistosomiasis and had undergone splenectomy. On examination, the temporal temperature was 38.4°C, the heart rate 105 beats per minute, the blood pressure 76/44 mm Hg, the respiratory rate 32 breaths per minute, and the oxygen saturation 100% while the patient was breathing ambient air. She appeared lethargic and unwell, with diaphoretic pale skin and labored rapid breathing. Petechiae of the posterior palate were present. The abdomen was slightly distended and diffusely tender; the tenderness was most notable in the right upper quadrant and suprapubic area. Murphy’s sign was absent, and the spleen tip was palpable. No costovertebral tenderness was noted. Trace edema of the legs was present, but there was no rash. The remainder of the examination was normal. The high-sensitivity troponin T level was undetectable, and the creatine kinase level was normal. The urinary level of human chorionic gonadotropin was undetectable. A respiratory viral panel performed on a nasopharyngeal swab sample was negative for SARS-CoV-2, adenovirus, influenza viruses A and B, parainfluenza viruses 1 through 4, respiratory syncytial virus, rhinovirus, and enterovirus. Tests for bacteria such as Bordetella pertussis, Chlamydia pneumoniae, and Mycoplasma pneumoniae were also negative. Blood cultures were obtained. During the patient’s first hour in the emergency department, 1 liter of lactated Ringer’s solution and vancomycin, ceftriaxone, and azithromycin were administered intravenously, and the blood pressure rose to 90/54 mm Hg. Electrocardiography showed sinus tachycardia and borderline-low QRS voltage in the precordial leads. A rapid malaria antigen test was negative. Chest radiography revealed diffuse interstitial and airspace opacities in both lungs. Piperacillin–tazobactam was administered intravenously. During the next 2 hours, despite the administration of an additional 2 liters of intravenous crystalloid fluid, the blood pressure decreased to 73/41 mm Hg; treatment with a continuous infusion of norepinephrine was started at a rate of 6 μg per minute. During the next hour, oxygen was administered through a nasal cannula at a rate of 2 liters per minute, the norepinephrine dose was increased to 15 μg per minute, and treatment with a continuous infusion of vasopressin was added. Computed tomography (CT) of the chest, performed after the administration of intravenous contrast material in accordance with a pulmonary-embolism protocol, showed no evidence of pulmonary embolism. Findings included diffuse septal thickening, bilateral pleural effusions, diffuse edema in the mediastinum, a small pericardial effusion, and subcentimeter mediastinal and hilar lymph nodes. CT of the abdomen and pelvis showed morphologic features in the liver that were consistent with cirrhosis. Large portosystemic collaterals were present , including gastroesophageal varices and a large patent periumbilical vein draining into the right common femoral vein. The spleen measured 18.8 cm in the greatest dimension. There was hydroureteronephrosis on the right side resulting from external compression at the level of the pelvic brim by an exophytic uterine mass, measuring 12.2 cm in the greatest dimension, that was consistent with a fibroid. Distal gastric, duodenal, and diffuse colorectal wall thickening was noted, along with ascites and diffuse mesenteric and retroperitoneal edema. The patient was admitted to the medical intensive care unit (ICU) of this hospital 6 hours after presentation. A radial arterial catheter and a right internal jugular central venous catheter were placed, and the trachea was intubated for initiation of mechanical ventilation. Electrocardiography showed sinus rhythm at a lower heart rate than previously noted, despite the worsening shock syndrome, as well as borderline-low QRS voltage in the precordial leads, subtle PR-segment depression in the inferior and apical leads, and J-point elevation with concave submillimeter ST-segment elevation in the inferior, apical, and lateral leads. Bedside cardiac ultrasonography showed globally reduced biventricular function, moderate tricuspid regurgitation, a plethoric inferior vena cava, and no pericardial effusion. Vancomycin, cefepime, metronidazole, dextrose, and propofol were administered intravenously.

case_2_2026: |
  A 63-year-old man was admitted to this hospital with fever, cough, and vision loss in the right eye. The patient had been in his usual state of health until 3 weeks before the current presentation, when vomiting and diarrhea developed, which the patient attributed to his having eaten spoiled meat. During the subsequent 2 weeks, vomiting and diarrhea abated, but a new cough productive of grayish-brown sputum developed, along with intermittent fever and chills. Five days before the current presentation, the patient fell in the shower and hit the back of his head. There was no loss of consciousness. Three days before the current presentation, the cough worsened, and his wife took him to the emergency department of another hospital. On evaluation, the patient reported fever, chills, cough, and mild shortness of breath. He had had an unintentional weight loss of 3 kg in the previous few weeks. Vomiting and diarrhea had resolved, and no abdominal pain, anorexia, or rash was present. The temporal temperature was 36.7°C, the blood pressure 109/71 mm Hg, the heart rate 104 beats per minute, the respiratory rate 19 breaths per minute, and the oxygen saturation 91% while the patient was breathing ambient air. Auscultation of the lungs revealed scattered crackles, and the abdomen was not tender on palpation. He had no rash or lymphadenopathy. The white-cell count was 19,300 per microliter (reference range, 4800 to 11,200). A chest radiograph showed multiple patchy and nodular opacities in both lungs. Computed tomography (CT) of the chest, abdomen, and pelvis, performed after the administration of intravenous contrast material, revealed more than 15 diffusely distributed pulmonary nodules and masses, many of which were cavitated, measuring up to 4.4 cm in diameter with predominance in the middle and upper lung zones. In addition, there was a mixed cystic and solid hepatic mass, measuring 8.6 cm in diameter, with heterogeneous enhancement and a filling defect in the middle hepatic vein. A right hilar lymph node measured 1.4 cm in diameter; no other lymphadenopathy was present. A CT scan of the head appeared to be normal. Supplemental oxygen was administered through a nasal cannula, empirical treatment with ceftriaxone and azithromycin was started, and intravenous fluids were administered. The patient was admitted to the other hospital. On the second hospital day, the chills and cough persisted. Specimens of blood, urine, and induced sputum were obtained for culture. On the third hospital day, the patient awoke with loss of vision in the right eye. He had no eye pain or headache. On examination, marked periorbital edema was present, and the lids could not open spontaneously. Magnetic resonance imaging (MRI) of the head, performed after the administration of intravenous contrast material, showed multiple small foci of cortical, subcortical, and deep white-matter lesions with restricted diffusion in different vascular territories in both hemispheres; these foci were associated with hyperintense signal without definite enhancement on fluid-attenuated inversion recovery (FLAIR) imaging. Mild proptosis was present on the right side, and the right ocular globe contained an irregular floating hyperintense and hypointense signal on T1- and T2-weighted imaging, respectively, with restricted diffusion in the vitreous. Edema was present in the preseptal soft tissue on the right side, along with edema and enhancement of the right lacrimal gland with a small anterior fluid collection. Transthoracic echocardiography showed hyperdynamic left ventricular function and no valvular vegetations. Ceftriaxone and azithromycin were discontinued, and empirical treatment with vancomycin, cefepime, and metronidazole was started. The patient was transferred to this hospital. On presentation to this hospital, additional information was obtained. The patient had not had a medical evaluation in decades. He had no known medical history or adverse reactions to medications. Medications included acetaminophen and ibuprofen as needed for fever. He was born in a Caribbean country and moved to the United States as an infant. He had not subsequently traveled internationally and lived in a coastal area of New England. He drank alcohol rarely and did not take illicit drugs or smoke cigarettes; he smoked marijuana occasionally. His family history was unknown. On examination, the left eye appeared normal, but the right eye had marked periorbital edema. The right eyelids were mildly erythematous, tender on palpation, and swollen such that the patient could not open the eyelids without assistance. The right eye had limited extraocular movement, had mild proptosis, and could only perceive light. The left eye had full extraocular movement and a visual acuity of 20/60. The intraocular pressure was 26 mm Hg in the right eye and 17 mm Hg in the left eye (reference range, 10 to 21). The right pupillary reaction to light was obscured by corneal haze and fibrin in the anterior chamber; the left pupil reacted normally. An afferent pupillary defect was observed in the right eye. Slit-lamp examination of the right eye revealed bullous chemosis involving the entire circumference of the conjunctiva, diffuse corneal edema with an inferior epithelial defect, and fibrin in the anterior chamber. The right iris was only faintly visible, with a faint view to an intact crystalline lens, and there was no view to the fundus. The anterior segment of the left eye was normal, and the vitreous was clear. Dilated fundoscopic examination of the left eye revealed a cotton-wool spot in the inferior retina. B-scan ultrasonography of the right eye showed dense vitreous opacities, subretinal hyperechoic material, and marked choroidal thickening. The white-cell count had increased to 24,750 per microliter (reference range, 4500 to 11,000). Empirical treatment with vancomycin, cefepime, and metronidazole was continued, and treatment with liposomal amphotericin B was started.

case_1_2025: |
  A 35-year-old woman was admitted to this hospital because of shortness of breath and edema in the legs. Eight weeks before the current presentation, the patient was admitted to this hospital for induction of labor at 39 weeks’ gestation because of advanced maternal age and a fetus that was small for gestational age. She had begun taking low-dose aspirin at 13 weeks’ gestation to decrease the risk of preeclampsia associated with antepartum obesity. She had no history of hypertension before or during pregnancy. On admission, the blood pressure was 141/81 mm Hg, and pitting edema in the legs was present; laboratory testing was performed to evaluate for preeclampsia. The blood albumin level was 2.1 g per deciliter (reference range, 3.3 to 5.0), and the ratio of protein to creatinine in urine was 4.1 (reference value, <0.15). The patient had no headache, vision changes, or shortness of breath. Misoprostol and oxytocin were administered for induction of labor. On the third hospital day, a healthy infant was born by an uncomplicated vaginal delivery. The patient’s blood pressure after delivery was 122/88 mm Hg. She was discharged home on the fifth hospital day. After discharge, systolic blood-pressure measurements obtained at home were less than 140 mm Hg. In the 2 weeks after discharge, the patient’s weight decreased by 9 kg. Six weeks before the current presentation, headache developed. The headache was nearly constant; she noted that the pain ranged from 3 to 10 on a scale of 0 to 10 (with 10 indicating the most severe pain). The pain abated with the use of ibuprofen. Four weeks before the current presentation, the patient noted swelling in the feet and legs, along with headache. During the next week, the swelling progressed, and the weight increased by 6 kg. Systolic blood-pressure measurements remained less than 140 mm Hg. The patient was evaluated in the antepartum unit of this hospital. The blood pressure was 121/71 mm Hg, and symmetric pitting edema in the legs was present. The patient was instructed to continue taking ibuprofen for headache and was referred to the neurology clinic of this hospital for evaluation of headache. One week before the current presentation, the patient was evaluated in the emergency department of another hospital for increased swelling in the legs. The blood urea nitrogen level was 22 mg per deciliter (7.9 mmol per liter; reference range, 6 to 20 mg per deciliter [2.1 to 7.5 mmol per liter]), the creatinine level 0.70 mg per deciliter (62 μmol per liter; reference range, 0.50 to 1.10 mg per deciliter [44 to 97 μmol per liter]), the albumin level 1.5 g per deciliter (reference range, 3.5 to 5.2), and the total protein level 4.8 g per deciliter (reference range, 5.8 to 7.7). The blood B-type natriuretic peptide (BNP) level was normal. Ultrasonography of the legs showed no evidence of deep venous thrombosis. Treatment with oral furosemide was started, and the patient was discharged from the emergency department. During the next 6 days, the weight continued to increase, swelling in the legs worsened, and dyspnea on exertion developed. The patient presented to the emergency department of this hospital for evaluation. She reported ongoing headache. The weight was 11 kg higher than her lowest weight after delivery. She had a history of obesity, with a pregravid body-mass index (BMI; the weight in kilograms divided by the square of the height in meters) of 40. She also had a history of anxiety. As part of routine prenatal care, the patient had undergone testing 9 months before the current presentation, and screening tests for human immunodeficiency virus types 1 and 2, hepatitis B virus, and hepatitis C virus had been negative; blood levels of glycated hemoglobin and thyroglobulin had been normal at that time. She took furosemide, as well as ibuprofen as needed for headache. Penicillin had caused hives. The patient was married and lived with her husband. She did not drink alcohol or use illicit drugs. In the past, she had smoked tobacco occasionally, but she had quit smoking 1 year before the current presentation, in anticipation of pregnancy. There was no family history of preeclampsia. On examination, the temporal temperature was 35.8°C, the blood pressure 142/85 mm Hg, the pulse 62 beats per minute, the respiratory rate 16 breaths per minute, and the oxygen saturation 98% while the patient was breathing ambient air. The BMI was 45.2. Pitting edema in the legs was present. The blood albumin level was 2.2 g per deciliter. The blood BNP level was normal. The blood thyrotropin level was 7.87 μIU per milliliter (reference range, 0.40 to 5.00), and the free thyroxine level was 0.9 ng per deciliter (12 pmol per liter; reference range, 0.9 to 1.8 ng per deciliter [12 to 23 pmol per liter]). Urinalysis was notable for 3+ protein (reference value, negative) but was otherwise normal. The ratio of protein to creatinine in urine was 5.2. Chest radiography showed no abnormalities. Computed tomography of the chest, performed after the administration of intravenous contrast material in accordance with a pulmonary-embolism protocol, showed mild bronchial-wall thickening with scattered areas of mucous plugging. Ultrasonography of the legs was negative for deep venous thrombosis.

case_2_2025: |
  A 21-year-old man with sickle cell disease was evaluated in the emergency department of this hospital after loss of consciousness resulting in a fall. The patient had been in his usual state of health until the week before the current presentation, when he began to have discomfort and pain in the chest, back, arms, and legs. He attributed these symptoms to sickle cell disease and received hydromorphone infusions on an outpatient basis 4 days and 3 days before this evaluation. On the day of the current presentation, the patient used oral oxycodone and supplemental oxygen for chest pain. In the evening, his family was downstairs in their home when they heard a thud from upstairs; they found the patient lying on the floor of his bedroom. There was no evidence of limb shaking or incontinence. The patient awoke in response to voice but was described as being confused for approximately 1 minute before returning to his baseline mental status. He recalled taking a nap and then feeling dizzy on awakening. The last thing he remembered was trying to walk across his room. Emergency medical services were activated; the fingerstick blood glucose level was normal, and the Glasgow Coma Scale score was 15 (on a scale of 3 to 15, with lower scores indicating greater alteration of consciousness). A cervical collar was applied, and the patient was transported to the emergency department of this hospital. In the emergency department, a review of systems was notable for head and face pain on the right side from the fall, as well as acute-on-chronic pain involving the chest, back, and right hip and leg that was similar to the patient’s previous sickle cell–related pain. He reported no fever, nausea, vomiting, change in bowel habits, dyspnea, rash, weakness, or numbness. The patient’s medical history included homozygous sickle cell disease complicated by vaso-occlusive events, pulmonary embolism and inferior vena cava thrombi, retinal artery occlusion (after which serial blood transfusions were initiated for secondary stroke prophylaxis), sickle cell nephropathy, avascular necrosis of the hip, cholelithiasis, iron overload, and splenic sequestration resulting in splenectomy. He also had a history of mild persistent asthma and nasal polyps. Medications included apixaban, deferasirox, amoxicillin, gabapentin, cetirizine, montelukast, and famotidine; oxycodone as needed; inhaled albuterol and mometasone–formoterol as needed; and inhaled fluticasone. He used supplementary oxygen through a nasal cannula as needed and received blood transfusions on a regular basis. He was following postsplenectomy vaccination recommendations. Ceftriaxone and methadone had caused rash. The patient’s mother had multiple sclerosis, and she had had petit mal seizures as a child. Multiple relatives had hypertension, and his paternal grandfather had had a stroke. Siblings had asthma, and a first cousin had attention deficit–hyperactivity disorder. The patient worked in the nonprofit sector and lived with his family in an urban area near Boston. He had no history of alcohol, tobacco, or other substance use. On examination, the temporal temperature was 36.9°C, the heart rate 123 beats per minute, the blood pressure 149/95 mm Hg, the respiratory rate 18 breaths per minute, and the oxygen saturation 97% while the patient was breathing ambient air. An abrasion on the right side of the forehead and swelling of the right cheek were noted. He had no cuts or bleeding in the mouth. The sclerae appeared to be somewhat icteric. The heart was tachycardic with a midsystolic murmur at the base. There was a well-healed surgical scar on the left side of the upper abdomen. Neurologic examination showed right arm weakness that was reported to be chronic; the remainder of the neurologic examination was normal. Nucleic acid testing for severe acute respiratory syndrome coronavirus 2 was negative. An electrocardiogram showed sinus tachycardia. Chest radiography showed no abnormalities. Intravenous normal saline and hydromorphone were administered. Six hours after presentation, on the second hospital day, the patient was witnessed to have an abrupt onset of shaking of the arms and legs with flexion of the arms. The eyes were deviated upward. The event lasted approximately 2 minutes and stopped on its own; intravenous lorazepam was administered 7 minutes after the seizure. The patient was sleepy, but his condition was otherwise unchanged from the previous examination. Urine toxicology testing was negative except for the detection of oxycodone. Blood cultures were obtained. Approximately 7 hours after the witnessed episode of shaking, magnetic resonance imaging (MRI) of the head and magnetic resonance angiography of the head were performed. MRI revealed regions of cortical and subcortical signal hyperintensity on T2-weighted fluid-attenuated inversion recovery (FLAIR) imaging, findings that were consistent with vasogenic edema. The hyperintensity was seen predominantly in the posterior portion of the supratentorial parenchyma and involved the bilateral posterior frontal, parietal, occipital, and temporal lobes; the left lenticulocapsular region and right cerebellar hemisphere also showed hyperintensity on FLAIR imaging, with overall mild, localized mass effect. Diffusion-weighted imaging showed no restricted diffusion. T1-weighted imaging, performed after the intravenous administration of contrast material, revealed regions of irregular enhancement that corresponded to some of the sites of hyperintensity on FLAIR imaging that were consistent with vasogenic edema; these findings suggested a breakdown of the blood–brain barrier. The dural venous sinuses appeared patent. Susceptibility-weighted imaging revealed numerous punctate foci of hypointense paramagnetic susceptibility effect throughout the brain parenchyma that were consistent with nonspecific microhemorrhages; these foci were present both within and beyond the regions of abnormal hyperintense signal on FLAIR imaging. Foci of susceptibility effect outside regions of signal abnormalities on FLAIR imaging are typically consistent with nonspecific chronic microhemorrhages, whereas those within regions of abnormal signal intensity on FLAIR imaging could reflect acute petechial hemorrhage or additional sites of chronic microhemorrhage. Magnetic resonance angiography showed no abnormalities.

case_5_2025: |
  A 30-year-old woman was admitted to this hospital because of headache and dysesthesia. The patient had been in her usual state of good health until 8 days before the current presentation, when a burning sensation developed in the feet. During the next 2 days, the burning sensation progressed to involve the legs and worsened with light touch. Treatment with ibuprofen did not alleviate her symptoms. She had concurrent fatigue, which she attributed to jet lag after returning from a 3-week trip that had included travel in Thailand, Japan, and Hawaii. Five days before the current presentation, the patient was evaluated in the emergency department of another hospital because of dysesthesia in the legs. The temporal temperature was 37.2°C, the blood pressure 120/60 mm Hg, the pulse 106 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 100% while she was breathing ambient air. The examination was reportedly normal. The results of blood tests of renal function were normal, as were the blood levels of electrolytes and glucose. The blood level of creatine kinase was normal, as was a screening test for Lyme disease. The white-cell count was 8680 per microliter (reference range, 3900 to 11,000), and the eosinophil count was 870 per microliter (reference range, 0 to 450). The patient was discharged from the emergency department with a plan for follow-up with her primary care physician. Three days before the current presentation, dysesthesia progressed to involve the trunk and arms, and headache developed. The patient began taking acetaminophen frequently, but headache worsened. The temporal temperature measured by the patient at home was 38.3°C on one occasion, 2 days before the current presentation. One day before the current presentation, the patient was evaluated in the emergency department of a second hospital because of worsening dysesthesia and headache. The temporal temperature was 36.4°C, the blood pressure 123/78 mm Hg, the pulse 90 beats per minute, the respiratory rate 18 breaths per minute, and the oxygen saturation 100% while she was breathing ambient air. The examination was reportedly normal. The results of blood tests of renal function were normal. The blood level of carbon dioxide was 19 mmol per liter (reference range, 21 to 30), and the anion gap was 17 mmol per liter (reference range, 7 to 16). The white-cell count was 13,300 per microliter (reference range, 4200 to 10,200), and the eosinophil count was 1050 per microliter (reference range, 0 to 400). After treatment with intravenous ketorolac and lorazepam, headache abated. The patient was discharged from the emergency department with a plan for follow-up with her primary care physician. After the patient arrived home from the emergency department, she took zolpidem (which had been prescribed for a family member) to help with sleep. On the day of the current presentation, confusion developed; in the morning when she awoke, she thought she needed to pack for vacation and was not redirectable when her roommate attempted to help her lie back down in bed. When confusion did not resolve after several hours, the patient’s partner brought her to this hospital for further evaluation. Medical history included irritable bowel syndrome. Medications included dicyclomine and linaclotide. The patient lived in a coastal region of New England with a roommate. She worked in an office. She did not smoke tobacco, drink alcohol, or use illicit drugs. The patient had returned from a 3-week trip 12 days before the current presentation. During the first week of the trip, she visited Bangkok, Thailand. She toured the city and ate various street foods but no raw food. During the next 5 days, she was in Tokyo, Japan, where she spent most of her time in the hotel and ate several meals of sushi. During the last 10 days of the trip, she was on vacation in Hawaii, where she swam in the ocean several times and frequently ate both salad and sushi. On examination, the temporal temperature was 37.3°C, the blood pressure 131/96 mm Hg, the pulse 62 beats per minute, the respiratory rate 24 breaths per minute, and the oxygen saturation 93% while the patient was breathing ambient air. The body-mass index (the weight in kilograms divided by the square of the height in meters) was 26.3. She was alert but not oriented. She appeared restless and did not answer questions consistently or follow commands. The neck was supple with normal motion. No rash was present. Intramuscular lorazepam was administered. A peripheral intravenous catheter was placed, and intravenous fluids were administered. Laboratory and imaging studies were obtained. Microscopic examination of thick and thin blood smears showed no parasites. Blood samples were obtained for culture. Computed tomography of the head showed no acute intracranial abnormalities. Lumbar puncture was performed for evaluation of cerebrospinal fluid (CSF); the opening pressure was 25 cm of water (reference range, 10 to 25). Analysis of the CSF showed 694 white cells per microliter (reference range, 0 to 5), of which 81% were lymphocytes, 9% were monocytes, 8% were eosinophils, and 2% were neutrophils. The CSF glucose level was 36 mg per deciliter (2.0 mmol per liter; reference range, 40 to 70 mg per deciliter [2.2 to 3.9 mmol per liter]), and the total protein level was 101 mg per deciliter (reference range, 15 to 45). Gram’s staining of the CSF revealed many white cells and no bacteria. Treatment with intravenous ceftriaxone, vancomycin, acyclovir, and dexamethasone was started.

